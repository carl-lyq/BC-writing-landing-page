<style>
/* ============================================================
   IELTS Writing Landing — Warm Editorial System
   ============================================================ */

:root {
  --paper: #f4f7fb;
  --paper-2: #e7eef7;
  --paper-3: #d5e0ef;
  --ink: #0b1f3a;
  --ink-2: #1e3a63;
  --ink-3: #4f6a8f;
  --ink-4: #8aa0bd;
  --rule: #c6d4e6;
  --rule-soft: #dde6f2;

  --accent: #1e5fd6;
  --accent-ink: #153f99;
  --accent-wash: #d8e5fb;
  --sage: #2b6cb0;
  --sage-wash: #d3e2f2;
  --cream: #e8f0fb;

  --radius: 16px;

  --font-display: "OPPO Sans 4.0", "Noto Sans SC", "Source Han Sans SC", "Source Han Sans CN", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  --font-body: "OPPO Sans 4.0", "Noto Sans SC", "Source Han Sans SC", "Source Han Sans CN", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  --font-score: "Noto Serif SC", "Source Han Serif SC", "Source Han Serif CN", "Songti SC", "STSong", "SimSun", serif;
  --font-label: "JetBrains Mono", "SFMono-Regular", "Cascadia Mono", Menlo, Consolas, "Noto Sans SC", "Source Han Sans SC", ui-monospace, monospace;
  --serif: var(--font-display);
  --sans: var(--font-body);
  --mono: var(--font-label);

  --gutter: clamp(16px, 2vw, 32px);
  --page-max: 1440px;
  --nav-height: 65px;
  --flow-axis-top: 88px;
  --flow-axis-width: 213px;
  --flow-axis-gap: 12px;
  --flow-axis-slot: 0px;
  --space-xs: 6px;
  --space-sm: 10px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;

  --motion-fast: 120ms;
  --motion-standard: 180ms;
  --motion-state: 260ms;
  --motion-enter: 560ms;
  --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
  --ease-out-quint: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);

  /* Typography roles */
  --text-micro: 0.625rem;
  --text-tiny: 0.6875rem;
  --text-caption: 0.75rem;
  --text-meta: 0.8125rem;
  --text-ui: 0.875rem;
  --text-body: 1rem;
  --text-lead: 1.0625rem;
  --text-subtitle: 1.125rem;
  --text-title: 1.5rem;
  --text-card-title: 1.375rem;
  --text-headline: clamp(2rem, 2.7vw, 2.5rem);
  --text-section: clamp(2.25rem, 3.6vw, 3.25rem);
  --text-section-tight: clamp(2.25rem, 3.2vw, 3rem);
  --text-section-mobile: clamp(1.875rem, 8vw, 2.25rem);
  --text-hero-card: clamp(1.5rem, 2.8vw, 2.25rem);
  --text-hero-mobile: clamp(1.1875rem, 5.2vw, 1.375rem);
  --text-hero-primary: clamp(2.75rem, 3.6vw, 3.25rem);
  --text-hero-secondary: clamp(1.75rem, 2.4vw, 2rem);
  --text-score: clamp(2.25rem, 3vw, 2.5rem);
  --text-meta-xs: var(--text-caption);
  --text-meta-sm: var(--text-meta);
  --text-meta-md: var(--text-ui);
  --text-meta-lg: 0.9375rem;
  --text-section-num: 0.9375rem;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 100%;
  line-height: 1.55;
  scroll-behavior: smooth;
  font-kerning: normal;
  font-optical-sizing: auto;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: clip;
}

img { max-width: 100%; display: block; }
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
a { color: inherit; text-decoration: none; }
button:focus-visible,
a:focus-visible,
select:focus-visible,
input:focus-visible {
  outline: 3px solid color-mix(in srgb, var(--accent) 68%, white);
  outline-offset: 3px;
}

.page {
  max-width: var(--page-max);
  margin: 0 auto;
  padding: 0 var(--gutter);
  width: 100%;
  min-width: 0;
}

body {
  background-image: none;
}

/* Nav */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0;
  border-bottom: 1px solid var(--rule);
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  width: 100%;
  background: var(--paper);
  z-index: 1000;
}
.nav-spacer {
  height: var(--nav-height);
}
.nav__brand {
  display: inline-flex;
  align-items: center;
  flex: 0 0 auto;
  gap: 12px;
  min-width: 0;
}
a.nav__brand {
  text-decoration: none;
  color: inherit;
  transition: opacity var(--motion-standard) var(--ease-out-quart);
}
a.nav__brand:hover { opacity: 0.86; }
.nav__brand-logo {
  display: block;
  object-fit: contain;
  flex: 0 0 auto;
}
.nav__brand-logo--txx {
  width: 89px;
  height: 34px;
  margin-right: 10px;
}
.nav__brand-divider {
  width: 1px;
  height: 24px;
  flex: 0 0 auto;
  border-radius: 9999px;
  background: #c6d4e6;
}
.nav__brand-logo--bc {
  height: 34px;
  width: auto;
}
.nav__links {
  display: flex;
  gap: 28px;
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 500;
  line-height: 20px;
  letter-spacing: 0;
  color: #1e3a63;
}
.nav__links a:hover { color: var(--accent); }
.nav__cta {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex: 0 0 auto;
  gap: 0;
  padding: 9px 16px;
  min-height: 38px;
  background: #0b1f3a;
  color: #f4f7fb;
  font-family: "Noto Sans SC", "Source Han Sans SC", "Source Han Sans CN", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 14px;
  font-weight: 500;
  line-height: 20px;
  letter-spacing: 0;
  white-space: nowrap;
  border-radius: 16px;
  box-shadow: none;
  transition: background 160ms ease, color 160ms ease;
}
.nav__cta:hover { background: #0b1f3a; color: #f4f7fb; }
.nav__end {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  flex: 0 0 auto;
}

/* Left flow axis — page journey tracker (desktop) */
#hero, #pain, #paths, #proof,
[id^="path-"] {
  scroll-margin-top: calc(var(--nav-height) + 24px);
}
.flow-axis {
  position: fixed;
  left: 32px;
  top: var(--flow-axis-top);
  z-index: 40;
  display: none;
  flex-direction: column;
  align-items: flex-start;
  gap: 10px;
  font-family: var(--sans);
  pointer-events: none;
  width: var(--flow-axis-width);
}
.flow-axis__inner {
  pointer-events: auto;
  display: flex;
  align-items: stretch;
  gap: 14px;
  padding: 18px;
  border-radius: 16px;
  background: #f8fbff;
  border: 0;
  box-shadow: inset 0 0 0 1px var(--rule), 0 4px 8px rgba(18, 49, 89, 0.08);
  max-width: none;
}
.flow-axis__track {
  position: relative;
  display: grid;
  grid-template-columns: 18px 145px;
  column-gap: 14px;
}
.flow-axis__rail {
  position: absolute;
  left: 6px;
  top: 11px;
  width: 4px;
  height: 337px;
  background: #e3edf9;
  border-radius: 999px;
  pointer-events: none;
}
.flow-axis__progress {
  position: absolute;
  left: 6px;
  top: 11px;
  width: 4px;
  background: var(--accent);
  border-radius: 999px;
  transition: height 0.35s ease;
  max-height: 337px;
  pointer-events: none;
}
.flow-axis__line {
  position: relative;
  grid-column: 1;
  grid-row: 1 / span 5;
  width: 18px;
  min-height: 348px;
}
.flow-axis__items {
  grid-column: 2;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 24px;
  width: 145px;
}
.flow-axis__step {
  position: relative;
  display: flex;
  align-items: center;
  padding: 0;
  text-align: left;
  border: none;
  background: none;
  cursor: pointer;
  border-radius: 6px;
  transition: color 160ms ease;
  min-width: 0;
}
.flow-axis__step:hover {
  color: var(--accent);
}
.flow-axis__dot {
  position: absolute;
  left: -32px;
  top: 0;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 4px solid #e3edf9;
  background: #fff;
  transition: background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  z-index: 1;
}
.flow-axis__step.is-active .flow-axis__dot,
.flow-axis__step.is-active-parent .flow-axis__dot {
  width: 16px;
  height: 16px;
  border-color: var(--accent);
  background: var(--accent);
  box-shadow: 0 0 0 4px #f0f6ff;
}
.flow-axis__step.is-done .flow-axis__dot {
  border-color: var(--accent);
  background: var(--accent);
}
.flow-axis__label {
  font-size: var(--text-body);
  font-weight: 500;
  color: var(--ink-3);
  line-height: 1.2;
  transition: color 0.2s ease;
}
.flow-axis__step.is-active .flow-axis__label,
.flow-axis__step.is-active-parent .flow-axis__label {
  color: var(--ink);
}
.flow-axis__subs {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin: 0;
  padding: 0;
}
.flow-axis__sub-step {
  display: flex;
  align-items: flex-start;
  gap: 0;
  padding: 0;
  text-align: left;
  border: none;
  background: none;
  cursor: pointer;
  border-radius: 4px;
  width: 100%;
  transition: color 160ms ease;
}
.flow-axis__sub-step:hover { color: var(--accent); }
.flow-axis__sub-dot {
  display: none;
}
.flow-axis__sub-step.is-active .flow-axis__sub-dot {
  background: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-wash);
}
.flow-axis__sub-step.is-done .flow-axis__sub-dot {
  background: var(--accent);
}
.flow-axis__sub-label {
  font-size: var(--text-ui);
  font-weight: 400;
  color: var(--ink-3);
  line-height: 1.15;
  transition: color 0.2s ease;
}
.flow-axis__sub-step.is-active .flow-axis__sub-label {
  color: var(--ink);
  font-weight: 400;
}
.flow-axis__sub-step.is-done .flow-axis__sub-label {
  color: var(--ink-3);
}
@media (min-width: 1820px) {
  :root {
    --flow-axis-slot: calc(var(--flow-axis-width) + var(--flow-axis-gap));
  }
  .flow-axis {
    display: flex;
  }
}
@media (max-width: 1819px) {
  .flow-axis { display: none !important; }
}

/* Site footer — aligned with igopx.cn main site */
.site-footer {
  position: relative;
  width: 100%;
  margin-top: 0;
}
.site-footer__bar {
  position: relative;
  width: 100%;
  aspect-ratio: 1440 / 167.41;
  min-height: 167px;
  background-image: url("./assets/homepage-footer-contact.png");
  background-size: 100% 100%;
  background-repeat: no-repeat;
  background-position: center bottom;
}
.site-footer__links {
  position: absolute;
  left: clamp(16px, 5.5vw, 88px);
  top: clamp(14px, 2.6vw, 36px);
  display: flex;
  flex-direction: column;
  gap: clamp(4px, 0.5vw, 8px);
  z-index: 1;
  opacity: 0;
}
.site-footer__link-item {
  color: #fff;
  font-size: clamp(var(--text-tiny), 0.95vw, var(--text-ui));
  line-height: 1.45;
}
.site-footer__name {
  font-size: clamp(var(--text-caption), 1.05vw, var(--text-meta-lg));
  font-weight: 800;
}
.site-footer__label {
  opacity: 0.92;
}
.site-footer__link-item a {
  color: #fff;
  text-decoration: none;
}
.site-footer__link-item a:hover {
  color: #2d91ff;
}
@media (max-width: 767px) {
  .site-footer__bar {
    aspect-ratio: auto;
    min-height: 200px;
    background-size: cover;
    background-position: center;
  }
  .site-footer__links {
    max-width: 52%;
  }
}

/* Eyebrow */
.eyebrow {
  font-family: var(--mono);
  font-size: var(--text-meta-md);
  letter-spacing: 0.04em;
  color: var(--ink-3);
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.eyebrow::before {
  content: "";
  width: 18px; height: 1px;
  background: var(--accent);
  display: inline-block;
}
.eyebrow--plain::before { display: none; }

/* Section */
.section {
  padding: clamp(64px, 7vw, 96px) 0;
  border-top: 1px solid var(--rule);
  position: relative;
}
.section__head {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 48px;
  margin-bottom: 48px;
  align-items: end;
}
.section__head--stack {
  display: flex;
  flex-direction: column;
  gap: 0;
  align-items: flex-start;
  max-width: 720px;
}
.section__head--center {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  margin-bottom: 48px;
  gap: 0;
}
.section__label {
  font-family: var(--serif);
  font-size: var(--text-section);
  font-weight: 600;
  letter-spacing: 0;
  line-height: 1.08;
  color: var(--ink);
  text-wrap: balance;
  overflow-wrap: anywhere;
  margin-bottom: 14px;
}
.section__head--center .section__label {
  margin-bottom: 16px;
}
.section-title-stack {
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.section-title-stack .section__label,
.section-title-stack .section__title {
  margin: 0;
}
.section__num {
  font-family: var(--mono);
  font-size: var(--text-section-num);
  color: var(--ink-2);
  letter-spacing: 0.1em;
  font-weight: 500;
}
.section__title {
  font-family: var(--serif);
  font-size: var(--text-section);
  line-height: 1.08;
  letter-spacing: 0;
  font-weight: 600;
  text-wrap: balance;
  overflow-wrap: anywhere;
}
.section__head--stack .section__title,
.section__head--center .section__title {
  font-size: var(--text-section);
  font-weight: 600;
  color: var(--ink);
}
.section__title em {
  font-style: italic;
  color: var(--accent);
  font-weight: 500;
}
.section__sub {
  color: var(--ink-2);
  font-size: var(--text-lead);
  line-height: 1.7;
  max-width: 62ch;
  text-wrap: pretty;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px 22px;
  min-height: 44px;
  font-size: var(--text-ui);
  font-weight: 500;
  border-radius: 16px;
  transition: background 180ms ease, border-color 180ms ease, color 180ms ease, transform 180ms ease;
  line-height: 1;
}
.btn--primary {
  background: var(--accent);
  color: var(--paper);
}
.btn--primary:hover { background: var(--accent-ink); transform: translateY(-1px); }
.btn--ink {
  background: var(--ink);
  color: var(--paper);
}
.btn--ink:hover { background: var(--accent); }
.btn--ghost {
  background: transparent;
  color: var(--ink);
  border: 1px solid var(--rule);
}
.btn--ghost:hover { border-color: var(--ink); }

.path-back-select {
  width: 144px;
  justify-content: center;
  gap: 4px;
  font-size: var(--text-ui);
  font-weight: 500;
  padding: 14px 22px;
  white-space: nowrap;
}
.btn__arrow { transition: transform 180ms ease; }
.btn:hover .btn__arrow { transform: translateX(3px); }
.btn__arrow-up {
  flex-shrink: 0;
}
.path-back-select__text {
  display: inline;
}

.rule { height: 1px; background: var(--rule); }
.rule--dotted {
  height: 1px;
  background-image: linear-gradient(to right, var(--ink-4) 0, var(--ink-4) 4px, transparent 4px);
  background-size: 8px 1px;
  background-repeat: repeat-x;
}

/* Pain mode A/B toggle */
.pain-mode-block {
  display: flex;
  flex-direction: column;
  gap: 24px;
  margin-bottom: 32px;
}
.pain-mode {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: var(--space-lg);
  flex-wrap: nowrap;
  width: 100%;
}
.pain-mode__tabs {
  display: flex;
  flex-wrap: nowrap;
  gap: 12px;
  align-items: stretch;
  flex-shrink: 0;
}
.pain-mode__btn {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 24px;
  min-height: 44px;
  font-family: var(--sans);
  font-size: var(--text-ui);
  letter-spacing: 0;
  border-radius: 12px;
  transition: background 180ms ease, border-color 180ms ease, color 180ms ease;
  line-height: 1.35;
  white-space: nowrap;
  font-weight: 500;
}
.pain-mode__btn.is-selected {
  background: var(--accent);
  color: #fff;
  border: 1px solid var(--accent);
  box-shadow: none;
}
.pain-mode__btn.is-unselected {
  background: transparent;
  color: var(--accent);
  border: 1px solid var(--accent);
}
.pain-mode__btn.is-unselected:hover {
  background: var(--accent-wash);
  color: var(--accent);
}
.pain-mode__badge {
  position: absolute;
  top: -12px;
  left: 85px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: var(--text-caption);
  line-height: 1.5;
  letter-spacing: 0.1em;
  padding: 2px 8px;
  border-radius: 999px;
  background: var(--accent);
  color: #fff;
  font-weight: 500;
  white-space: nowrap;
  border: 0.5px solid #fff;
}
.pain-mode__btn.is-selected .pain-mode__badge {
  display: none;
}
.pain-mode__hint {
  display: flex;
  align-items: center;
  min-height: 44px;
  margin: 0;
  color: var(--ink-2);
  font-size: var(--text-ui);
  line-height: 1.55;
  text-wrap: pretty;
}
.pain-mode__hint strong { font-weight: 600; color: var(--accent-ink); }
.pain-mode__line {
  width: 100%;
  height: 1px;
  background: var(--rule);
}

/* Pain point cards — route match */
.pain-card {
  text-align: left;
  padding: 28px 26px 32px;
  transition: background 220ms ease, color 220ms ease, box-shadow 220ms ease;
  position: relative;
  min-height: 212px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 16px;
  border-radius: 0;
  border: none;
  color: #0b1f3a;
  cursor: pointer;
}

#pain.section {
  border-top: none;
  border-bottom: 1px solid var(--rule);
}
#pain .section__head--stack {
  align-items: center;
  text-align: center;
  max-width: none;
  gap: 24px;
  margin-bottom: 32px;
}
#pain .section__head--stack .section__sub {
  margin-top: 0 !important;
  max-width: 720px;
}
.pain-head__title {
  margin: 0;
  text-align: center;
}
.pain-head__sub {
  font-size: var(--text-subtitle);
  line-height: 1.65;
  color: var(--ink-2);
}
.pain-head__emph {
  color: var(--accent);
  font-weight: 700;
}
@media (max-width: 767px) {
  .pain-head__sub {
    font-size: var(--text-body);
    line-height: 1.6;
  }
}
.pain-card--selected {
  background: #1e5fd6;
  color: #fff;
  box-shadow: none;
}
.pain-card__head {
  display: flex;
  align-items: center;
  margin-bottom: 16px;
  font-family: var(--sans);
  font-size: var(--text-caption);
  font-weight: 400;
  line-height: 1.35;
  letter-spacing: 0;

/* Proof grid */
.proof-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);

  min-height: 338px;

}
#proof.section {

}
.proof-intro-head {

}
.proof-intro-head .proof-head-anchor.proto-anchor--block {

}
.proof-intro-head .proof-head__title {

.proof-head__sub {

}
.proof-card {

}
.proof-scores__cycle strong {

  font-size: 1.75rem;
  line-height: 1.2;
  font-weight: 600;
  letter-spacing: 0;

}
.proof-card-v2 {
  display: flex;

  gap: 20px;

.proof-card-v2::after {

.proof-card-v2:last-child::after { display: none; }
.proof-card-v2 .v2-score-strip {

.proof-card-v2 .v2-score-strip > div {

}
.proof-card-v2 .v2-score-strip > div:nth-child(3) {

}
.proof-card-v2 .v2-kicker {
  font-family: var(--sans);
  font-size: 13px;
  line-height: 20px;
  font-weight: 400;
  letter-spacing: 0;
  color: var(--ink-3);

}
.proof-card-v2 .v2-kicker--accent {

}
.proof-card-v2 .v2-before,
.proof-card-v2 .v2-after,
.proof-card-v2 .v2-weeks {

  font-size: var(--text-score);
  line-height: 1.12;
  letter-spacing: 0;
  text-align: center;

  font-feature-settings: "tnum" 1;
}
.proof-card-v2 .v2-before {
  color: var(--ink-4);

  text-decoration-color: currentColor;
  font-weight: 400;
}
.proof-card-v2 .v2-after {
  color: var(--ink);
  font-weight: 700;
}
.proof-card-v2 .v2-weeks {
  display: inline-flex;
  align-items: baseline;
  color: var(--ink-4);
  font-weight: 400;
}
.proof-card-v2 .v2-weeks__unit {
  font-family: var(--sans);
  font-size: 0.68em;
  font-weight: 400;
  margin-left: 1px;
}
.proof-card-v2 .v2-divider {
  height: 1px;
  flex: 0 0 1px;
  background: var(--rule-soft);
}
.proof-card-v2 .v2-quote {
  display: flex;
  align-items: center;
  min-height: 82px;
  margin: 0;
  color: var(--ink-2);
  font-family: var(--sans);
  font-size: 18px;
  line-height: 26px;
  font-weight: 400;
  letter-spacing: 0;
  text-wrap: pretty;
}
.proof-card-v2 .v2-person {
  display: flex;
  align-items: center;

}
.proof-card-v2 .v2-person__info {

}
.proof-card-v2 .v2-path-btn {

  display: inline-flex;

  justify-content: center;

  max-width: 46%;
  padding: 8px 14px 8px 10px;
  border: 1.5px solid var(--accent);

  background: var(--accent-wash);
  color: var(--accent-ink);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.35;
  font-weight: 600;
  text-align: center;
  text-decoration: none;
  white-space: nowrap;

}
.proof-card-v2 .v2-path-btn__icon {
  display: inline-flex;
  flex-shrink: 0;
  color: #1fc16b;
}
.proof-card-v2 .v2-path-btn:hover {
  border-color: var(--accent-ink);
  background: var(--accent);
  color: var(--paper);
  box-shadow: 0 4px 14px rgba(30, 95, 214, 0.28);

}
.proof-card-v2 .v2-path-btn:hover .v2-path-btn__icon {
  color: #4ade80;
}
.proof-card-v2 .v2-person img {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  object-fit: cover;
}
.proof-card-v2 .v2-name {
  color: var(--ink);
  font-size: 13.8px;
  line-height: 21.7px;
  font-weight: 600;
}
.proof-card-v2 .v2-role {

}
@media (max-width: 1023px) {
  .proof-head__title {
    font-size: var(--text-section);
    line-height: 1.08;
  }
  .proof-head__sub {
    font-size: var(--text-body);
    line-height: 1.6;
  }
  .proof-grid { grid-template-columns: repeat(2, 1fr); }
  .proof-card:nth-child(2) { border-right: none; }
  .proof-card:nth-child(3) {
    grid-column: 1 / -1;
    border-right: none;
    border-top: 1px solid var(--rule);
  }
  .proof-card-v2:nth-child(2) { border-right: none; }
  .proof-card-v2:nth-child(3) {
    grid-column: 1 / -1;
    border-right: none;
    border-top: 1px solid var(--rule);
  }
}
@media (max-width: 767px) {
  .proof-head__title {
    width: 100%;
    max-width: 100%;
    font-size: var(--text-section-mobile);
    line-height: 1.12;
  }
  .proof-grid { grid-template-columns: 1fr; min-height: auto; border-radius: 12px; }
  .proof-card {
    border-right: none;
    border-bottom: 1px solid var(--rule);
    min-height: auto;
    padding: 24px 20px;
  }
  .proof-card:last-child { border-bottom: none; }
  .proof-card:nth-child(3) { grid-column: auto; border-top: none; }
  .proof-card-v2 {
    min-height: auto;
    border-bottom: 1px solid var(--rule);
    padding: 24px 20px;
  }
  .proof-card-v2::after { display: none; }
  .proof-card-v2:last-child { border-bottom: none; }
  .proof-card-v2:nth-child(3) { grid-column: auto; border-top: none; }
  .proof-scores__cycle { margin-left: 0; width: 100%; }
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    scroll-behavior: auto !important;
    transition-duration: 0.001ms !important;
  }
}


@media (max-width: 767px) {
  .auth-modal-backdrop { padding: 12px; align-items: flex-end; }
  .auth-modal {
    border-bottom-left-radius: 0;
    border-bottom-right-radius: 0;
    max-height: 92vh;
  }
  .auth-modal__actions { grid-template-columns: 1fr; }
}

/* ── Prototype drip annotations (dev handoff only) ── */
.proto-wrap { position: relative; }
.proto-anchor {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  position: relative;
  vertical-align: middle;
  max-width: 100%;
}
.proto-anchor--block { display: flex; width: 100%; max-width: 100%; }
.proto-anchor--start { flex-direction: row-reverse; }
.proto-anchor--end { flex-direction: row; }
.proto-anchor--top { flex-direction: column-reverse; align-items: flex-start; }
.proto-anchor--bottom { flex-direction: column; align-items: flex-start; }
.proto-anchor__drips {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
  position: relative;
  z-index: 2080;
}
.proto-anchor__drips--row { flex-direction: row; gap: 6px; flex-wrap: wrap; }
.proto-drip--inline,
.proto-anchor .proto-drip {
  position: relative;
  top: auto;
  right: auto;
  bottom: auto;
  left: auto;
  flex-shrink: 0;
}
.proto-drip {
  position: absolute;
  z-index: 2080;
  width: 26px;
  height: 26px;
  padding: 0;
  border: 2px solid #fff;
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  box-shadow: 0 2px 10px rgba(11, 31, 58, 0.22);
  cursor: pointer;
  transition: transform 160ms ease, box-shadow 160ms ease;
}
.proto-drip:hover { transform: rotate(-45deg) scale(1.08); box-shadow: 0 4px 16px rgba(11, 31, 58, 0.28); }
.proto-drip--selected {
  z-index: 2092;
  outline: 3px solid #fff;
  outline-offset: 1px;
  animation: proto-drip-selected-pulse 1.35s ease-in-out infinite;
}
.proto-drip--selected:hover {
  transform: rotate(-45deg) scale(1.1);
}
@keyframes proto-drip-selected-pulse {
  0%, 100% { filter: brightness(1.05); }
  50% { filter: brightness(1.18); }
}
.proto-drip__icon {
  display: block;
  transform: rotate(45deg);
  font-size: var(--text-caption);
  line-height: 1.85;
  text-align: center;
  font-weight: 700;
  color: #fff;
  user-select: none;
}
.proto-drip--note { background: linear-gradient(135deg, #3b82f6, #1e5fd6); }
.proto-drip--todo { background: linear-gradient(135deg, #f59e0b, #c9580c); }
/* 系统标注：实心、标准尺寸、蓝/橙标准色 */
.proto-drip--system.proto-drip--note {
  background: linear-gradient(145deg, #3b82f6 0%, #1e5fd6 100%);
  border: 2px solid #fff;
  box-shadow: 0 2px 8px rgba(30, 95, 214, 0.38);
}
.proto-drip--system.proto-drip--todo {
  background: linear-gradient(145deg, #f59e0b 0%, #c9580c 100%);
  border: 2px solid #fff;
  box-shadow: 0 2px 8px rgba(201, 88, 12, 0.38);
}
/* 手写标注：更大、紫/珊瑚色、双环描边、不同图标 */
.proto-drip--manual {
  width: 30px;
  height: 30px;
  border: 2px solid #fff;
  outline: 2px dashed rgba(255, 255, 255, 0.95);
  outline-offset: 2px;
}
.proto-drip--manual.proto-drip--note {
  background: linear-gradient(145deg, #a78bfa 0%, #7c3aed 55%, #6d28d9 100%);
  box-shadow:
    0 0 0 2px #7c3aed,
    0 0 0 5px rgba(124, 58, 237, 0.22),
    0 4px 14px rgba(109, 40, 217, 0.42);
}
.proto-drip--manual.proto-drip--todo {
  background: linear-gradient(145deg, #fdba74 0%, #f97316 55%, #c2410c 100%);
  box-shadow:
    0 0 0 2px #ea580c,
    0 0 0 5px rgba(234, 88, 12, 0.2),
    0 4px 14px rgba(194, 65, 12, 0.4);
}
.proto-drip--manual .proto-drip__icon {
  font-size: 11px;
  line-height: 1.65;
  font-weight: 800;
}
/* 列表选中 → 页面水滴高亮（需高于系统/手写默认阴影优先级） */
.proto-drip--system.proto-drip--note.proto-drip--selected {
  box-shadow:
    0 0 0 3px #1d4ed8,
    0 0 0 6px #fff,
    0 0 0 9px rgba(29, 78, 216, 0.62),
    0 0 22px rgba(37, 99, 235, 0.55),
    0 8px 24px rgba(11, 31, 58, 0.34);
  animation: proto-drip-selected-ring-note 1.35s ease-in-out infinite;
}
.proto-drip--system.proto-drip--todo.proto-drip--selected {
  box-shadow:
    0 0 0 3px #c2410c,
    0 0 0 6px #fff,
    0 0 0 9px rgba(194, 65, 12, 0.58),
    0 0 22px rgba(249, 115, 22, 0.48),
    0 8px 24px rgba(11, 31, 58, 0.34);
  animation: proto-drip-selected-ring-todo 1.35s ease-in-out infinite;
}
.proto-drip--manual.proto-drip--note.proto-drip--selected {
  outline: 3px dashed #fff;
  outline-offset: 3px;
  box-shadow:
    0 0 0 3px #6d28d9,
    0 0 0 7px rgba(124, 58, 237, 0.55),
    0 0 26px rgba(124, 58, 237, 0.58),
    0 8px 24px rgba(109, 40, 217, 0.48);
  animation: proto-drip-selected-ring-note-manual 1.35s ease-in-out infinite;
}
.proto-drip--manual.proto-drip--todo.proto-drip--selected {
  outline: 3px dashed #fff;
  outline-offset: 3px;
  box-shadow:
    0 0 0 3px #c2410c,
    0 0 0 7px rgba(234, 88, 12, 0.52),
    0 0 26px rgba(249, 115, 22, 0.52),
    0 8px 24px rgba(194, 65, 12, 0.45);
  animation: proto-drip-selected-ring-todo-manual 1.35s ease-in-out infinite;
}
.proto-drip--floating.proto-drip--selected {
  z-index: 2095;
}
@keyframes proto-drip-selected-ring-note {
  0%, 100% { box-shadow: 0 0 0 3px #1d4ed8, 0 0 0 6px #fff, 0 0 0 9px rgba(29, 78, 216, 0.62), 0 0 22px rgba(37, 99, 235, 0.55), 0 8px 24px rgba(11, 31, 58, 0.34); }
  50% { box-shadow: 0 0 0 3px #1d4ed8, 0 0 0 6px #fff, 0 0 0 13px rgba(29, 78, 216, 0.28), 0 0 30px rgba(37, 99, 235, 0.62), 0 8px 28px rgba(11, 31, 58, 0.38); }
}
@keyframes proto-drip-selected-ring-todo {
  0%, 100% { box-shadow: 0 0 0 3px #c2410c, 0 0 0 6px #fff, 0 0 0 9px rgba(194, 65, 12, 0.58), 0 0 22px rgba(249, 115, 22, 0.48), 0 8px 24px rgba(11, 31, 58, 0.34); }
  50% { box-shadow: 0 0 0 3px #c2410c, 0 0 0 6px #fff, 0 0 0 13px rgba(194, 65, 12, 0.26), 0 0 30px rgba(249, 115, 22, 0.58), 0 8px 28px rgba(11, 31, 58, 0.38); }
}
@keyframes proto-drip-selected-ring-note-manual {
  0%, 100% { box-shadow: 0 0 0 3px #6d28d9, 0 0 0 7px rgba(124, 58, 237, 0.55), 0 0 26px rgba(124, 58, 237, 0.58), 0 8px 24px rgba(109, 40, 217, 0.48); }
  50% { box-shadow: 0 0 0 3px #6d28d9, 0 0 0 11px rgba(124, 58, 237, 0.32), 0 0 34px rgba(124, 58, 237, 0.66), 0 8px 28px rgba(109, 40, 217, 0.55); }
}
@keyframes proto-drip-selected-ring-todo-manual {
  0%, 100% { box-shadow: 0 0 0 3px #c2410c, 0 0 0 7px rgba(234, 88, 12, 0.52), 0 0 26px rgba(249, 115, 22, 0.52), 0 8px 24px rgba(194, 65, 12, 0.45); }
  50% { box-shadow: 0 0 0 3px #c2410c, 0 0 0 11px rgba(234, 88, 12, 0.3), 0 0 34px rgba(249, 115, 22, 0.62), 0 8px 28px rgba(194, 65, 12, 0.52); }
}
.proto-drip--floating.proto-drip--manual:hover {
  filter: brightness(1.1) saturate(1.05);
}
.proto-drip--tl { top: 10px; left: 10px; }
.proto-drip--tr { top: 10px; right: 10px; }
.proto-drip--bl { bottom: 10px; left: 10px; }
.proto-drip--br { bottom: 10px; right: 10px; }

/* Motion layer — click feedback, state transitions, and one hero entrance */
button,
a[href],
.plan-upload-slot {
  -webkit-tap-highlight-color: transparent;
}

:where(button, a[href], .plan-upload-slot):focus-visible {
  transition: outline-color var(--motion-fast) var(--ease-out-quart), outline-offset var(--motion-fast) var(--ease-out-quart);
}

.motion-ripple-host,
[data-motion-ripple-host="true"] {
  --ripple-color: color-mix(in srgb, var(--accent) 24%, transparent);
  --ripple-duration: 820ms;
  --ease-ripple: cubic-bezier(0.16, 0, 0.16, 1);
  position: relative;
  isolation: isolate;
}

.motion-ripple-layer {
  position: absolute;
  inset: 0;
  z-index: 12;
  border-radius: inherit;
  pointer-events: none;
  overflow: hidden;
  contain: layout paint style;
}

.motion-ripple-layer > .motion-ripple {
  position: absolute;
  left: var(--ripple-x, 50%);
  top: var(--ripple-y, 50%);
  width: var(--ripple-size, 120px);
  height: var(--ripple-size, 120px);
  border-radius: 999px;
  pointer-events: none;
  background: var(--ripple-color);
  opacity: 0;
  transform: translate(-50%, -50%) scale(0);
  animation: material-ripple var(--ripple-duration) var(--ease-ripple) both;
  will-change: transform, opacity;
}

.btn--ink,
.btn--primary,
.nav__cta,
.pain-mode__btn.is-selected,
.pain-card--selected,
.hero-player__play,
.plan-modal .btn--ink {
  --ripple-color: rgba(255, 255, 255, 0.34);
}

.hero-player__play.motion-ripple-host,
.hero-player__play[data-motion-ripple-host="true"] {
  position: absolute;
}

button.is-pressing:not(.hero-player__play):not(.proto-drip),
button[data-motion-pressing="true"]:not(.hero-player__play):not(.proto-drip),
a.is-pressing,
a[data-motion-pressing="true"],
.plan-upload-slot.is-pressing,
.plan-upload-slot[data-motion-pressing="true"] {
  transform: none;
}

.hero-player__play.is-pressing,
.hero-player__play[data-motion-pressing="true"] {
  transform: translate(-50%, -50%) scale(0.94);
}

.hero-player__play-wrap .hero-player__play.is-pressing,
.hero-player__play-wrap .hero-player__play[data-motion-pressing="true"] {
  transform: scale(0.94);
}

.proto-drip.is-pressing,
.proto-drip[data-motion-pressing="true"] {
  transform: rotate(-45deg) scale(0.94);
}

.btn,
.nav__cta,
.pain-mode__btn,
.pain-card,
.quiz-option,
.playlist-item,
.path-index__item,

const CLICK_FEEDBACK_SELECTOR = [
  "button:not(:disabled)",
  "a[href]",
  ".plan-upload-slot",
].join(",");

function prefersReducedMotion() {
  return window.matchMedia?.("(prefers-reduced-motion: reduce)")?.matches ?? false;
}

function scrollBehavior() {
  return prefersReducedMotion() ? "auto" : "smooth";
}

function useClickMotionFeedback() {
  useEffect(() => {
    if (prefersReducedMotion()) return;

    const removeRipples = (target) => {
      Array.from(target.children).forEach((child) => {
        if (child.classList?.contains("motion-ripple-layer")) child.remove();
      });
    };

    const hasOwnRipple = (target) => (
      Array.from(target.children).some((child) => child.classList?.contains("motion-ripple-layer"))
    );

    const clearTarget = (target) => {
      window.clearTimeout(target.__motionPressTimer);
      window.clearTimeout(target.__motionHostTimer);
      removeRipples(target);
      target.classList.remove("is-pressing", "motion-ripple-host");
      delete target.dataset.motionPressing;
      delete target.dataset.motionRippleHost;
    };

    const primeTarget = (target, clientX, clientY) => {
      if (!target || target.closest("[aria-disabled='true']")) return;
      const rect = target.getBoundingClientRect();
      const rawX = Number.isFinite(clientX) ? clientX - rect.left : rect.width / 2;
      const rawY = Number.isFinite(clientY) ? clientY - rect.top : rect.height / 2;
      const x = Math.max(0, Math.min(rect.width, rawX));
      const y = Math.max(0, Math.min(rect.height, rawY));
      const farX = Math.max(x, rect.width - x);
      const farY = Math.max(y, rect.height - y);
      const rippleSize = Math.ceil(Math.hypot(farX, farY) * 2);

      removeRipples(target);
      target.classList.add("motion-ripple-host", "is-pressing");
      target.dataset.motionRippleHost = "true";
      target.dataset.motionPressing = "true";

      const layer = document.createElement("span");
      layer.className = "motion-ripple-layer";
      layer.setAttribute("aria-hidden", "true");

      const ripple = document.createElement("span");
      ripple.className = "motion-ripple";
      ripple.style.setProperty("--ripple-x", `${x}px`);
      ripple.style.setProperty("--ripple-y", `${y}px`);
      ripple.style.setProperty("--ripple-size", `${Math.max(32, rippleSize)}px`);
      layer.appendChild(ripple);
      target.appendChild(layer);

      ripple.addEventListener("animationend", () => {
        layer.remove();
        if (!hasOwnRipple(target)) {
          target.classList.remove("motion-ripple-host");
          delete target.dataset.motionRippleHost;
        }
      }, { once: true });

      window.clearTimeout(target.__motionPressTimer);
      window.clearTimeout(target.__motionHostTimer);
      target.__motionPressTimer = window.setTimeout(() => {
        target.classList.remove("is-pressing");
        delete target.dataset.motionPressing;
      }, 140);
      target.__motionHostTimer = window.setTimeout(() => {
        target.classList.remove("motion-ripple-host");
        delete target.dataset.motionRippleHost;
        removeRipples(target);
      }, 940);
    };

    const onPointerDown = (event) => {
      if (event.button !== undefined && event.button !== 0) return;
      if (!(event.target instanceof Element)) return;
      const target = event.target.closest(CLICK_FEEDBACK_SELECTOR);
      if (!target) return;
      primeTarget(target, event.clientX, event.clientY);
    };

    const onPointerEnd = (event) => {
      if (!(event.target instanceof Element)) return;
      const target = event.target.closest(CLICK_FEEDBACK_SELECTOR);
      if (target) {
        window.clearTimeout(target.__motionPressTimer);
        target.classList.remove("is-pressing");
        delete target.dataset.motionPressing;
      }
    };

    const onKeyDown = (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      if (event.repeat) return;
      if (!(document.activeElement instanceof Element)) return;
      const target = document.activeElement.closest(CLICK_FEEDBACK_SELECTOR);
      if (!target) return;
      const rect = target.getBoundingClientRect();
      primeTarget(target, rect.left + rect.width / 2, rect.top + rect.height / 2);
    };

    const onKeyUp = () => {
      if (document.activeElement instanceof Element) {
        const target = document.activeElement.closest(CLICK_FEEDBACK_SELECTOR);
        if (target) {
          target.classList.remove("is-pressing");
          delete target.dataset.motionPressing;
        }
      }
    };

    document.addEventListener("pointerdown", onPointerDown, { passive: true });
    document.addEventListener("pointerup", onPointerEnd, { passive: true });
    document.addEventListener("pointercancel", onPointerEnd, { passive: true });
    document.addEventListener("keydown", onKeyDown);
    document.addEventListener("keyup", onKeyUp);

    return () => {
      document.removeEventListener("pointerdown", onPointerDown);
      document.removeEventListener("pointerup", onPointerEnd);
      document.removeEventListener("pointercancel", onPointerEnd);
      document.removeEventListener("keydown", onKeyDown);
      document.removeEventListener("keyup", onKeyUp);
      document.querySelectorAll(".motion-ripple-host, .is-pressing, [data-motion-ripple-host='true'], [data-motion-pressing='true']").forEach(clearTarget);
    };
  }, []);
}

const PROTO_DRIP_LS_KEY = "proto-drip-store-v1";
const PROTO_DRIP_USER_KEY = "proto-drip-username";

function protoDripEmptyStore() {
  return { version: 1, notes: [], todos: [] };
}

function protoDripLoadEmbedded() {
  const el = document.getElementById("proto-drip-store");
  if (!el) return protoDripEmptyStore();
  try {
    const data = JSON.parse(el.textContent.trim());
    return { version: data.version || 1, notes: data.notes || [], todos: data.todos || [] };
  } catch {
    return protoDripEmptyStore();
  }
}

function protoDripLoadStore() {
  const embedded = protoDripLoadEmbedded();
  try {
    const raw = localStorage.getItem(PROTO_DRIP_LS_KEY);
    if (!raw) {
      return {
        version: embedded.version || 1,
        notes: embedded.notes.map((n, i) => protoDripEnsureTimestamps(n, PROTO_DRIP_SYSTEM_EPOCH + i * 60000)),
        todos: embedded.todos.map((t, i) => protoDripEnsureTimestamps(t, PROTO_DRIP_SYSTEM_EPOCH + i * 60000)),
      };
    }
    const local = JSON.parse(raw);
    const notes = Array.isArray(local.notes) ? local.notes : embedded.notes;
    const todos = Array.isArray(local.todos) ? local.todos : embedded.todos;
    return {
      version: local.version || 1,
      notes: notes.map((n, i) => protoDripEnsureTimestamps(n, PROTO_DRIP_SYSTEM_EPOCH + i * 60000)),
      todos: todos.map((t, i) => protoDripEnsureTimestamps(t, PROTO_DRIP_SYSTEM_EPOCH + i * 60000)),
    };
  } catch {
    return {
      version: embedded.version || 1,
      notes: embedded.notes.map((n, i) => protoDripEnsureTimestamps(n, PROTO_DRIP_SYSTEM_EPOCH + i * 60000)),
      todos: embedded.todos.map((t, i) => protoDripEnsureTimestamps(t, PROTO_DRIP_SYSTEM_EPOCH + i * 60000)),
    };
  }
}

function protoDripSaveStore(store) {
  try {
    localStorage.setItem(PROTO_DRIP_LS_KEY, JSON.stringify(store));
  } catch { /* quota */ }
}

function protoDripNextId(items, prefix) {
  const nums = items
    .map((i) => parseInt(String(i.id || "").replace(prefix, ""), 10))
    .filter((n) => !Number.isNaN(n));
  const next = (nums.length ? Math.max(...nums) : 0) + 1;
  return `${prefix}${String(next).padStart(3, "0")}`;
}

function protoDripNowIso() {
  return new Date().toISOString();
}

function protoDripEnsureTimestamps(item, fallbackMs) {
  if (!item) return item;
  const fallbackIso = new Date(fallbackMs || Date.now()).toISOString();
  const createdAt = item.createdAt || item.updatedAt || fallbackIso;
  const updatedAt = item.updatedAt || createdAt;
  return { ...item, createdAt, updatedAt };
}

const PROTO_DRIP_SYSTEM_EPOCH = Date.parse("2026-05-28T08:00:00Z");

function protoDripStampSystemTodos() {
  Object.entries(PAGE_TODOS).forEach(([, t], i) => {
    if (!t.updatedAt) {
      const ts = new Date(PROTO_DRIP_SYSTEM_EPOCH + i * 3600000).toISOString();
      t.createdAt = ts;
      t.updatedAt = ts;
    } else {
      t.createdAt = t.createdAt || t.updatedAt;
    }
  });
}
protoDripStampSystemTodos();

function protoDripFmtTime(iso) {
  if (!iso) return "—";
  try {
    const d = new Date(iso);
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")} ${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
  } catch {
    return iso;
  }
}

function protoDripIsHtmlContent(content) {
  if (!content || typeof content !== "string") return false;
  const s = content.trim();
  return /<img[\s>]/i.test(s) || (s.startsWith("<") && /<\/[a-z][\s\S]*>/i.test(s));
}

function protoDripContentPlain(content) {
  if (!content) return "";
  if (!protoDripIsHtmlContent(content)) return content;
  const div = document.createElement("div");
  div.innerHTML = content;
  return (div.textContent || "").replace(/\s+/g, " ").trim();
}

function protoDripContentToEditorHtml(content) {
  if (!content) return "";
  if (protoDripIsHtmlContent(content)) return content;
  return content
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\n/g, "<br>");
}

function protoDripSanitizeRichHtml(html) {
  if (!html) return "";
  const doc = new DOMParser().parseFromString(`<div id="proto-rich-root">${html}</div>`, "text/html");
  const root = doc.getElementById("proto-rich-root");
  if (!root) return "";
  const allowed = new Set(["IMG", "BR", "P", "DIV", "B", "STRONG", "I", "EM", "UL", "OL", "LI", "SPAN", "#text"]);
  const walk = (node) => {
    if (node.nodeType === Node.TEXT_NODE) return;
    if (node.nodeType !== Node.ELEMENT_NODE) {
      node.remove();
      return;
    }
    if (!allowed.has(node.tagName)) {
      const parent = node.parentNode;
      if (!parent) return;
      while (node.firstChild) {
        const child = node.firstChild;
        parent.insertBefore(child, node);
        walk(child);
      }
      parent.removeChild(node);
      return;
    }
    [...node.attributes].forEach((attr) => {
      const name = attr.name.toLowerCase();
      if (name.startsWith("on") || name === "style" || name === "class" || name === "id") {
        node.removeAttribute(attr.name);
      }
    });
    if (node.tagName === "IMG") {
      const src = node.getAttribute("src") || "";
      if (!src.startsWith("data:image/")) {
        node.remove();
        return;
      }
      node.setAttribute("alt", node.getAttribute("alt") || "粘贴图片");
    }
    [...node.childNodes].forEach(walk);
  };
  [...root.childNodes].forEach(walk);
  return root.innerHTML.trim();
}

function protoDripCompressImageFile(file, maxW = 960, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxW) {
          height = Math.round((height * maxW) / width);
          width = maxW;
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        if (!ctx) {
          reject(new Error("canvas"));
          return;
        }
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function protoDripInsertImageInEditor(root, dataUrl) {
  if (!root) return;
  root.focus();
  const img = document.createElement("img");
  img.src = dataUrl;
  img.alt = "粘贴图片";
  const sel = window.getSelection();
  if (!sel || sel.rangeCount === 0) {
    root.appendChild(img);
    return;
  }
  const range = sel.getRangeAt(0);
  if (!root.contains(range.commonAncestorContainer)) {
    root.appendChild(img);
    return;
  }
  range.deleteContents();
  range.insertNode(img);
  const spacer = document.createTextNode("\n");
  img.after(spacer);
  range.setStartAfter(spacer);
  range.collapse(true);
  sel.removeAllRanges();
  sel.addRange(range);
}

function DripRichBody({ content, className = "proto-modal__rich" }) {
  if (!content) return null;
  if (protoDripIsHtmlContent(content)) {
    return (
      <div
        className={className}
        dangerouslySetInnerHTML={{ __html: protoDripSanitizeRichHtml(content) }}
      />
    );
  }
  return <div className="proto-modal__text">{content}</div>;
}

function DripRichEditor({ value, onChange, editorKey, placeholder }) {
  const ref = useRef(null);
  const lastKeyRef = useRef(null);

  useEffect(() => {
    if (!ref.current || lastKeyRef.current === editorKey) return;
    lastKeyRef.current = editorKey;
    ref.current.innerHTML = protoDripContentToEditorHtml(value || "");
  }, [editorKey, value]);

  const sync = () => {
    if (!ref.current) return;
    onChange(protoDripSanitizeRichHtml(ref.current.innerHTML));
  };

  const onPaste = async (e) => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (!item.type.startsWith("image/")) continue;
      e.preventDefault();
      const file = item.getAsFile();
      if (!file) return;
      try {
        const dataUrl = await protoDripCompressImageFile(file);
        protoDripInsertImageInEditor(ref.current, dataUrl);
        sync();
      } catch {
        /* ignore bad image */
      }
      return;
    }
  };

  return (
    <div className="proto-rich-editor-wrap">
      <div
        ref={ref}
        className="proto-rich-editor"
        contentEditable
        role="textbox"
        aria-multiline="true"
        data-placeholder={placeholder}
        onInput={sync}
        onBlur={sync}
        onPaste={onPaste}
      />
      <div className="proto-toolbar__hint">支持直接粘贴截图/图片（Ctrl+V / ⌘V）</div>
    </div>
  );
}

function protoDripGenSelector(el) {
  if (!(el instanceof Element)) return "";
  if (el.id) return `#${CSS.escape(el.id)}`;
  const parts = [];
  let node = el;
  while (node && node.nodeType === 1 && node !== document.body) {
    let part = node.tagName.toLowerCase();
    if (node.id) {
      parts.unshift(`#${CSS.escape(node.id)}`);
      break;
    }
    if (node.className && typeof node.className === "string") {
      const cls = node.className.trim().split(/\s+/).find((c) => c && !c.startsWith("proto-"));
      if (cls) part += `.${CSS.escape(cls)}`;
    }
    const parent = node.parentElement;
    if (parent) {
      const idx = [...parent.children].indexOf(node) + 1;
      part += `:nth-child(${idx})`;
    }
    parts.unshift(part);
    node = parent;
    if (parts.length >= 5) break;
  }
  return parts.join(" > ");
}

function protoDripHumanizeClass(cls) {
  const part = (cls.split("__").pop() || cls).split("--")[0];
  return part.replace(/[-_]+/g, " ").trim();
}

function protoDripLabelFromElement(el, { shallow = false } = {}) {
  if (!(el instanceof Element)) return "";
  const aria = el.getAttribute("aria-label")?.trim();
  if (aria) return aria.slice(0, 48);
  const titleAttr = el.getAttribute("title")?.trim();
  if (titleAttr) return titleAttr.slice(0, 48);
  const alt = el.getAttribute("alt")?.trim();
  if (alt) return alt.slice(0, 48);
  const placeholder = el.getAttribute("placeholder")?.trim();
  if (placeholder) return placeholder.slice(0, 48);

  if (shallow) {
    const direct = [...el.childNodes]
      .filter((n) => n.nodeType === Node.TEXT_NODE)
      .map((n) => n.textContent.trim())
      .join(" ")
      .replace(/\s+/g, " ")
      .trim();
    if (direct) return direct.slice(0, 48);
  } else {
    const text = (el.innerText || el.textContent || "").trim().replace(/\s+/g, " ");
    if (text) return text.slice(0, 48);
  }

  if (el.id) return el.id;
  if (typeof el.className === "string" && el.className.trim()) {
    const cls = el.className.trim().split(/\s+/).find((c) => c && !c.startsWith("proto-"));
    if (cls) return protoDripHumanizeClass(cls).slice(0, 48);
  }
  return el.tagName.toLowerCase();
}

function protoDripAnchorZone(el) {
  const zoneEl = el.closest("section[id], nav, footer, header, [id^='path-']");
  if (!(zoneEl instanceof Element)) return "";
  const id = zoneEl.id || "";
  const zoneMap = { hero: "Hero", pain: "问题匹配", paths: "学习路径", proof: "学员故事" };
  if (zoneMap[id]) return zoneMap[id];
  if (id.startsWith("path-")) return `路径 ${id.replace("path-", "").padStart(2, "0")}`;
  if (zoneEl.tagName === "NAV") return "导航";
  if (zoneEl.tagName === "FOOTER") return "页脚";
  if (zoneEl.tagName === "HEADER") return "页头";
  return id;
}

function protoDripAnchorLabel(el) {
  if (!(el instanceof Element)) return "页面元素";
  const zone = protoDripAnchorZone(el);
  let node = el;
  for (let i = 0; i < 12 && node && node !== document.body; node = node.parentElement, i += 1) {
    const label = protoDripLabelFromElement(node, { shallow: i === 0 });
    const isGeneric = /^(div|span|section|article|main|aside)$/i.test(label);
    if (label && !isGeneric) {
      return zone ? `${zone} · ${label}` : label;
    }
  }
  const fallback = protoDripLabelFromElement(el);
  const isGeneric = /^(div|span|section|article|main|aside)$/i.test(fallback);
  const text = isGeneric ? (zone ? `${zone} · 区域` : "页面区域") : fallback;
  return text.slice(0, 64);
}

function protoDripPickTarget(el) {
  if (!(el instanceof Element)) return null;
  if (el === document.body || el === document.documentElement) return null;
  const semantic = el.closest(
    "button, a, [role='button'], h1, h2, h3, h4, h5, h6, p, label, li, nav, footer, header, section, article, img, video, input, [class*='btn'], [class*='cta'], [class*='title'], [class*='tagline']"
  );
  if (semantic) return semantic;
  let node = el;
  for (let i = 0; i < 10 && node && node !== document.body; node = node.parentElement, i += 1) {
    const label = protoDripLabelFromElement(node, { shallow: true });
    if (label && !/^(div|span)$/i.test(label)) return node;
  }
  return el;
}

const PROTO_PAGE_MODULES = [
  { id: "nav", label: "导航", selector: "nav.nav" },
  { id: "flow-axis", label: "流程导航轴", selector: "nav.flow-axis" },
  { id: "hero", label: "Hero · 公开课", selector: "#hero" },
  { id: "pain", label: "问题匹配", selector: "#pain" },
  { id: "paths", label: "学习路径", selector: "#paths" },
  { id: "proof", label: "学员故事", selector: "#proof" },
  { id: "footer", label: "页脚", selector: "footer.site-footer" },
];

function protoDripInferModuleFromPrd(prd = []) {
  const text = (prd || []).join(" ");
  if (/§2\.1|导航/.test(text)) return { moduleId: "nav", moduleLabel: "导航" };
  if (/功能\s*1|Hero|实体\s*1/.test(text)) return { moduleId: "hero", moduleLabel: "Hero · 公开课" };
  if (/功能\s*3|匹配计分|验算用例/.test(text)) return { moduleId: "pain", moduleLabel: "问题匹配" };
  if (/路径\s*02|路径02|功能\s*5\.1/.test(text)) return { moduleId: "path-1", moduleLabel: "学习路径 · 路径 02" };
  if (/路径\s*01|路径01/.test(text)) return { moduleId: "path-0", moduleLabel: "学习路径 · 路径 01" };
  if (/路径\s*03|路径03/.test(text)) return { moduleId: "path-2", moduleLabel: "学习路径 · 路径 03" };
  if (/路径\s*04|路径04/.test(text)) return { moduleId: "path-3", moduleLabel: "学习路径 · 路径 04" };
  if (/路径\s*05|路径05/.test(text)) return { moduleId: "path-4", moduleLabel: "学习路径 · 路径 05" };
  if (/路径\s*06|路径06/.test(text)) return { moduleId: "path-5", moduleLabel: "学习路径 · 路径 06" };
  if (/功能\s*5|学习路径|§5/.test(text)) return { moduleId: "paths", moduleLabel: "学习路径" };
  if (/功能\s*6|学员故事/.test(text)) return { moduleId: "proof", moduleLabel: "学员故事" };
  if (/功能\s*7|页脚|联名标识/.test(text)) return { moduleId: "footer", moduleLabel: "页脚" };
  if (/§4\.3|埋点/.test(text)) return { moduleId: "tracking", moduleLabel: "埋点" };
  return { moduleId: "page", moduleLabel: "页面" };
}

function protoDripResolveItemModule(item, prd) {
  if (item?.anchor?.moduleLabel) {
    return { moduleId: item.anchor.moduleId || item.anchor.moduleLabel, moduleLabel: item.anchor.moduleLabel };
  }
  if (item?.moduleLabel) {
    return { moduleId: item.moduleId || item.moduleLabel, moduleLabel: item.moduleLabel };
  }
  return protoDripInferModuleFromPrd(prd || item?.prd || []);
}

function protoDripListSortTime(item) {
  if (item?.updatedAt) {
    const t = new Date(item.updatedAt).getTime();
    if (!Number.isNaN(t)) return t;
  }
  if (item?.createdAt) {
    const t = new Date(item.createdAt).getTime();
    if (!Number.isNaN(t)) return t;
  }
  if (item?.registeredAt) return item.registeredAt;
  return 0;
}

function protoDripModuleFilterOptions() {
  const opts = [{ id: "", label: "全部模块" }];
  PROTO_PAGE_MODULES.forEach((m) => opts.push({ id: m.id, label: m.label }));
  for (let i = 0; i < 6; i += 1) {
    const id = `path-${i}`;
    const n = String(i + 1).padStart(2, "0");
    opts.push({ id, label: `学习路径 · 路径 ${n}` });
  }
  opts.push({ id: "tracking", label: "埋点" });
  return opts;
}

function protoDripModuleMatches(filterId, itemModuleId) {
  if (!filterId) return true;
  if (filterId === "paths") return itemModuleId === "paths" || /^path-\d+$/.test(itemModuleId || "");
  return itemModuleId === filterId;
}

function protoDripPathModuleLabel(pathEl) {
  const idx = Number(pathEl.id.replace("path-", ""));
  const n = Number.isFinite(idx) ? String(idx + 1).padStart(2, "0") : pathEl.id.replace("path-", "");
  return `学习路径 · 路径 ${n}`;
}

function protoDripModuleContainers() {
  const list = PROTO_PAGE_MODULES.map((m) => {
    const el = document.querySelector(m.selector);
    return el ? { id: m.id, label: m.label, el } : null;
  }).filter(Boolean);
  document.querySelectorAll("[id^='path-']").forEach((pathEl) => {
    if (!/^path-\d+$/.test(pathEl.id)) return;
    list.push({ id: pathEl.id, label: protoDripPathModuleLabel(pathEl), el: pathEl });
  });
  return list;
}

function protoDripDetectModule(el, clientX, clientY) {
  if (el instanceof Element) {
    const pathEl = el.closest("[id^='path-']");
    if (pathEl?.id && /^path-\d+$/.test(pathEl.id)) {
      return { moduleId: pathEl.id, moduleLabel: protoDripPathModuleLabel(pathEl) };
    }
    for (const mod of PROTO_PAGE_MODULES) {
      const container = document.querySelector(mod.selector);
      if (container?.contains(el)) {
        return { moduleId: mod.id, moduleLabel: mod.label };
      }
    }
  }

  const modules = protoDripModuleContainers();
  for (const mod of modules) {
    const r = mod.el.getBoundingClientRect();
    if (clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom) {
      return { moduleId: mod.id, moduleLabel: mod.label };
    }
  }

  let best = { moduleId: "page", moduleLabel: "页面" };
  let bestDist = Infinity;
  modules.forEach((mod) => {
    const r = mod.el.getBoundingClientRect();
    const cx = r.left + r.width / 2;
    const cy = r.top + r.height / 2;
    const dist = Math.hypot(clientX - cx, clientY - cy);
    if (dist < bestDist) {
      bestDist = dist;
      best = { moduleId: mod.id, moduleLabel: mod.label };
    }
  });
  return best;
}

function protoDripPickBlocked(el) {
  return !!(el instanceof Element && el.closest(
    ".proto-toolbar, .proto-list-panel, .proto-modal, .proto-editor, .proto-toast, .proto-pick-banner, .tweak-dock"
  ));
}

function protoDripElementFromPoint(clientX, clientY) {
  const stack = document.elementsFromPoint(clientX, clientY);
  return stack.find((node) => node instanceof Element && !protoDripPickBlocked(node) && !node.classList.contains("proto-pick-overlay")) || null;
}

function protoDripCaptureAnchorRect(el) {
  if (!(el instanceof Element)) return {};
  const r = el.getBoundingClientRect();
  return {
    docX: r.left + window.scrollX,
    docY: r.top + window.scrollY,
    w: r.width,
    h: r.height,
  };
}

function protoDripResolveAnchorElement(anchor, id) {
  if (!anchor && !id) return null;
  const tries = [
    id ? `[data-proto-drip-anchor="${id}"]` : null,
    anchor?.stampedSelector,
    anchor?.selector,
    anchor?.fallbackSelector,
  ].filter(Boolean);
  for (const sel of tries) {
    try {
      const el = document.querySelector(sel);
      if (el instanceof Element) return el;
    } catch { /* invalid selector */ }
  }
  return null;
}

function protoDripStampAnchor(anchor, id) {
  if (!anchor || !id) return anchor;
  const el = protoDripResolveAnchorElement(anchor, id);
  if (!(el instanceof Element)) return anchor;
  el.setAttribute("data-proto-drip-anchor", id);
  const stampedSelector = `[data-proto-drip-anchor="${id}"]`;
  return {
    ...anchor,
    stampedSelector,
    selector: stampedSelector,
    fallbackSelector: anchor.fallbackSelector || anchor.selector,
  };
}

function protoDripResolveOrNearest(anchor, id) {
  const el = protoDripResolveAnchorElement(anchor, id);
  if (el) return el;
  if (!anchor || typeof anchor.docX !== "number" || typeof anchor.docY !== "number") return null;
  const cx = anchor.docX - window.scrollX + (anchor.w || 24) / 2;
  const cy = anchor.docY - window.scrollY + (anchor.h || 24) / 2;
  const hit = document.elementFromPoint(cx, cy);
  if (!(hit instanceof Element) || protoDripPickBlocked(hit)) return null;
  return protoDripPickTarget(hit) || hit;
}

function protoDripEnsureMount(anchorEl, dripId, pos) {
  const posKey = ["tl", "tr", "bl", "br"].includes(pos) ? pos : "tr";
  const mountId = `proto-drip-mount-${dripId}`;
  let mount = document.getElementById(mountId);
  if (mount && mount.parentElement === anchorEl) {
    mount.className = `proto-manual-drip-mount proto-manual-drip-mount--${posKey}`;
    return mount;
  }
  if (mount) mount.remove();

  const style = getComputedStyle(anchorEl);
  if (style.position === "static") {
    anchorEl.style.position = "relative";
    anchorEl.dataset.protoDripPositioned = "1";
  }

  mount = document.createElement("span");
  mount.id = mountId;
  mount.className = `proto-manual-drip-mount proto-manual-drip-mount--${posKey}`;
  anchorEl.appendChild(mount);
  return mount;
}

function protoDripTeardownMount(dripId) {
  const mount = document.getElementById(`proto-drip-mount-${dripId}`);
  if (!mount) return;
  const parent = mount.parentElement;
  mount.remove();
  if (parent?.dataset.protoDripPositioned === "1") {
    const stillHas = parent.querySelector(".proto-manual-drip-mount");
    if (!stillHas) {
      parent.style.position = "";
      delete parent.dataset.protoDripPositioned;
    }
  }
}

function protoDripScrollTargets(anchor, id) {
  const targets = new Set([window, document, document.documentElement, document.body]);
  const el = protoDripResolveAnchorElement(anchor, id);
  let node = el;
  while (node) {
    if (node instanceof Element) {
      const s = getComputedStyle(node);
      if (/(auto|scroll|overlay)/.test(`${s.overflow}${s.overflowY}${s.overflowX}`)) targets.add(node);
    }
    node = node.parentElement;
  }
  if (window.visualViewport) targets.add(window.visualViewport);
  return [...targets];
}

function protoDripPositionManualNode(node, item, kind) {
  if (!node) return;
  const pos = item.anchor?.pos || (kind === "note" ? "tr" : "br");
  const pt = protoDripAnchorCoords(item.anchor, pos, 30, 6, item.id);
  if (!pt) {
    node.style.visibility = "hidden";
    return;
  }
  node.style.left = `${pt.left}px`;
  node.style.top = `${pt.top}px`;
  node.style.transform = "rotate(-45deg)";
  node.style.visibility = "visible";
}

function protoDripBindManualLayerSync(getItems, getNode, onApply) {
  let rafId = 0;
  let scrollActive = false;
  let scrollEndTimer = 0;

  const apply = () => {
    getItems().forEach(({ item, kind }) => {
      protoDripPositionManualNode(getNode(item.id), item, kind);
    });
    onApply?.();
  };

  const startScrollLoop = () => {
    if (scrollActive) return;
    scrollActive = true;
    const tick = () => {
      apply();
      if (scrollActive) rafId = requestAnimationFrame(tick);
    };
    rafId = requestAnimationFrame(tick);
  };

  const onScrollActivity = () => {
    apply();
    startScrollLoop();
    window.clearTimeout(scrollEndTimer);
    scrollEndTimer = window.setTimeout(() => {
      scrollActive = false;
      window.cancelAnimationFrame(rafId);
      apply();
    }, 120);
  };

  const opts = { passive: true, capture: true };
  const events = ["scroll", "wheel", "touchmove"];
  const roots = new Set();

  const bindRoots = () => {
    roots.forEach((root) => {
      events.forEach((ev) => {
        try { root.removeEventListener(ev, onScrollActivity, opts); } catch { /* visualViewport */ }
      });
    });
    roots.clear();
    const seen = new Set();
    getItems().forEach(({ item }) => {
      protoDripScrollTargets(item.anchor, item.id).forEach((t) => {
        if (seen.has(t)) return;
        seen.add(t);
        roots.add(t);
        events.forEach((ev) => {
          try { t.addEventListener(ev, onScrollActivity, opts); } catch { /* noop */ }
        });
      });
    });
  };

  bindRoots();
  apply();
  const bootId = requestAnimationFrame(apply);
  window.addEventListener("resize", onScrollActivity, { passive: true });
  window.addEventListener("orientationchange", onScrollActivity, { passive: true });

  return () => {
    window.cancelAnimationFrame(bootId);
    scrollActive = false;
    window.cancelAnimationFrame(rafId);
    window.clearTimeout(scrollEndTimer);
    roots.forEach((root) => {
      events.forEach((ev) => {
        try { root.removeEventListener(ev, onScrollActivity, opts); } catch { /* noop */ }
      });
    });
    window.removeEventListener("resize", onScrollActivity);
    window.removeEventListener("orientationchange", onScrollActivity);
  };
}

function protoDripAnchorCoords(anchor, pos = "tr", size = 26, offset = 6, id) {
  const el = protoDripResolveAnchorElement(anchor, id);
  if (el) {
    const r = el.getBoundingClientRect();
    let top = r.top + offset;
    let left = r.left + offset;
    if (pos.includes("r")) left = r.right - size - offset;
    if (pos.includes("b")) top = r.bottom - size - offset;
    return { top, left };
  }
  if (anchor && typeof anchor.docX === "number" && typeof anchor.docY === "number") {
    const scrollX = window.scrollX || document.documentElement.scrollLeft || 0;
    const scrollY = window.scrollY || document.documentElement.scrollTop || 0;
    let top = anchor.docY - scrollY + offset;
    let left = anchor.docX - scrollX + offset;
    const w = anchor.w || 0;
    const h = anchor.h || 0;
    if (pos.includes("r")) left = anchor.docX - scrollX + w - size - offset;
    if (pos.includes("b")) top = anchor.docY - scrollY + h - size - offset;
    return { top, left };
  }
  return null;
}

function protoDripDownload(filename, content, mime = "text/plain;charset=utf-8") {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function protoDripBuildNotesMd(store) {
  let md = "# BC落地页 · 手写备注\n\n";
  md += "> 由原型标注工具导出。合并入仓库请运行 `node scripts/merge-proto-drip-export.mjs proto-drip-export.json`。\n\n";
  if (!store.notes.length) {
    md += "_（暂无手写备注）_\n";
    return md;
  }
  store.notes.forEach((n) => {
    md += `## ${n.id} · ${n.title}\n\n`;
    md += `- 作者：${n.author || "—"}\n`;
    md += `- 更新：${protoDripFmtTime(n.updatedAt)}\n`;
    if (n.anchor?.moduleLabel) md += `- 模块：${n.anchor.moduleLabel}\n`;
    if (n.anchor?.label) md += `- 锚点：${n.anchor.label}\n`;
    if (n.anchor?.selector) md += `- 选择器：\`${n.anchor.selector}\`\n`;
    md += `\n${n.body || ""}\n\n---\n\n`;
  });
  return md;
}

function protoDripBuildTodosMd(store) {
  let md = "# BC落地页 · 手写待办\n\n";
  md += "> 由原型标注工具导出。系统待办见 [`BC落地页ToDo.md`](./BC落地页ToDo.md)。\n\n";
  if (!store.todos.length) {
    md += "_（暂无手写待办）_\n";
    return md;
  }
  store.todos.forEach((t) => {
    md += `## ${t.id} · ${t.title}\n\n`;
    md += `- 作者：${t.author || "—"}\n`;
    md += `- 更新：${protoDripFmtTime(t.updatedAt)}\n`;
    md += `- 负责人：${t.owner || "—"}\n`;
    md += `- 状态：${t.status || "待处理"}\n`;
    if (t.blocker) md += `- 阻塞：${t.blocker}\n`;
    if (t.anchor?.moduleLabel) md += `- 模块：${t.anchor.moduleLabel}\n`;
    if (t.anchor?.label) md += `- 锚点：${t.anchor.label}\n`;
    if (t.anchor?.selector) md += `- 选择器：\`${t.anchor.selector}\`\n`;
    md += `\n${t.detail || ""}\n\n---\n\n`;
  });
