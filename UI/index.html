}

function protoDripBuildHtmlSnippet(store) {
  const json = JSON.stringify(store, null, 2);
  return '<script type="application/json" id="proto-drip-store">' + json + '</scr' + 'ipt>';
}

function protoDripExport(store, username) {
  const stamped = {
    ...store,
    notes: store.notes.map((n, i) => protoDripEnsureTimestamps({ ...n, author: n.author || username }, PROTO_DRIP_SYSTEM_EPOCH + i * 60000)),
    todos: store.todos.map((t, i) => protoDripEnsureTimestamps({ ...t, author: t.author || username }, PROTO_DRIP_SYSTEM_EPOCH + i * 60000)),
    exportedAt: protoDripNowIso(),
    exportedBy: username,
  };
  protoDripDownload("proto-drip-export.json", JSON.stringify(stamped, null, 2), "application/json");
  protoDripDownload("BC落地页-手写备注.md", protoDripBuildNotesMd(stamped));
  protoDripDownload("BC落地页ToDo-手写.md", protoDripBuildTodosMd(stamped));
  return stamped;
}

function protoDripDripDomId(kind, source, key) {
  if (source === "manual") return key;
  if (kind === "note") return `sn:${encodeURIComponent(key)}`;
  return `st:${key}`;
}

function protoDripScrollToDrip(sel, { allowModuleFallback = true } = {}) {
  if (!sel?.key) return false;

  const nav = document.querySelector(".nav");
  const navOffset = Math.ceil(nav?.getBoundingClientRect().height ?? 88) + 4;

  const scrollTop = (top) => {
    window.scrollTo({ top: Math.max(0, top), behavior: "smooth" });
    return true;
  };

  const scrollEl = (el) => {
    if (!(el instanceof Element)) return false;
    const rect = el.getBoundingClientRect();
    const top = window.scrollY + rect.top - navOffset - Math.max(0, (window.innerHeight - Math.min(rect.height, 120)) * 0.35);
    return scrollTop(top);
  };

  const scrollDocPoint = (anchor) => {
    if (!anchor || typeof anchor.docY !== "number") return false;
    const top = anchor.docY - navOffset - window.innerHeight * 0.35;
    return scrollTop(top);
  };

  const scrollAnchorPoint = (anchor, id, kind) => {
    const pos = anchor?.pos || (kind === "note" ? "tr" : "br");
    const pt = protoDripAnchorCoords(anchor, pos, 30, 6, id);
    if (!pt) return false;
    const top = window.scrollY + pt.top - navOffset - 48;
    return scrollTop(top);
  };

  const scrollModule = (raw) => {
    if (!raw || !allowModuleFallback) return false;
    const mod = protoDripResolveItemModule(raw, raw.prd);
    if (/^path-\d+$/.test(mod.moduleId || "")) {
      const pathEl = document.getElementById(mod.moduleId);
      if (scrollEl(pathEl)) return "fallback";
    }
    const modDef = PROTO_PAGE_MODULES.find((m) => m.id === mod.moduleId);
    if (modDef) {
      const sectionEl = document.querySelector(modDef.selector);
      if (scrollEl(sectionEl)) return "fallback";
    }
    return false;
  };

  // 手写：滚到锚点或水滴坐标，不用顶层 fixed 节点
  if (sel.source === "manual") {
    const anchorEl = protoDripResolveAnchorElement(sel.anchor, sel.key)
      || protoDripResolveOrNearest(sel.anchor, sel.key);
    if (scrollEl(anchorEl)) return "precise";
    if (scrollAnchorPoint(sel.anchor, sel.key, sel.kind)) return "precise";
    if (scrollDocPoint(sel.anchor)) return "precise";
    return scrollModule(sel.raw);
  }

  const domId = protoDripDripDomId(sel.kind, sel.source, sel.key);
  let dripEl = null;
  try {
    dripEl = document.querySelector(`[data-proto-drip-id="${CSS.escape(domId)}"]`);
  } catch {
    dripEl = document.querySelector(`[data-proto-drip-id="${domId}"]`);
  }

  if (dripEl instanceof Element && !dripEl.classList.contains("proto-drip--floating")) {
    const anchorWrap = dripEl.closest(".proto-anchor");
    const focusTarget = anchorWrap?.querySelector("button, a, input, select, textarea, img, h1, h2, h3, h4, h5, h6, p, label")
      || anchorWrap?.firstElementChild
      || dripEl;
    if (scrollEl(focusTarget)) return "precise";
    if (scrollEl(dripEl)) return "precise";
  }

  const moduleHit = scrollModule(sel.raw);
  if (moduleHit) return moduleHit;

  if (dripEl instanceof Element) {
    if (scrollEl(dripEl)) return dripEl.classList.contains("proto-drip--floating") ? "fallback" : "precise";
  }

  return false;
}

function protoDripScheduleScrollToDrip(sel, { attempts = 24, interval = 72, onDone } = {}) {
  if (!sel?.key) return () => {};
  let count = 0;
  let timer = 0;
  let stopped = false;
  const finish = (hit) => {
    if (stopped) return;
    stopped = true;
    window.clearTimeout(timer);
    onDone?.(hit);
  };
  const tick = () => {
    if (stopped) return;
    count += 1;
    const allowModuleFallback = count >= attempts;
    const hit = protoDripScrollToDrip(sel, { allowModuleFallback });
    if (hit === "precise" || (hit === "fallback" && allowModuleFallback)) {
      finish(hit);
      return;
    }
    if (count < attempts) timer = window.setTimeout(tick, interval);
    else finish(false);
  };
  tick();
  requestAnimationFrame(() => {
    if (!stopped) tick();
  });
  return () => finish(false);
}

function protoDripSelectionKey(item, isNote) {
  if (isNote) {
    return item.source === "system" ? (item.raw?._key || item.title) : item.id;
  }
  return item.id;
}

function protoDripIsSelected(selectedDrip, kind, source, key) {
  return !!(selectedDrip
    && selectedDrip.kind === kind
    && selectedDrip.source === source
    && selectedDrip.key === key);
}

const DripContext = createContext(null);

function DripProvider({ children }) {
  const [showNotes, setShowNotes] = useState(false);
  const [showTodos, setShowTodos] = useState(false);
  const [noteListOpen, setNoteListOpen] = useState(false);
  const [todoListOpen, setTodoListOpen] = useState(false);
  const [selectedDrip, setSelectedDrip] = useState(null);
  const scrollSessionRef = useRef(null);
  const showLayerPrevRef = useRef({ notes: false, todos: false });
  const [editMode, setEditMode] = useState(false);
  const [pickKind, setPickKind] = useState(null);
  const [store, setStore] = useState(protoDripLoadStore);
  const [active, setActive] = useState(null);
  const [editor, setEditor] = useState(null);
  const [submitOpen, setSubmitOpen] = useState(false);
  const [username, setUsername] = useState(() => localStorage.getItem(PROTO_DRIP_USER_KEY) || "");
  const [toast, setToast] = useState(null);
  const toastTimerRef = useRef(null);
  const [systemNotes, setSystemNotes] = useState([]);

  const close = useCallback(() => setActive(null), []);

  const cancelScrollSession = useCallback(() => {
    scrollSessionRef.current?.cancel?.();
    scrollSessionRef.current = null;
  }, []);

  const startScrollSession = useCallback((sel, { attempts = 24, interval = 72 } = {}) => {
    cancelScrollSession();
    const session = { sel, done: false, cancel: null };
    session.cancel = protoDripScheduleScrollToDrip(sel, {
      attempts,
      interval,
      onDone: () => {
        session.done = true;
        if (scrollSessionRef.current === session) scrollSessionRef.current = null;
      },
    });
    scrollSessionRef.current = session;
  }, [cancelScrollSession]);

  const focusDrip = useCallback((sel, { scroll = true } = {}) => {
    if (!sel?.key) return;
    setSelectedDrip(sel);
    if (sel.kind === "note") setShowNotes(true);
    if (sel.kind === "todo") setShowTodos(true);
    if (scroll) startScrollSession(sel);
  }, [startScrollSession]);

  useEffect(() => {
    const notesJustOn = showNotes && !showLayerPrevRef.current.notes;
    const todosJustOn = showTodos && !showLayerPrevRef.current.todos;
    showLayerPrevRef.current = { notes: showNotes, todos: showTodos };
    const session = scrollSessionRef.current;
    if (!session || session.done) return undefined;
    const needsRetry = (session.sel.kind === "note" && notesJustOn)
      || (session.sel.kind === "todo" && todosJustOn);
    if (!needsRetry) return undefined;
    const prevCancel = session.cancel;
    const extraCancel = protoDripScheduleScrollToDrip(session.sel, {
      attempts: 12,
      interval: 80,
      onDone: (hit) => {
        if (hit) {
          session.done = true;
          if (scrollSessionRef.current === session) scrollSessionRef.current = null;
        }
      },
    });
    session.cancel = () => {
      prevCancel?.();
      extraCancel?.();
    };
    return () => extraCancel?.();
  }, [showNotes, showTodos]);

  useEffect(() => {
    setSelectedDrip((prev) => {
      if (!prev) return prev;
      if (prev.kind === "note" && !noteListOpen) return null;
      if (prev.kind === "todo" && !todoListOpen) return null;
      return prev;
    });
  }, [noteListOpen, todoListOpen]);

  const registerSystemNote = useCallback((key, note) => {
    setSystemNotes((prev) => {
      const idx = prev.findIndex((n) => n._key === key);
      const mod = note.moduleId
        ? { moduleId: note.moduleId, moduleLabel: note.moduleLabel }
        : protoDripInferModuleFromPrd(note.prd);
      const registeredAt = idx === -1 ? Date.now() : prev[idx].registeredAt;
      const prevEntry = idx >= 0 ? prev[idx] : null;
      const contentChanged = prevEntry && (
        prevEntry.title !== note.title || prevEntry.body !== note.body
      );
      const defaultIso = new Date(registeredAt).toISOString();
      const updatedAt = contentChanged
        ? protoDripNowIso()
        : (note.updatedAt || prevEntry?.updatedAt || defaultIso);
      const createdAt = prevEntry?.createdAt || note.createdAt || updatedAt;
      const entry = protoDripEnsureTimestamps({
        ...note,
        _key: key,
        moduleId: note.moduleId || mod.moduleId,
        moduleLabel: note.moduleLabel || mod.moduleLabel,
        registeredAt,
        createdAt,
        updatedAt,
      }, registeredAt);
      if (idx === -1) return [...prev, entry];
      const next = [...prev];
      next[idx] = entry;
      return next;
    });
  }, []);

  const openSystemNote = useCallback((item) => {
    focusDrip({
      kind: "note",
      source: "system",
      key: item._key || item.title,
      raw: item,
    }, { scroll: false });
    setActive({
      kind: "note",
      source: "system",
      title: item.title,
      body: item.body,
      prd: item.prd || [],
      docs: item.docs || [],
      links: item.links || [],
      createdAt: item.createdAt,
      updatedAt: item.updatedAt,
      editable: false,
    });
  }, [focusDrip]);

  const showDripToast = useCallback((msg) => {
    if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
    setToast(msg);
    toastTimerRef.current = setTimeout(() => {
      setToast(null);
      toastTimerRef.current = null;
    }, 4200);
  }, []);

  const persistStore = useCallback((next) => {
    const stamped = {
      ...next,
      notes: next.notes.map((n, i) => protoDripEnsureTimestamps(n, PROTO_DRIP_SYSTEM_EPOCH + i * 60000)),
      todos: next.todos.map((t, i) => protoDripEnsureTimestamps(t, PROTO_DRIP_SYSTEM_EPOCH + i * 60000)),
    };
    setStore(stamped);
    protoDripSaveStore(stamped);
  }, []);

  const openManualNote = useCallback((item) => {
    focusDrip({
      kind: "note",
      source: "manual",
      key: item.id,
      anchor: item.anchor,
      raw: item,
    }, { scroll: false });
    setActive({
      kind: "note",
      source: "manual",
      id: item.id,
      title: item.title,
      body: item.body,
      author: item.author,
      createdAt: item.createdAt,
      updatedAt: item.updatedAt,
      anchor: item.anchor,
      docs: ["manualNotes"],
      editable: true,
    });
  }, [focusDrip]);

  const openManualTodo = useCallback((item) => {
    focusDrip({
      kind: "todo",
      source: "manual",
      key: item.id,
      anchor: item.anchor,
      raw: item,
    }, { scroll: false });
    setActive({
      kind: "todo",
      source: "manual",
      id: item.id,
      title: `${item.id} · ${item.title}`,
      body: item.detail,
      author: item.author,
      createdAt: item.createdAt,
      updatedAt: item.updatedAt,
      anchor: item.anchor,
      meta: { owner: item.owner, status: item.status, blocker: item.blocker },
      docs: ["manualTodos"],
      editable: true,
    });
  }, [focusDrip]);

  const openSystemTodo = useCallback((todoId) => {
    const todo = PAGE_TODOS[todoId];
    if (!todo) return;
    focusDrip({
      kind: "todo",
      source: "system",
      key: todoId,
      raw: { id: todoId, ...todo },
    }, { scroll: false });
    setActive({
      kind: "todo",
      source: "system",
      todoId,
      title: `${todoId} · ${todo.title}`,
      body: todo.detail,
      prd: todo.prd || [],
      docs: ["todo", ...(todo.docs || [])],
      createdAt: todo.createdAt,
      updatedAt: todo.updatedAt,
      meta: { owner: todo.owner, status: todo.status, blocker: todo.blocker },
      editable: false,
    });
  }, [focusDrip]);

  const deleteManual = useCallback((kind, id) => {
    if (!window.confirm("确定删除这条手写标注？")) return;
    persistStore({
      ...store,
      notes: kind === "note" ? store.notes.filter((n) => n.id !== id) : store.notes,
      todos: kind === "todo" ? store.todos.filter((t) => t.id !== id) : store.todos,
    });
    setActive(null);
    setSelectedDrip((prev) => (prev?.key === id && prev?.source === "manual" ? null : prev));
    showDripToast("已删除");
  }, [store, persistStore, showDripToast]);

  const handlePick = useCallback((el, clientX, clientY) => {
    if (!pickKind) return;
    const cx = typeof clientX === "number" ? clientX : window.innerWidth / 2;
    const cy = typeof clientY === "number" ? clientY : window.innerHeight / 2;
    const hit = el instanceof Element ? el : protoDripElementFromPoint(cx, cy);
    const mod = protoDripDetectModule(hit, cx, cy);
    const target = hit instanceof Element ? (protoDripPickTarget(hit) || hit) : null;
    const anchorTarget = target && target !== document.body && target !== document.documentElement ? target : null;
    const selector = anchorTarget ? protoDripGenSelector(anchorTarget) : "";
    const elementHint = anchorTarget ? protoDripLabelFromElement(anchorTarget, { shallow: true }) : "点击位置";
    const isGeneric = /^(div|span|section|article|main|aside|body|html)$/i.test(elementHint);
    const hint = isGeneric ? "点击位置" : elementHint;
    const label = `${mod.moduleLabel} · ${hint}`;
    const rect = anchorTarget
      ? protoDripCaptureAnchorRect(anchorTarget)
      : { docX: cx + window.scrollX, docY: cy + window.scrollY, w: 24, h: 24 };
    setPickKind(null);
    const anchor = {
      selector,
      label,
      moduleId: mod.moduleId,
      moduleLabel: mod.moduleLabel,
      pos: pickKind === "note" ? "tr" : "br",
      ...rect,
    };
    setEditor({
      mode: "create",
      kind: pickKind,
      draft: pickKind === "note"
        ? { title: label, body: "", anchor }
        : { title: label, detail: "", owner: "", status: "待处理", blocker: "", anchor },
    });
  }, [pickKind]);

  const handleSubmitExport = useCallback((name) => {
    const trimmed = (name || "").trim();
    if (!trimmed) {
      showDripToast("请填写用户名");
      return;
    }
    setUsername(trimmed);
    localStorage.setItem(PROTO_DRIP_USER_KEY, trimmed);
    const stamped = protoDripExport(store, trimmed);
    persistStore({ version: 1, notes: stamped.notes, todos: stamped.todos });
    setSubmitOpen(false);
    showDripToast("已导出 JSON 与 Markdown；请运行 merge 脚本写入仓库");
  }, [store, persistStore, showDripToast]);

  useEffect(() => {
    if (!active) return;
    const onKey = (e) => { if (e.key === "Escape") close(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [active, close]);

  useEffect(() => {
    if (!pickKind) return;
    const onKey = (e) => { if (e.key === "Escape") setPickKind(null); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [pickKind]);

  useEffect(() => {
    const restamp = () => {
      store.notes.forEach((n) => protoDripStampAnchor(n.anchor, n.id));
      store.todos.forEach((t) => protoDripStampAnchor(t.anchor, t.id));
    };
    const t = setTimeout(restamp, 400);
    return () => clearTimeout(t);
  }, [store]);

  useEffect(() => () => {
    if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
  }, []);

  const ctx = {
    showNotes, setShowNotes,
    showTodos, setShowTodos,
    noteListOpen, setNoteListOpen,
    todoListOpen, setTodoListOpen,
    selectedDrip, setSelectedDrip, focusDrip,
    editMode, setEditMode,
    pickKind, setPickKind,
    store, persistStore,
    active, setActive, close,
    editor, setEditor,
    submitOpen, setSubmitOpen,
    username, setUsername,
    openManualNote, openManualTodo, openSystemTodo, openSystemNote,
    registerSystemNote, systemNotes,
    deleteManual, handlePick, handleSubmitExport,
    showDripToast,
  };

  return (
    <DripContext.Provider value={ctx}>
      {children}
      <ManualDripLayer />
      <DripListPanel kind="note" />
      <DripListPanel kind="todo" />
      <DripPickOverlay />
      <DripModal />
      <DripEditorModal />
      <DripSubmitModal />
      {toast && <div className="proto-toast" role="status">{toast}</div>}
    </DripContext.Provider>
  );
}

function useDrip() {
  return useContext(DripContext);
}

function DripAnchor({ side = "end", gap = 6, row = false, block = false, className = "", style, children, drip }) {
  if (!drip) return children;
  const cls = [
    "proto-anchor",
    `proto-anchor--${side}`,
    block ? "proto-anchor--block" : "",
    className,
  ].filter(Boolean).join(" ");
  const dripsCls = row ? "proto-anchor__drips proto-anchor__drips--row" : "proto-anchor__drips";
  return (
    <span className={cls} style={{ gap, ...style }}>
      {children}
      <span className={dripsCls}>{drip}</span>
    </span>
  );
}

function NoteDrip({ pos = "tr", style, inline, title, body, prd = [], docs = [], links = [] }) {
  const { showNotes, setActive, registerSystemNote, openSystemNote, selectedDrip } = useDrip();
  const regKey = title;
  const btnRef = useRef(null);
  const domId = protoDripDripDomId("note", "system", regKey);
  const isSelected = protoDripIsSelected(selectedDrip, "note", "system", regKey);

  useEffect(() => {
    registerSystemNote(regKey, { title, body, prd, docs, links });
  }, [regKey, title, body, prd, docs, links, registerSystemNote]);

  useEffect(() => {
    const btn = btnRef.current;
    if (!btn || !showNotes) return;
    const anchor = btn.closest(".proto-anchor") || btn;
    const r = btn.getBoundingClientRect();
    const mod = protoDripDetectModule(anchor, r.left + r.width / 2, r.top + r.height / 2);
    registerSystemNote(regKey, { title, body, prd, docs, links, moduleId: mod.moduleId, moduleLabel: mod.moduleLabel });
  }, [regKey, title, body, prd, docs, links, showNotes, registerSystemNote]);

  if (!showNotes) return null;
  const isInline = inline || style;
  return (
    <button
      ref={btnRef}
      type="button"
      data-proto-drip-id={domId}
      className={`proto-drip proto-drip--note proto-drip--system${isInline ? " proto-drip--inline" : ` proto-drip--${pos}`}${isSelected ? " proto-drip--selected" : ""}`}
      style={style}
      title={title}
      aria-label={`备注：${title}`}
      aria-current={isSelected ? "true" : undefined}
      onClick={(e) => {
        e.stopPropagation();
        openSystemNote({ _key: regKey, title, body, prd, docs, links });
      }}
    >
      <span className="proto-drip__icon">i</span>
    </button>
  );
}

function TodoDrip({ pos = "br", style, inline, todoId }) {
  const { showTodos, openSystemTodo, selectedDrip } = useDrip();
  const todo = PAGE_TODOS[todoId];
  if (!showTodos || !todo) return null;
  const domId = protoDripDripDomId("todo", "system", todoId);
  const isSelected = protoDripIsSelected(selectedDrip, "todo", "system", todoId);
  const isInline = inline || style;
  return (
    <button
      type="button"
      data-proto-drip-id={domId}
      className={`proto-drip proto-drip--todo proto-drip--system${isInline ? " proto-drip--inline" : ` proto-drip--${pos}`}${isSelected ? " proto-drip--selected" : ""}`}
      style={style}
      title={`${todoId} ${todo.title}`}
      aria-label={`待办：${todoId}`}
      aria-current={isSelected ? "true" : undefined}
      onClick={(e) => {
        e.stopPropagation();
        openSystemTodo(todoId);
      }}
    >
      <span className="proto-drip__icon">!</span>
    </button>
  );
}

function ManualDripLayer() {
  const { store, showNotes, showTodos, openManualNote, openManualTodo, selectedDrip } = useDrip();
  const itemRefs = useRef(new Map());
  const itemsRef = useRef([]);

  const items = useMemo(() => {
    const list = [];
    if (showNotes) {
      store.notes.forEach((n) => list.push({ item: n, kind: "note", onOpen: () => openManualNote(n) }));
    }
    if (showTodos) {
      store.todos.forEach((t) => list.push({ item: t, kind: "todo", onOpen: () => openManualTodo(t) }));
    }
    return list;
  }, [store, showNotes, showTodos, openManualNote, openManualTodo]);

  itemsRef.current = items;

  useLayoutEffect(() => {
    if (!items.length) return undefined;
    return protoDripBindManualLayerSync(
      () => itemsRef.current,
      (id) => itemRefs.current.get(id),
    );
  }, [items]);

  if (!items.length) return null;

  const layer = (
    <div className="proto-drip-top-layer" aria-hidden="false">
      {items.map(({ item, kind, onOpen }) => {
        const isSelected = protoDripIsSelected(selectedDrip, kind, "manual", item.id);
        return (
        <button
          key={item.id}
          ref={(node) => {
            if (node) itemRefs.current.set(item.id, node);
            else itemRefs.current.delete(item.id);
          }}
          type="button"
          data-proto-drip-id={item.id}
          className={`proto-drip proto-drip--floating proto-drip--manual proto-drip--${kind === "note" ? "note" : "todo"}${isSelected ? " proto-drip--selected" : ""}`}
          title={item.title}
          aria-label={`手写${kind === "note" ? "备注" : "待办"}：${item.title}`}
          aria-current={isSelected ? "true" : undefined}
          onClick={(e) => {
            e.stopPropagation();
            onOpen();
          }}
        >
          <span className="proto-drip__icon">{kind === "note" ? "✎" : "✦"}</span>
        </button>
        );
      })}
    </div>
  );

  return ReactDOM.createPortal(layer, document.body);
}

function DripListPanel({ kind }) {
  const {
    showNotes, showTodos, noteListOpen, todoListOpen,
    openManualNote, openManualTodo, openSystemTodo, openSystemNote, systemNotes, store,
    selectedDrip, focusDrip,
    setNoteListOpen, setTodoListOpen,
  } = useDrip();

  const isNote = kind === "note";
  const visible = isNote ? noteListOpen : todoListOpen;
  const otherListOpen = isNote ? todoListOpen : noteListOpen;
  const [query, setQuery] = useState("");
  const [sourceFilter, setSourceFilter] = useState("all");
  const [authorFilter, setAuthorFilter] = useState("");
  const [moduleFilter, setModuleFilter] = useState("");
  const [sortOrder, setSortOrder] = useState("desc");

  const allItems = useMemo(() => {
    const list = [];
    if (isNote) {
      systemNotes.forEach((n, i) => {
        const mod = protoDripResolveItemModule(n, n.prd);
        const stamped = protoDripEnsureTimestamps(n, PROTO_DRIP_SYSTEM_EPOCH + i * 60000);
        list.push({
          id: `N-${String(i + 1).padStart(3, "0")}`,
          listKey: n._key || n.title,
          title: n.title,
          body: n.body,
          prd: n.prd,
          docs: n.docs,
          links: n.links,
          source: "system",
          author: "系统",
          moduleId: mod.moduleId,
          moduleLabel: mod.moduleLabel,
          createdAt: stamped.createdAt,
          updatedAt: stamped.updatedAt,
          sortTime: protoDripListSortTime(stamped),
          raw: stamped,
        });
      });
      store.notes.forEach((n, i) => {
        const mod = protoDripResolveItemModule(n);
        const stamped = protoDripEnsureTimestamps(n, PROTO_DRIP_SYSTEM_EPOCH + i * 60000);
        list.push({
          id: n.id,
          listKey: n.id,
          title: n.title,
          body: n.body,
          source: "manual",
          author: (n.author || "").trim() || "—",
          moduleId: mod.moduleId,
          moduleLabel: mod.moduleLabel,
          createdAt: stamped.createdAt,
          updatedAt: stamped.updatedAt,
          sortTime: protoDripListSortTime(stamped),
          raw: stamped,
        });
      });
    } else {
      Object.entries(PAGE_TODOS).forEach(([id, t]) => {
        const mod = protoDripInferModuleFromPrd(t.prd);
        const stamped = protoDripEnsureTimestamps(t);
        list.push({
          id,
          listKey: id,
          title: t.title,
          detail: t.detail,
          status: t.status,
          owner: t.owner,
          prd: t.prd,
          source: "system",
          author: "系统",
          moduleId: mod.moduleId,
          moduleLabel: mod.moduleLabel,
          createdAt: stamped.createdAt,
          updatedAt: stamped.updatedAt,
          sortTime: protoDripListSortTime(stamped),
          raw: { id, ...stamped },
        });
      });
      store.todos.forEach((t, i) => {
        const mod = protoDripResolveItemModule(t);
        const stamped = protoDripEnsureTimestamps(t, PROTO_DRIP_SYSTEM_EPOCH + i * 60000);
        list.push({
          id: t.id,
          listKey: t.id,
          title: t.title,
          detail: t.detail,
          status: t.status,
          owner: t.owner,
          source: "manual",
          author: (t.author || "").trim() || "—",
          moduleId: mod.moduleId,
          moduleLabel: mod.moduleLabel,
          createdAt: stamped.createdAt,
          updatedAt: stamped.updatedAt,
          sortTime: protoDripListSortTime(stamped),
          raw: stamped,
        });
      });
    }
    return list;
  }, [isNote, systemNotes, store]);

  const authorOptions = useMemo(() => {
    const authors = new Set();
    allItems.forEach((item) => {
      if (item.author) authors.add(item.author);
    });
    return ["", ...Array.from(authors).sort((a, b) => a.localeCompare(b, "zh"))];
  }, [allItems]);

  const moduleOptions = useMemo(() => protoDripModuleFilterOptions(), []);

  const filteredItems = useMemo(() => {
    const q = query.trim().toLowerCase();
    const filtered = allItems.filter((item) => {
      if (sourceFilter === "system" && item.source !== "system") return false;
      if (sourceFilter === "manual" && item.source !== "manual") return false;
      if (authorFilter && item.author !== authorFilter) return false;
      if (!protoDripModuleMatches(moduleFilter, item.moduleId)) return false;
      if (!q) return true;
      const hay = [
        item.id,
        item.title,
        protoDripContentPlain(item.body || item.detail),
        item.author,
        item.moduleLabel,
        item.status,
        item.owner,
        item.updatedAt,
      ].filter(Boolean).join(" ").toLowerCase();
      return hay.includes(q);
    });
    return filtered.sort((a, b) => {
      const diff = b.sortTime - a.sortTime;
      return sortOrder === "desc" ? diff : -diff;
    });
  }, [allItems, query, sourceFilter, authorFilter, moduleFilter, sortOrder]);

  if (!visible) return null;

  const openItem = (item) => {
    const sel = {
      kind: isNote ? "note" : "todo",
      source: item.source,
      key: item.listKey,
      anchor: item.raw?.anchor,
      raw: item.raw,
    };
    focusDrip(sel);
    requestAnimationFrame(() => {
      if (isNote) {
        if (item.source === "manual") openManualNote(item.raw);
        else openSystemNote(item.raw);
        return;
      }
      if (item.source === "system") openSystemTodo(item.id);
      else openManualTodo(item.raw);
    });
  };

  const panelClass = [
    "proto-list-panel",
    `proto-list-panel--${kind}`,
    !isNote && otherListOpen ? "proto-list-panel--offset" : "",
  ].filter(Boolean).join(" ");

  return (
    <aside className={panelClass} aria-label={isNote ? "备注列表" : "待办列表"}>
      <div className="proto-list-panel__head">
        <div className="proto-list-panel__title">{isNote ? "备注 · 列表模式" : "待办 · 列表模式"}</div>
        <div className="proto-list-panel__head-actions">
          <div className="proto-list-panel__count">{filteredItems.length}/{allItems.length}</div>
          <button
            type="button"
            className="proto-list-panel__close"
            onClick={() => (isNote ? setNoteListOpen(false) : setTodoListOpen(false))}
            aria-label={isNote ? "关闭备注列表" : "关闭待办列表"}
          >
            ×
          </button>
        </div>
      </div>
      <div className="proto-list-panel__filters">
        <input
          type="search"
          className="proto-list-panel__search"
          placeholder="搜索标题、正文、ID、作者…"
          value={query}
          onChange={(e) => setQuery(e.target.value)}
          aria-label="搜索列表"
        />
        <div className="proto-list-panel__source" role="group" aria-label="来源筛选">
          {[
            { id: "all", label: "全部" },
            { id: "system", label: "系统" },
            { id: "manual", label: "手写" },
          ].map((opt) => (
            <button
              key={opt.id}
              type="button"
              className={`proto-list-panel__source-btn${sourceFilter === opt.id ? " proto-list-panel__source-btn--active" : ""}`}
              onClick={() => setSourceFilter(opt.id)}
            >
              {opt.label}
            </button>
          ))}
        </div>
        <div className="proto-list-panel__filter-row">
          <select
            className="proto-list-panel__select"
            value={authorFilter}
            onChange={(e) => setAuthorFilter(e.target.value)}
            aria-label="按作者筛选"
          >
            <option value="">全部作者</option>
            {authorOptions.filter(Boolean).map((a) => (
              <option key={a} value={a}>{a}</option>
            ))}
          </select>
          <select
            className="proto-list-panel__select"
            value={moduleFilter}
            onChange={(e) => setModuleFilter(e.target.value)}
            aria-label="按模块筛选"
          >
            {moduleOptions.map((m) => (
              <option key={m.id || "all"} value={m.id}>{m.label}</option>
            ))}
          </select>
        </div>
        <div className="proto-list-panel__source" role="group" aria-label="时间排序">
          {[
            { id: "desc", label: "最新优先" },
            { id: "asc", label: "最早优先" },
          ].map((opt) => (
            <button
              key={opt.id}
              type="button"
              className={`proto-list-panel__source-btn${sortOrder === opt.id ? " proto-list-panel__source-btn--active" : ""}`}
              onClick={() => setSortOrder(opt.id)}
            >
              {opt.label}
            </button>
          ))}
        </div>
      </div>
      <div className="proto-list-panel__body">
        {filteredItems.map((item) => {
          const isSelected = protoDripIsSelected(
            selectedDrip,
            isNote ? "note" : "todo",
            item.source,
            item.listKey,
          );
          return (
          <button
            key={`${item.source}-${item.id}`}
            type="button"
            className={`proto-list-item${isSelected ? " proto-list-item--selected" : ""}`}
            aria-current={isSelected ? "true" : undefined}
            onClick={() => openItem(item)}
          >
            <div className="proto-list-item__row">
              <span className="proto-list-item__id">{item.id}</span>
              <span className={`proto-list-item__badge ${item.source === "system" ? "proto-list-item__badge--system" : (isNote ? "proto-list-item__badge--manual-note" : "proto-list-item__badge--manual-todo")}`}>
                {item.source === "system" ? "系统" : "手写"}
              </span>
            </div>
            <div className="proto-list-item__title">{item.title}</div>
            <div className="proto-list-item__meta">
              {item.author}
              {item.moduleLabel ? ` · ${item.moduleLabel}` : ""}
              {item.updatedAt ? ` · ${protoDripFmtTime(item.updatedAt)}` : ""}
              {!isNote && item.status ? ` · ${item.status}` : ""}
            </div>
          </button>
          );
        })}
        {!filteredItems.length && (
          <div className="proto-toolbar__hint">
            {allItems.length
              ? "无匹配结果，请调整筛选或搜索关键词"
              : (isNote
                ? "暂无备注。页面模式请先点「显示备注」；手写备注在编辑模式下添加。"
                : "暂无待办")}
          </div>
        )}
      </div>
    </aside>
  );
}

function DripPickOverlay() {
  const { pickKind, setPickKind, handlePick } = useDrip();

  useEffect(() => {
    if (!pickKind) return;
    const onPointerDown = (e) => {
      if (e.button !== 0) return;
      if (protoDripPickBlocked(e.target)) return;
      const el = protoDripElementFromPoint(e.clientX, e.clientY);
      e.preventDefault();
      e.stopPropagation();
      handlePick(el, e.clientX, e.clientY);
    };
    document.addEventListener("pointerdown", onPointerDown, true);
    return () => document.removeEventListener("pointerdown", onPointerDown, true);
  }, [pickKind, handlePick]);

  if (!pickKind) return null;

  return (
    <>
      <div className="proto-pick-banner">
        点击页面任意位置 · 自动识别所属模块 · Esc 取消
      </div>
      <div className="proto-pick-overlay" aria-hidden="true" />
    </>
  );
}

function DripModal() {
  const { active, close, setEditor, deleteManual } = useDrip();
  if (!active || active._editor) return null;

  const docKeys = active.docs || [];
  const prdSections = active.prd || [];
  const isManual = active.source === "manual";
  const isNote = active.kind === "note";

  return (
    <div className="proto-modal-backdrop" onClick={close}>
      <div className="proto-modal" onClick={(e) => e.stopPropagation()} role="dialog" aria-modal="true">
        <div className="proto-modal__head">
          <div>
            <div className="proto-modal__badges">
              <span className={`proto-modal__badge ${isManual ? (isNote ? "proto-modal__badge--manual" : "proto-modal__badge--todo-manual") : (isNote ? "proto-modal__badge--system" : "proto-modal__badge--system-todo")}`}>
                {isManual ? "手写" : "系统"}{isNote ? "备注" : "待办"}
              </span>
              <span className={`proto-modal__kind proto-modal__kind--${active.kind}`}>

              <div className="proto-modal__meta" style={{ marginTop: 8 }}>
                {active.id && <>ID：{active.id}<br /></>}
                {isManual && <>作者：{active.author || "—"}<br /></>}
                {active.createdAt && active.createdAt !== active.updatedAt && (
                  <>创建：{protoDripFmtTime(active.createdAt)}<br /></>
                )}
                更新：{protoDripFmtTime(active.updatedAt || active.createdAt)}
                {isManual && active.anchor?.moduleLabel && <><br />所属模块：{active.anchor.moduleLabel}</>}
                {isManual && active.anchor?.label && <><br />锚点：{active.anchor.label}</>}
              </div>
            )}
          </div>
          <button type="button" className="proto-modal__close" onClick={close} aria-label="关闭">×</button>
        </div>
        <div className="proto-modal__body">
          {active.body && <DripRichBody content={active.body} />}
          {active.meta && (
            <div className="proto-modal__meta">
              负责人：{active.meta.owner}<br />
              状态：{active.meta.status}<br />
              阻塞：{active.meta.blocker}
            </div>
          )}
          {prdSections.length > 0 && (
            <div>
              <div className="proto-modal__section-title">PRD 章节</div>
              <div className="proto-modal__tags">
                {prdSections.map((s) => <span key={s} className="proto-modal__tag">{s}</span>)}
              </div>
            </div>
          )}
          {docKeys.length > 0 && (
            <div>
              <div className="proto-modal__section-title">相关文档</div>
              <div className="proto-modal__links">
                {docKeys.map((k) => {
                  const d = DOC_LINKS[k];
                  return d ? (
                    <a key={k} className="proto-modal__link" href={d.href} target="_blank" rel="noopener noreferrer">{d.label}</a>
                  ) : null;
                })}
              </div>
            </div>
          )}
          {(active.links || []).length > 0 && (
            <div>
              <div className="proto-modal__section-title">相关链接</div>
              <div className="proto-modal__links">
                {active.links.map((l) => (
                  <a key={l.href} className="proto-modal__link" href={l.href} target="_blank" rel="noopener noreferrer">{l.label}</a>
                ))}
              </div>
            </div>
          )}
          {active.editable && (
            <div className="proto-modal__actions">
              <button
                type="button"
                className="proto-modal__action-btn"
                onClick={() => setEditor({
                  mode: "edit",
                  kind: active.kind,
                  id: active.id,
                  draft: active.kind === "note"
                    ? { title: active.title, body: active.body, anchor: active.anchor }
                    : {
                      title: (active.title || "").replace(/^MT-\d+\s·\s/, ""),
                      detail: active.body,
                      owner: active.meta?.owner,
                      status: active.meta?.status,
                      blocker: active.meta?.blocker,
                      anchor: active.anchor,
                    },
                })}
              >
                编辑
              </button>
              <button
                type="button"
                className="proto-modal__action-btn proto-modal__action-btn--danger"
                onClick={() => deleteManual(active.kind, active.id)}
              >
                删除
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function DripEditorModal() {
  const {
    editor, setEditor, store, persistStore, username, setUsername, close, showDripToast,
    openManualNote, openManualTodo, setShowNotes, setShowTodos, focusDrip,
  } = useDrip();
  const [draft, setDraft] = useState(null);
  const [name, setName] = useState(username);

  useEffect(() => {
    if (editor) {
      setDraft({ ...editor.draft });
      setName(username);
    } else {
      setDraft(null);
    }
  }, [editor, username]);

  if (!editor || !draft) return null;

  const isNote = editor.kind === "note";
  const save = () => {
    const author = (name || "").trim();
    if (!author) {
      showDripToast("请填写用户名");
      return;
    }
    if (!draft.title?.trim()) {
      showDripToast("请填写标题");
      return;
    }
    setUsername(author);
    localStorage.setItem(PROTO_DRIP_USER_KEY, author);
    const now = protoDripNowIso();
    let nextStore = { ...store };

    if (isNote) {
      const id = editor.mode === "edit" ? editor.id : protoDripNextId(store.notes, "MN-");
      const prevNote = editor.mode === "edit" ? store.notes.find((n) => n.id === editor.id) : null;
      const item = protoDripEnsureTimestamps({
        id,
        title: draft.title.trim(),
        body: protoDripSanitizeRichHtml(draft.body || ""),
        anchor: protoDripStampAnchor({ ...draft.anchor, label: (draft.anchor?.label || "").trim() }, id),
        author,
        createdAt: prevNote?.createdAt || now,
        updatedAt: now,
      });
      nextStore = {
        ...store,
        notes: editor.mode === "edit"
          ? store.notes.map((n) => (n.id === editor.id ? { ...n, ...item } : n))
          : [...store.notes, item],
      };
      persistStore(nextStore);
      setEditor(null);
      close();
      setShowNotes(true);
      openManualNote(item);
      focusDrip({ kind: "note", source: "manual", key: item.id, anchor: item.anchor, raw: item }, { scroll: true });
    } else {
      const id = editor.mode === "edit" ? editor.id : protoDripNextId(store.todos, "MT-");
      const prevTodo = editor.mode === "edit" ? store.todos.find((t) => t.id === editor.id) : null;
      const item = protoDripEnsureTimestamps({
        id,
        title: draft.title.trim(),
        detail: protoDripSanitizeRichHtml(draft.detail || ""),
        owner: (draft.owner || "").trim() || "—",
        status: (draft.status || "").trim() || "待处理",
        blocker: (draft.blocker || "").trim(),
        anchor: protoDripStampAnchor({ ...draft.anchor, label: (draft.anchor?.label || "").trim() }, id),
        author,
        createdAt: prevTodo?.createdAt || now,
        updatedAt: now,
      });
      nextStore = {
        ...store,
        todos: editor.mode === "edit"
          ? store.todos.map((t) => (t.id === editor.id ? { ...t, ...item } : t))
          : [...store.todos, item],
      };
      persistStore(nextStore);
      setEditor(null);
      close();
      setShowTodos(true);
      openManualTodo(item);
      focusDrip({ kind: "todo", source: "manual", key: item.id, anchor: item.anchor, raw: item }, { scroll: true });
    }
    showDripToast(editor.mode === "edit" ? "已保存" : "已添加");
  };

  return (
    <div className="proto-modal-backdrop proto-editor-backdrop" onClick={() => setEditor(null)}>
      <div className="proto-modal proto-editor" onClick={(e) => e.stopPropagation()} role="dialog" aria-modal="true">
        <div className="proto-modal__head">
          <div>
            <div className="proto-modal__kind">{editor.mode === "edit" ? "编辑" : "添加"}手写{isNote ? "备注" : "待办"}</div>
            <div className="proto-modal__title">{isNote ? "备注内容" : "待办内容"}</div>
          </div>
          <button type="button" className="proto-modal__close" onClick={() => setEditor(null)} aria-label="关闭">×</button>
        </div>
        <div className="proto-modal__body">
          <div className="proto-editor__field">
            <label className="proto-editor__label">用户名（必填）</label>
            <input className="proto-editor__input" value={name} onChange={(e) => setName(e.target.value)} placeholder="协作署名" />
          </div>
          <div className="proto-editor__field">
            <label className="proto-editor__label">标题</label>
            <input className="proto-editor__input" value={draft.title} onChange={(e) => setDraft({ ...draft, title: e.target.value })} />
          </div>
          <div className="proto-editor__field">
            <label className="proto-editor__label">{isNote ? "说明正文" : "待办详情"}</label>
            <DripRichEditor
              editorKey={`${editor.mode}-${editor.kind}-${editor.id || "new"}`}
              value={isNote ? draft.body : draft.detail}
              placeholder={isNote ? "输入说明，可直接粘贴截图…" : "输入待办详情，可直接粘贴截图…"}
              onChange={(html) => setDraft(isNote ? { ...draft, body: html } : { ...draft, detail: html })}
            />
          </div>
          {!isNote && (
            <div className="proto-editor__row">
              <div className="proto-editor__field">
                <label className="proto-editor__label">负责人</label>
                <input className="proto-editor__input" value={draft.owner || ""} onChange={(e) => setDraft({ ...draft, owner: e.target.value })} />
              </div>
              <div className="proto-editor__field">
                <label className="proto-editor__label">状态</label>
                <input className="proto-editor__input" value={draft.status || ""} onChange={(e) => setDraft({ ...draft, status: e.target.value })} />
              </div>
            </div>
          )}
          {!isNote && (
            <div className="proto-editor__field">
              <label className="proto-editor__label">阻塞项</label>
              <input className="proto-editor__input" value={draft.blocker || ""} onChange={(e) => setDraft({ ...draft, blocker: e.target.value })} />
            </div>
          )}
          <div className="proto-editor__field">
            <label className="proto-editor__label">所属模块</label>
            <input className="proto-editor__input" value={draft.anchor?.moduleLabel || ""} readOnly />
          </div>
          <div className="proto-editor__field">
            <label className="proto-editor__label">锚点说明</label>
            <input
              className="proto-editor__input"
              value={draft.anchor?.label || ""}
              onChange={(e) => setDraft({ ...draft, anchor: { ...draft.anchor, label: e.target.value } })}
              placeholder="如：Hero · 播放按钮"
            />
            <div className="proto-toolbar__hint">根据点击位置自动识别模块；可修改锚点说明。</div>
          </div>
          <div className="proto-editor__actions">
            <button type="button" className="proto-modal__action-btn" onClick={() => setEditor(null)}>取消</button>
            <button type="button" className="proto-toolbar__btn proto-toolbar__btn--primary" onClick={save}>保存</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function formatVideoTime(sec) {
  if (!Number.isFinite(sec) || sec < 0) return "0:00";
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${String(s).padStart(2, "0")}`;
}

function parseDurationLabel(label) {
  const [m, s] = String(label).split(":").map(Number);
  if (!Number.isFinite(m) || !Number.isFinite(s)) return 0;
  return m * 60 + s;
}

function Hero() {
  const [activeId, setActiveId] = useState(HERO_VIDEOS[0].id);
  const [isPlaying, setIsPlaying] = useState(false);
  const [playback, setPlayback] = useState({ current: 0, duration: 0 });
  const videoRef = useRef(null);
  const active = HERO_VIDEOS.find(v => v.id === activeId);

  useEffect(() => {
    setIsPlaying(false);
    setPlayback({ current: 0, duration: 0 });
  }, [activeId]);

  useEffect(() => {
    if (!isPlaying) return;
    const el = videoRef.current;
    if (!el) return;
    const playPromise = el.play();
    if (!playPromise) return;
    playPromise.catch(() => {
      setIsPlaying(false);
      trackBcBtn("bc_hero_video_play_error_click");
    });
  }, [isPlaying, activeId]);

  function selectPlaylistVideo(video, index) {
    setActiveId(video.id);
    trackBcBtn(BC_HERO_VIDEO_SELECT_BTN_IDS[index]);
  }

  useEffect(() => {
    const onHeroVideo = (e) => {
      const index = Number(e.detail?.index ?? 0);
      const video = HERO_VIDEOS[index];
      if (video) selectPlaylistVideo(video, index);
    };
    const onHeroPlay = () => {
      const index = HERO_VIDEOS.findIndex((v) => v.id === activeId);
      if (index >= 0) trackBcBtn(BC_HERO_VIDEO_PLAY_BTN_IDS[index]);
      setIsPlaying(true);

function PainPointsB({ onMatch }) {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState([]); // array of { qIdx, hook, label, multi? }
  const [multiSelected, setMultiSelected] = useState([]); // for current multi-select step
  const done = step >= QUIZ.length;

  const resultIdx = useMemo(() => {
    if (answers.length === 0) return 0;
    const counts = {};
    answers.forEach(a => { counts[a.hook] = (counts[a.hook] || 0) + 1; });
    const best = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
    return Number(best[0]);
  }, [answers]);

  const result = PAIN_POINTS.find(p => p.hookIdx === resultIdx) || PAIN_POINTS[0];

  useEffect(() => {
    const onComplete = (e) => {
      const hookIdx = Number(e.detail?.hookIdx ?? 0);
      const target = PAIN_POINTS.find((p) => p.hookIdx === hookIdx) || PAIN_POINTS[0];
      const fakeAnswers = QUIZ.map((_, i) => ({
        qIdx: i,
        hook: target.hookIdx,
        label: "（调试预设）",
      }));
      setAnswers(fakeAnswers);
      setMultiSelected([]);
      setStep(QUIZ.length);
      if (onMatch) onMatch(target);
    };
    const onReset = () => {
      setAnswers([]);
      setStep(0);
      setMultiSelected([]);
    };
    window.addEventListener("tweak-quiz-complete", onComplete);
    window.addEventListener("tweak-quiz-reset", onReset);
    return () => {
      window.removeEventListener("tweak-quiz-complete", onComplete);
      window.removeEventListener("tweak-quiz-reset", onReset);
    };
  }, [onMatch]);

  useEffect(() => {
    if (done) {
      trackBcBtn("bc_pain_quiz_submit_click");
      if (onMatch) onMatch(result);
    }
  }, [done, resultIdx]);

  function pickSingle(a) {
    setAnswers(prev => [...prev, { qIdx: step, hook: a.hook, label: a.label }]);
    setStep(s => s + 1);
  }

  function toggleMulti(a) {
    setMultiSelected(prev =>
      prev.find(x => x.k === a.k) ? prev.filter(x => x.k !== a.k) : [...prev, a]
    );
  }

  function confirmMulti() {
    if (multiSelected.length === 0) return;
    // Use most-common hook among selections
    const counts = {};
    multiSelected.forEach(a => { counts[a.hook] = (counts[a.hook] || 0) + 1; });
    const bestHook = Number(Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0]);
    const labelStr = multiSelected.map(x => x.label).join("、");
    setAnswers(prev => [...prev, { qIdx: step, hook: bestHook, label: labelStr }]);
    setMultiSelected([]);
    setStep(s => s + 1);
  }

  function reset() {
    setAnswers([]); setStep(0); setMultiSelected([]);
  }

  const q = QUIZ[step];

  // Build preview rows: answered + pending
  const previewRows = QUIZ.map((qItem, i) => {
    const ans = answers.find(a => a.qIdx === i);
    const isCurrent = i === step && !done;
    return { qItem, ans, isCurrent };
  });

  return (
    <div className="quiz-layout">
      {/* Left: quiz */}
      <div className="quiz-panel quiz-panel--left">
        {/* Progress */}
        <div className="quiz-progress">
          {QUIZ.map((_, i) => (
            <div
              key={i}
              className={`quiz-progress__bar${done || i <= step ? " is-active" : ""}`}
            />
          ))}
        </div>

        {done ? (
          <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center" }}>
            <div className="eyebrow" style={{ marginBottom: 16 }}>诊断完成</div>
            <div className="quiz-done-title" style={{ marginBottom: 16 }}>
              你最适合 <em style={{ color: "var(--accent)", fontStyle: "italic" }}>「{result.match}」</em>
            </div>
            <p style={{ fontSize: 15, color: "var(--ink-2)", marginBottom: 28, maxWidth: "48ch" }}>
              {result.detail}
            </p>
            <div className="quiz-done-actions" style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
              <DripAnchor
                side="end"
                drip={
                  <NoteDrip
                    inline
                    title="问卷结果 · 查看专属路径"
                    body={"平滑滚动至 #path-{hookIdx}，与模式 A「查看路径」同逻辑；问卷完成时已设路径高亮\n\n【BC 埋点】bc_pain_quiz_submit_click（出结果时）· bc_pain_card_0N_view_path_click"}
                    prd={["§2.2 功能 3", "§2.2 功能 5"]}
                    docs={["prd"]}
                  />
                }
              >
                <a
                  className="btn btn--ink"
                  href={`#path-${result.hookIdx}`}
                  onClick={(e) => {
                    e.preventDefault();
                    trackPainViewPath(result.hookIdx);
                    scrollToPath(result.hookIdx);
                  }}
                >
                  查看专属路径 <Arrow />
                </a>
              </DripAnchor>
              <button className="btn btn--ghost" onClick={reset}>重新测试</button>
            </div>
          </div>
        ) : (
          <>
            <div className="quiz-step-meta">
              第 {step + 1} 题 / 共 {QUIZ.length} 题
              {q.type === "multi" && (
                <span className="quiz-step-meta__tag">多选</span>
              )}
            </div>
            <div key={`quiz-q-${step}`} className="quiz-q-title">
              {q.q}
            </div>
            {q.hint && (
              <div className="quiz-hint">
                {q.hint}
              </div>
            )}

            <div className="quiz-options">
              {q.a.map((a, i) => {
                const isChecked = q.type === "multi" && multiSelected.find(x => x.k === a.k);
                return (
                  <button
                    key={a.k}
                    type="button"
                    className={`quiz-option${isChecked ? " is-checked" : ""}`}
                    onClick={() => q.type === "multi" ? toggleMulti(a) : pickSingle(a)}
                  >
                    {q.type === "multi" ? (
                      <span className="quiz-option__check">
                        {isChecked && <Check size={12} />}
                      </span>
                    ) : (
                      <span className="quiz-option__key">
                        {String.fromCharCode(65 + i)}
                      </span>
                    )}
                    <span className="quiz-option__label">{a.label}</span>
                    {q.type === "single" && <Arrow />}
                  </button>
                );
              })}
            </div>

            {q.type === "multi" && (
              <button
                onClick={confirmMulti}
                disabled={multiSelected.length === 0}
                className="btn btn--ink quiz-confirm"
              >
                确认选择 ({multiSelected.length}) <Arrow />
              </button>
            )}
          </>
        )}
      </div>

      {/* Right: diagnosis preview */}
      <div className="quiz-panel quiz-panel--right">
        <div className="quiz-panel--right-inner">
          <div className="quiz-diag-block">
            <div className="eyebrow quiz-diag-title">写作诊断表</div>
            <div className="quiz-diag-list">
              {previewRows.map(({ qItem, ans, isCurrent }, i) => (
                <div
                  key={i}
                  className={`quiz-diag-row${isCurrent ? " is-current" : ""}${ans ? " has-answer" : ""}`}
                >
                  <span className="quiz-diag-row__label">
                    第 {i + 1} 题
                  </span>
                  <span className="quiz-diag-row__value">
                    {ans ? ans.label : (isCurrent ? "作答中" : "待填写")}
                  </span>
                </div>
              ))}
            </div>
          </div>

          <div className="quiz-live-preview-wrap">
            <MediaPlaceholder className="quiz-live-preview" aspect="4/3" tone="cream" label={done ? "你的结果" : "预览"} />
            <div className="quiz-live-caption">根据回答实时更新</div>
          </div>
        </div>
      </div>
    </div>
  );
}

function AuthProvider({ children }) {
  const [isLoggedIn, setIsLoggedIn] = useState(() => {
    try { return localStorage.getItem(AUTH_STORAGE_KEY) === "1"; } catch { return false; }
  });
  const [loginOpen, setLoginOpen] = useState(false);
  const [svipOpen, setSvipOpen] = useState(false);
  const [pendingPathIndex, setPendingPathIndex] = useState(null);

  const openLogin = useCallback((pathIndex = null) => {
    setPendingPathIndex(pathIndex);
    setLoginOpen(true);
  }, []);

  const closeLogin = useCallback(() => {
    setLoginOpen(false);
    setPendingPathIndex(null);
  }, []);

  const openSvip = useCallback(() => setSvipOpen(true), []);
  const closeSvip = useCallback(() => setSvipOpen(false), []);

  const dispatchPathSuccess = useCallback((pathIndex) => {
    if (pathIndex === PATH02_INDEX) {
      window.dispatchEvent(new CustomEvent("path02-plan-request"));
      return;
    }
    if (PATH_CTA_TARGETS[pathIndex]?.type === "url") {
      navigatePathCta(pathIndex);
      return;
    }
    window.dispatchEvent(new CustomEvent("path-cta-success", {
      detail: { index: pathIndex, label: PATHS[pathIndex]?.cta },
    }));
  }, []);

  const completeAuth = useCallback((mode) => {
    try { localStorage.setItem(AUTH_STORAGE_KEY, "1"); } catch { /* ignore */ }
    setIsLoggedIn(true);
    setLoginOpen(false);
    if (mode === "register") bcLandingTrackRegisterSuccess();
    const idx = pendingPathIndex;
    setPendingPathIndex(null);
    if (idx != null) dispatchPathSuccess(idx);
  }, [pendingPathIndex, dispatchPathSuccess]);

  const logout = useCallback(() => {
    try { localStorage.removeItem(AUTH_STORAGE_KEY); } catch { /* ignore */ }
    setIsLoggedIn(false);
    window.dispatchEvent(new CustomEvent("bc-landing-auth-logout"));
  }, []);

  const setLoggedInDemo = useCallback((value) => {
    if (value) {
      try { localStorage.setItem(AUTH_STORAGE_KEY, "1"); } catch { /* ignore */ }
      setIsLoggedIn(true);
    } else {
      logout();
    }
  }, [logout]);

  const requireAuthForPath = useCallback((pathIndex) => {
    if (isLoggedIn) {
      dispatchPathSuccess(pathIndex);
      return true;
    }
    openLogin(pathIndex);
    return false;
  }, [isLoggedIn, openLogin, dispatchPathSuccess]);

  const value = useMemo(() => ({
    isLoggedIn,
    loginOpen,
    svipOpen,
    pendingPathIndex,
    openLogin,
    closeLogin,
    openSvip,
    closeSvip,
    completeAuth,
    logout,
    setLoggedInDemo,
    requireAuthForPath,
  }), [isLoggedIn, loginOpen, svipOpen, pendingPathIndex, openLogin, closeLogin, openSvip, closeSvip, completeAuth, logout, setLoggedInDemo, requireAuthForPath]);

  return (
    <AuthContext.Provider value={value}>
      {children}
      <LoginRegisterModal />
      <SvipIntroModal />
    </AuthContext.Provider>
  );
}

const Path02PlanContext = createContext(null);

function usePath02Plan() {
  const ctx = useContext(Path02PlanContext);
  if (!ctx) throw new Error("usePath02Plan must be used within Path02PlanProvider");
  return ctx;
}

function formatFileSize(bytes) {
  if (bytes < 1024) return `${bytes} B`;
  if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
  return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
}

function loadStoredPlan() {
  try {
    const raw = localStorage.getItem(PLAN_STORAGE_KEY);
    if (!raw) return { status: "none" };
    const data = JSON.parse(raw);
    if (data?.status === "generating") {
      const fileNames = data.fileNames || [];
      const elapsed = Date.now() - (data.startedAt || 0);
      if (elapsed >= PLAN_GEN_TIMEOUT_MS) {
        return { status: "none" };
      }
      if (elapsed >= PLAN_DEMO_GEN_MS) {
        return {
          ...data,
          status: "ready",
          fileNames,
          preview: data.preview || buildDemoPlanPreview(fileNames),
          readyAt: data.startedAt + PLAN_DEMO_GEN_MS,
        };
      }
      return data;
    }
    if (data?.status === "ready") {
      const fileNames = data.fileNames || [];
      const preview = data.preview || (fileNames.length ? buildDemoPlanPreview(fileNames) : null);
      return preview ? { ...data, fileNames, preview } : { status: "none" };
    }
    if (data?.status === "none") return { status: "none" };
    return { status: "none" };
  } catch {
    return { status: "none" };
  }
}

function saveStoredPlan(plan) {
  try {
    if (plan.status === "none") localStorage.removeItem(PLAN_STORAGE_KEY);
    else localStorage.setItem(PLAN_STORAGE_KEY, JSON.stringify(plan));
  } catch { /* ignore */ }
}

function hasGeneratedPlan(plan) {
  return plan?.status === "ready" && Boolean(plan.preview);
}

function createDemoPdfBlob(preview) {
  const lines = [
    preview.title,
    "",
    ...preview.sections.flatMap((s) => {
      const block = [s.heading, s.body || "", ...(s.items || [])].filter(Boolean);
      return [...block, ""];
    }),
  ];
  const escaped = lines.map((l) => l.replace(/[()\\]/g, "\\$&")).slice(0, 40);
  let y = 750;
  const textOps = escaped.map((line) => {
    const op = `BT /F1 11 Tf 48 ${y} Td (${line.slice(0, 80)}) Tj ET`;
    y -= 16;
    return op;
  }).join("\n");
  const stream = textOps + "\n";
  const pdf = `%PDF-1.4
1 0 obj<</Type/Catalog/Pages 2 0 R>>endobj
2 0 obj<</Type/Pages/Kids[3 0 R]/Count 1>>endobj
3 0 obj<</Type/Page/MediaBox[0 0 612 792]/Parent 2 0 R/Contents 4 0 R/Resources<</Font<</F1 5 0 R>>>>>>endobj
4 0 obj<</Length ${stream.length}>>stream
${stream}
endstream endobj
5 0 obj<</Type/Font/Subtype/Type1/BaseFont/Helvetica>>endobj
xref
0 6
0000000000 65535 f 
0000000010 00000 n 
0000000053 00000 n 
0000000100 00000 n 
0000000240 00000 n 
0000000500 00000 n 
trailer<</Size 6/Root 1 0 R>>
startxref
580
%%EOF`;
  return new Blob([pdf], { type: "application/pdf" });
}

function PlanModalShell({ title, description, icon, wide, result, status, statusError, uploadState, generating, onClose, children, footer, footerBar = false }) {

    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose]);

  useEffect(() => {
    const body = document.body;
    const html = document.documentElement;
    const scrollY = window.scrollY;
    const previous = {
      bodyPosition: body.style.position,
      bodyTop: body.style.top,
      bodyLeft: body.style.left,
      bodyRight: body.style.right,
      bodyWidth: body.style.width,
      bodyOverflow: body.style.overflow,
      bodyPaddingRight: body.style.paddingRight,
      htmlOverflow: html.style.overflow,
    };
    const scrollbarWidth = Math.max(0, window.innerWidth - html.clientWidth);

    html.style.overflow = "hidden";
    body.style.position = "fixed";
    body.style.top = `-${scrollY}px`;
    body.style.left = "0";
    body.style.right = "0";
    body.style.width = "100%";
    body.style.overflow = "hidden";
    if (scrollbarWidth > 0) body.style.paddingRight = `${scrollbarWidth}px`;

    return () => {
      body.style.position = previous.bodyPosition;
      body.style.top = previous.bodyTop;
      body.style.left = previous.bodyLeft;
      body.style.right = previous.bodyRight;
      body.style.width = previous.bodyWidth;
      body.style.overflow = previous.bodyOverflow;
      body.style.paddingRight = previous.bodyPaddingRight;
      html.style.overflow = previous.htmlOverflow;

            <button type="button" className="plan-upload-file__retry" onClick={(e) => { e.stopPropagation(); onRetry(item.id); }}>
              再试一次
            </button>
          )}
        </div>
        <button
          type="button"
          className="plan-upload-slot__remove"
          onClick={(e) => { e.stopPropagation(); onRemove(item.id); }}
          aria-label={isUploading ? "取消上传" : "删除文件"}
        >
          {isUploading ? <CloseIcon /> : <Trash />}
        </button>
      </div>
      {isUploading && (
        <div className="plan-upload-file__progress" aria-hidden="true">
          <div className="plan-upload-file__progress-fill" style={{ width: `${Math.max(10, item.progress || 10)}%` }} />
        </div>
      )}
    </div>
  );
}

        onDragOver={(e) => { e.preventDefault(); setDrag(true); }}

function PlanResultPreview({ preview }) {
  const previewRef = useRef(null);
  const [fade, setFade] = useState({ top: false, bottom: false });

  useEffect(() => {
    const el = previewRef.current;
    if (!el) return;

    let frame = 0;
    const update = () => {
      const maxScroll = Math.max(0, el.scrollHeight - el.clientHeight);
      const next = {
        top: el.scrollTop > 1,
        bottom: el.scrollTop < maxScroll - 1,
      };
      setFade(prev => (
        prev.top === next.top && prev.bottom === next.bottom ? prev : next
      ));
    };
    const requestUpdate = () => {
      if (frame) cancelAnimationFrame(frame);
      frame = requestAnimationFrame(update);
    };

    update();
    el.addEventListener("scroll", requestUpdate, { passive: true });
    window.addEventListener("resize", requestUpdate);
    return () => {
      if (frame) cancelAnimationFrame(frame);
      el.removeEventListener("scroll", requestUpdate);
      window.removeEventListener("resize", requestUpdate);
    };
  }, [preview]);

  return (
    <div className={`plan-result-shell${fade.top ? " has-top-fade" : ""}${fade.bottom ? " has-bottom-fade" : ""}`}>
      <div className="plan-result-preview" ref={previewRef}>
        <h4>{preview.title}</h4>
        {preview.sections.map((s, i) => (
          <section key={i}>
            <h4>{s.heading}</h4>
            {s.body && <p>{s.body}</p>}
            {s.items && (
              <ul>{s.items.map((item, j) => <li key={j}>{item}</li>)}</ul>
            )}
          </section>
        ))}
      </div>
      <div className="plan-result-fade plan-result-fade--top" aria-hidden="true" />
      <div className="plan-result-fade plan-result-fade--bottom" aria-hidden="true" />
    </div>
  );
}

function Path02PlanProvider({ children }) {
  const [plan, setPlan] = useState(loadStoredPlan);
  const [modal, setModal] = useState(null);
  const [files, setFiles] = useState([null, null]);
  const [fileErrors, setFileErrors] = useState(["", ""]);
  const [uploadItems, setUploadItems] = useState([]);
  const [genProgress, setGenProgress] = useState(0);
  const [planToast, setPlanToast] = useState(null);
  const genStartedInSessionRef = useRef(false);
  const planBeforeGenerationRef = useRef(null);
  const planToastTimerRef = useRef(null);
  const timerRef = useRef(null);
  const timeoutRef = useRef(null);
  const progressRef = useRef(null);
  const uploadTimersRef = useRef({});

  const persistPlan = useCallback((next) => {
    setPlan(next);
    saveStoredPlan(next);
  }, []);

  const showToast = useCallback((msg, opts = {}) => {
    if (planToastTimerRef.current) clearTimeout(planToastTimerRef.current);
    const duration = opts.duration ?? 3200;
    setPlanToast(msg);
    planToastTimerRef.current = setTimeout(() => {
      setPlanToast(null);
      planToastTimerRef.current = null;
    }, duration);
  }, []);

  const closeModal = useCallback(() => {
    setModal((prev) => {
      if (prev === "generating") trackBcBtn("bc_path02_wait_close_click");
      return null;
    });
  }, []);

  const clearUploadTimers = useCallback(() => {
    Object.values(uploadTimersRef.current).forEach((timer) => clearTimeout(timer));
    uploadTimersRef.current = {};
  }, []);

  const syncUploadFiles = useCallback((items) => {
    const successFiles = items.filter((item) => item.status === "success").map((item) => item.file).slice(0, PLAN_MAX_UPLOAD_COUNT);
    const errors = items.filter((item) => item.status === "error").map((item) => item.error).slice(0, PLAN_MAX_UPLOAD_COUNT);
    setFiles([successFiles[0] || null, null]);
    setFileErrors([errors[0] || "", ""]);
  }, []);

  const openUpload = useCallback(() => {
    clearUploadTimers();
    setFiles([null, null]);
    setFileErrors(["", ""]);
    setUploadItems([]);
    setModal("upload");
    trackBcBtn("bc_path02_plan_open_click");
  }, [clearUploadTimers]);

  const viewPlan = useCallback(() => {
    if (hasGeneratedPlan(plan)) {
      trackBcBtn("bc_path02_view_click");
      setModal("result");
    }
  }, [plan]);

  const handlePlanRequest = useCallback(() => {
    if (plan.status === "generating") {
      showToast("方案生成中，请稍候");
      return;
    }
    if (hasGeneratedPlan(plan)) {
      setModal("overwrite");
      return;
    }
    openUpload();
  }, [plan, showToast, openUpload]);

  const confirmOverwrite = useCallback(() => {
    trackBcBtn("bc_path02_overwrite_confirm_click");
    openUpload();
  }, [openUpload]);

  const validateFile = useCallback((file) => {
    if (!isPdfFile(file)) return "请上传 PDF 文件";
    if (file.size > PLAN_MAX_BYTES) return "文件超过 5MB";
    return "";
  }, []);

  const setFileAt = useCallback((index, file) => {
    const err = validateFile(file);
    setFiles((prev) => {
      const next = [...prev];
      next[index] = err ? null : file;
      return next;
    });
    setFileErrors((prev) => {
      const next = [...prev];
      next[index] = err;
      return next;
    });
  }, [validateFile]);

  const completeUploadItem = useCallback((id) => {
    delete uploadTimersRef.current[id];
    setUploadItems((prev) => {
      const next = prev.map((item) => (
        item.id === id && item.status === "uploading"
          ? { ...item, status: "success", progress: 100, loaded: item.file.size, error: "" }
          : item
      ));
      syncUploadFiles(next);
      return next;
    });
  }, [syncUploadFiles]);

  const setUploadFiles = useCallback((fileList) => {
    const incoming = Array.from(fileList || []);
    if (!incoming.length) return;

    const createdAt = Date.now();
    const newItems = incoming.map((file, index) => {
        const err = validateFile(file);
        return {
          id: `${createdAt}-${index}-${file.name}-${file.size}`,
          file,
          status: err ? "error" : "uploading",
          progress: err ? 0 : 10,
          loaded: err ? 0 : 0,
          error: err,
        };
      });

    setUploadItems((prev) => {
      const slotsLeft = Math.max(0, PLAN_MAX_UPLOAD_COUNT - prev.length);
      if (!slotsLeft) {
        setFileErrors(["仅支持上传 1 份 PDF，请先删除当前文件", ""]);
        return prev;
      }
      const next = [...prev, ...newItems.slice(0, slotsLeft)];
      syncUploadFiles(next);
      return next;
    });

    newItems.slice(0, Math.max(0, PLAN_MAX_UPLOAD_COUNT - uploadItems.length)).forEach((item) => {
      if (item.status !== "uploading") return;
      uploadTimersRef.current[item.id] = setTimeout(() => completeUploadItem(item.id), 700);
    });
  }, [completeUploadItem, syncUploadFiles, uploadItems.length, validateFile]);

  const clearUploadItem = useCallback((id) => {
    if (uploadTimersRef.current[id]) {
      clearTimeout(uploadTimersRef.current[id]);
      delete uploadTimersRef.current[id];
    }
    setUploadItems((prev) => {
      const next = prev.filter((item) => item.id !== id);
      syncUploadFiles(next);
      return next;
    });
  }, [syncUploadFiles]);

  const clearFileAt = useCallback((index) => {
    const target = uploadItems[index];
    if (target) clearUploadItem(target.id);
  }, [clearUploadItem, uploadItems]);

  const retryUploadItem = useCallback((id) => {
    let shouldComplete = false;
    setUploadItems((prev) => {
      const next = prev.map((item) => (
        item.id === id
          ? (() => {
              const err = validateFile(item.file);
              if (err) return { ...item, status: "error", progress: 0, loaded: 0, error: err };
              shouldComplete = true;
              return { ...item, status: "uploading", progress: 10, loaded: 0, error: "" };
            })()
          : item
      ));
      syncUploadFiles(next);
      return next;
    });
    if (uploadTimersRef.current[id]) clearTimeout(uploadTimersRef.current[id]);
    if (shouldComplete) {
      uploadTimersRef.current[id] = setTimeout(() => completeUploadItem(id), 700);
    }
  }, [completeUploadItem, syncUploadFiles, validateFile]);

  const finishGeneration = useCallback((fileNames) => {
    if (timerRef.current) clearTimeout(timerRef.current);
    if (timeoutRef.current) clearTimeout(timeoutRef.current);
    if (progressRef.current) clearInterval(progressRef.current);
    timerRef.current = null;
    timeoutRef.current = null;
    progressRef.current = null;
    planBeforeGenerationRef.current = null;
    const preview = buildDemoPlanPreview(fileNames);
    const readyPlan = {
      status: "ready",
      fileNames,
      preview,
      readyAt: Date.now(),
    };
    persistPlan(readyPlan);
    setGenProgress(100);
    trackBcBtn("bc_path02_gen_complete_click");
    if (genStartedInSessionRef.current) {
      setModal("result");
    }
  }, [persistPlan]);

  const failGeneration = useCallback(() => {
    if (timerRef.current) clearTimeout(timerRef.current);
    if (timeoutRef.current) clearTimeout(timeoutRef.current);
    if (progressRef.current) clearInterval(progressRef.current);
    timerRef.current = null;
    timeoutRef.current = null;
    progressRef.current = null;
    genStartedInSessionRef.current = false;
    setGenProgress(0);
    setModal(null);
    const restore = planBeforeGenerationRef.current;
    planBeforeGenerationRef.current = null;
    persistPlan(restore || { status: "none" });
    trackBcBtn("bc_path02_gen_fail_click");
    showToast(PLAN_FAIL_TOAST_MSG, { duration: PLAN_FAIL_TOAST_MS });
  }, [persistPlan, showToast]);

  const timeoutGeneration = useCallback(() => {
    if (timerRef.current) clearTimeout(timerRef.current);
    if (timeoutRef.current) clearTimeout(timeoutRef.current);
    if (progressRef.current) clearInterval(progressRef.current);
    timerRef.current = null;
    timeoutRef.current = null;
    progressRef.current = null;
    genStartedInSessionRef.current = false;
    setGenProgress(0);
    const restore = planBeforeGenerationRef.current;
    planBeforeGenerationRef.current = null;
    persistPlan(restore || { status: "none" });
    trackBcBtn("bc_path02_gen_fail_click");
    setModal("gen_timeout");
  }, [persistPlan]);

  const startGeneration = useCallback((fileNames) => {
    planBeforeGenerationRef.current = hasGeneratedPlan(plan) ? { ...plan } : null;
    genStartedInSessionRef.current = true;
    persistPlan({ status: "generating", fileNames, startedAt: Date.now() });
    setGenProgress(0);
    setModal("generating");
  }, [persistPlan, plan]);

  const submitUpload = useCallback(() => {
    const picked = uploadItems.filter((item) => item.status === "success").map((item) => item.file);
    if (!picked.length) return;
    trackBcBtn("bc_path02_upload_submit_click");
    startGeneration(picked.map((file) => file.name));
  }, [startGeneration, uploadItems]);

  useEffect(() => {
    const onRequest = () => handlePlanRequest();
    window.addEventListener("path02-plan-request", onRequest);
    return () => window.removeEventListener("path02-plan-request", onRequest);
  }, [handlePlanRequest]);

  useEffect(() => {
    const onAuthChange = () => setModal(null);
    window.addEventListener("bc-landing-auth-logout", onAuthChange);
    return () => window.removeEventListener("bc-landing-auth-logout", onAuthChange);
  }, []);

  useEffect(() => {
    window.bcLandingPath02GenerationFailed = failGeneration;
    window.bcLandingPath02GenerationTimeout = timeoutGeneration;
    return () => {
      delete window.bcLandingPath02GenerationFailed;
      delete window.bcLandingPath02GenerationTimeout;
    };
  }, [failGeneration, timeoutGeneration]);

  useEffect(() => {
    if (plan.status !== "generating" || !plan.startedAt) return undefined;

    const fileNames = plan.fileNames || [];
    const remaining = Math.max(0, PLAN_DEMO_GEN_MS - (Date.now() - plan.startedAt));
    const timeoutRemaining = Math.max(0, PLAN_GEN_TIMEOUT_MS - (Date.now() - plan.startedAt));

    const updateProgress = () => {
      const elapsed = Date.now() - plan.startedAt;
      setGenProgress(Math.min(99, Math.round((elapsed / PLAN_GEN_PROGRESS_MS) * 100)));
    };

    updateProgress();
    progressRef.current = setInterval(updateProgress, 200);

    timerRef.current = setTimeout(() => {
      if (progressRef.current) clearInterval(progressRef.current);
      finishGeneration(fileNames);
    }, remaining);

    timeoutRef.current = setTimeout(() => {
      if (progressRef.current) clearInterval(progressRef.current);
      timeoutGeneration();
    }, timeoutRemaining);

    return () => {
      if (timerRef.current) clearTimeout(timerRef.current);
      if (timeoutRef.current) clearTimeout(timeoutRef.current);
      if (progressRef.current) clearInterval(progressRef.current);
    };
  }, [plan.status, plan.startedAt, plan.fileNames, finishGeneration, timeoutGeneration]);

  const resetPlanDemo = useCallback(() => {
    if (timerRef.current) clearTimeout(timerRef.current);
    if (timeoutRef.current) clearTimeout(timeoutRef.current);
    if (progressRef.current) clearInterval(progressRef.current);
    clearUploadTimers();
    genStartedInSessionRef.current = false;
    persistPlan({ status: "none" });
    setModal(null);
    setFiles([null, null]);
    setFileErrors(["", ""]);
    setUploadItems([]);
    setGenProgress(0);
  }, [clearUploadTimers, persistPlan]);

  const simulateReadyPlan = useCallback(() => {
    genStartedInSessionRef.current = false;
    const preview = buildDemoPlanPreview(["demo-report.pdf"]);
    persistPlan({
      status: "ready",
      fileNames: ["demo-report.pdf"],
      preview,
      readyAt: Date.now(),
    });
  }, [persistPlan]);

  const simulateGenerating = useCallback((opts = {}) => {
    planBeforeGenerationRef.current = hasGeneratedPlan(plan) ? { ...plan } : null;
    genStartedInSessionRef.current = opts.autoPopup !== false;
    persistPlan({
      status: "generating",
      fileNames: opts.fileNames || ["demo-report.pdf"],
      startedAt: Date.now() - (opts.elapsedMs || 0),
    });
    setGenProgress(opts.progress ?? 0);
    setModal(opts.showModal === false ? null : "generating");
  }, [persistPlan, plan]);

  const openOverwriteModalDemo = useCallback(() => {
    if (!hasGeneratedPlan(plan)) {
      const preview = buildDemoPlanPreview(["demo-report.pdf"]);
      persistPlan({
        status: "ready",
        fileNames: ["demo-report.pdf"],
        preview,
        readyAt: Date.now(),
      });
    }
    setModal("overwrite");
  }, [persistPlan, plan]);

  const simulateGeneratingBlocked = useCallback(() => {
    if (plan.status !== "generating") {
      simulateGenerating({ showModal: false, autoPopup: false, elapsedMs: 4000, progress: 40 });
    }
    setTimeout(() => showToast("方案生成中，请稍候"), 0);
  }, [plan.status, simulateGenerating, showToast]);

  const value = useMemo(() => ({
    plan,
    modal,
    files,
    fileErrors,
    uploadItems,
    genProgress,
    planToast,
    closeModal,
    openUpload,
    viewPlan,
    confirmOverwrite,
    submitUpload,
    setFileAt,
    setUploadFiles,
    clearUploadItem,
    clearFileAt,
    retryUploadItem,
    handlePlanRequest,
    resetPlanDemo,
    simulateReadyPlan,
    simulateGenerating,
    openOverwriteModalDemo,
    simulateGeneratingBlocked,
    failGeneration,
    timeoutGeneration,
  }), [
    plan, modal, files, fileErrors, uploadItems, genProgress, planToast,
    closeModal, openUpload, viewPlan, confirmOverwrite, submitUpload,
    setFileAt, setUploadFiles, clearUploadItem, clearFileAt, retryUploadItem, handlePlanRequest, resetPlanDemo, simulateReadyPlan,
    simulateGenerating, openOverwriteModalDemo, simulateGeneratingBlocked, failGeneration, timeoutGeneration,
  ]);

  return (
    <Path02PlanContext.Provider value={value}>
      {children}
      <Path02PlanUI />
      <Path02GeneratingBar />
    </Path02PlanContext.Provider>
  );
}
