function buildFlowTrackItems() {
  const items = [
    { id: "hero" },
    { id: "pain" },
    { id: "paths" },
    ...PATHS.map((_, i) => ({ id: `path-${i}` })),
    { id: "proof" },
  ];
  return items;
}

function getScrollAnchorOffset() {
  const nav = document.querySelector(".nav");
  return Math.ceil(nav?.getBoundingClientRect().height ?? 88) + 4;
}

function getFlowSection(id) {
  if (id === "paths") return document.getElementById("paths");
  return document.querySelector(`section#${CSS.escape(id)}`);
}

function getSectionDocTop(el) {
  return window.scrollY + el.getBoundingClientRect().top;
}

function scrollToSection(id) {
  const el = getFlowSection(id);
  if (!el) return;
  const top = getSectionDocTop(el) - getScrollAnchorOffset();
  window.scrollTo({ top: Math.max(0, top), behavior: scrollBehavior() });
}

const NAV_SECTIONS = [
  { id: "hero", href: "#hero", label: "公开课" },
  { id: "pain", href: "#pain", label: "我的提分需求" },
  { id: "paths", href: "#paths", label: "学习路径" },
  { id: "proof", href: "#proof", label: "学员故事" },
];

function resolveNavSection(trackId) {
  if (trackId === "paths" || trackId.startsWith("path-")) return "paths";
  if (trackId === "proof") return "proof";
  if (trackId === "pain") return "pain";
  return "hero";
}

function useNavActiveSection() {
  const trackItems = useMemo(() => buildFlowTrackItems(), []);
  const [activeSection, setActiveSection] = useState("hero");

  useEffect(() => {
    const update = () => {
      const marker = window.scrollY + getScrollAnchorOffset() + 8;
      let current = trackItems[0].id;
      for (const item of trackItems) {
        const el = getFlowSection(item.id);
        if (el && getSectionDocTop(el) <= marker) current = item.id;
      }
      setActiveSection(resolveNavSection(current));
    };
    update();
    window.addEventListener("scroll", update, { passive: true });
    window.addEventListener("resize", update);
    return () => {
      window.removeEventListener("scroll", update);
      window.removeEventListener("resize", update);
    };
  }, [trackItems]);

  return activeSection;
}

function FlowAxis() {
  const [activeId, setActiveId] = useState("hero");
  const trackItems = useMemo(() => buildFlowTrackItems(), []);

  useEffect(() => {
    const update = () => {
      const marker = window.scrollY + getScrollAnchorOffset() + 8;
      let current = trackItems[0].id;
      for (const item of trackItems) {
        const el = getFlowSection(item.id);
        if (el && getSectionDocTop(el) <= marker) current = item.id;
      }
      setActiveId(current);
    };
    update();
    window.addEventListener("scroll", update, { passive: true });
    window.addEventListener("resize", update);
    return () => {
      window.removeEventListener("scroll", update);
      window.removeEventListener("resize", update);
    };
  }, [trackItems]);

  const activeIndex = Math.max(0, trackItems.findIndex(s => s.id === activeId));
  const progressPct = trackItems.length <= 1
    ? 0
    : (activeIndex / (trackItems.length - 1)) * 100;

  const pathActiveIndex = activeId.startsWith("path-") ? Number(activeId.replace("path-", "")) : -1;

  function stepState(stepId) {
    if (stepId === "paths") {
      if (activeId === "paths") return "is-active";
      if (pathActiveIndex >= 0) return "is-active-parent";
      const pathsIndex = trackItems.findIndex(item => item.id === "paths");
      if (pathsIndex >= 0 && pathsIndex < activeIndex) return "is-done";
      return "";
    }
    if (activeId === stepId) return "is-active";
    const stepTrackIndex = trackItems.findIndex(item => item.id === stepId);
    if (stepTrackIndex >= 0 && stepTrackIndex < activeIndex) return "is-done";
    return "";
  }

  return (
    <nav className="flow-axis" aria-label="页面导航">
      <div className="flow-axis__inner">
        <div className="flow-axis__track">
          <div className="flow-axis__line" aria-hidden="true">
            <div className="flow-axis__rail" />
            <div className="flow-axis__progress" style={{ height: `${progressPct}%` }} />
          </div>
          <div className="flow-axis__items">
            {FLOW_MAIN_STEPS.map((step) => {
              const state = stepState(step.id);
              return (
                <React.Fragment key={step.id}>
                  <button
                    type="button"
                    className={`flow-axis__step${state ? ` ${state}` : ""}`}
                    onClick={() => {
                      trackFlowAxisSection(step.id);
                      scrollToSection(step.id);
                    }}
                    aria-current={state === "is-active" ? "step" : undefined}
                  >
                    <span className="flow-axis__dot" aria-hidden="true" />
                    <span className="flow-axis__label">{step.label}</span>
                  </button>
                  {step.id === "paths" && (
                    <div className="flow-axis__subs" aria-label="学习路径子项">
                      {PATHS.map((p, pi) => {
                        const subId = `path-${pi}`;
                        const subActive = activeId === subId;
                        const subDone = pathActiveIndex >= 0 && pi < pathActiveIndex;
                        return (
                          <button
                            key={subId}
                            type="button"
                            className={`flow-axis__sub-step${subActive ? " is-active" : ""}${subDone ? " is-done" : ""}`}
                            data-path-index={pi}
                            onClick={(e) => {
                              e.stopPropagation();
                              trackFlowAxisPath(pi);
                              scrollToSection(subId);
                            }}
                            aria-current={subActive ? "step" : undefined}
                          >
                            <span className="flow-axis__sub-dot" aria-hidden="true" />
                            <span className="flow-axis__sub-label">{FLOW_PATH_LABELS[pi] || `${p.num}·${p.kicker}`}</span>
                          </button>
                        );
                      })}
                    </div>
                  )}
                </React.Fragment>
              );
            })}
          </div>
        </div>
      </div>
    </nav>
  );
}

const TWEAK_PANEL_GEOM_KEY = "tweak-panel-geom-v1";

function tweakPanelDefaultGeom() {
  const width = Math.min(400, Math.max(280, window.innerWidth - 32));
  const height = Math.min(560, Math.max(240, window.innerHeight - 48));
  return {
    x: Math.max(12, window.innerWidth - width - 20),
    y: Math.max(12, window.innerHeight - height - 20),
    width,
    height,
    opacity: 1,
  };
}

function tweakPanelClampOpacity(value) {
  const n = Number(value);
  if (Number.isNaN(n)) return 1;
  return Math.max(0.35, Math.min(1, Math.round(n * 100) / 100));
}

function tweakPanelApplyOpacity(opacity) {
  document.documentElement.style.setProperty("--proto-panel-opacity", String(tweakPanelClampOpacity(opacity ?? 1)));
}

function tweakPanelLoadGeom() {
  try {
    const raw = localStorage.getItem(TWEAK_PANEL_GEOM_KEY);
    if (!raw) return tweakPanelDefaultGeom();
    const data = JSON.parse(raw);
    return tweakPanelClampGeom({
      x: Number(data.x),
      y: Number(data.y),
      width: Number(data.width) || 400,
      height: Number(data.height) || 400,
      opacity: data.opacity,
    });
  } catch {
    return tweakPanelDefaultGeom();
  }
}

function tweakPanelClampGeom(geom) {
  const minW = 280;
  const minH = 200;
  const maxW = Math.max(minW, window.innerWidth - 16);
  const maxH = Math.max(minH, window.innerHeight - 16);
  const width = Math.max(minW, Math.min(geom.width, maxW));
  const height = Math.max(minH, Math.min(geom.height, maxH));
  const x = Math.max(8, Math.min(geom.x, window.innerWidth - width - 8));
  const y = Math.max(8, Math.min(geom.y, window.innerHeight - height - 8));
  const opacity = tweakPanelClampOpacity(geom.opacity ?? 1);
  return { x, y, width, height, opacity };
}

function useTweakPanelDrag(setGeom) {
  const geomRef = useRef(tweakPanelDefaultGeom());
  const dragRef = useRef(null);
  const resizeRef = useRef(null);

  const syncGeom = useCallback((next) => {
    const clamped = tweakPanelClampGeom(next);
    geomRef.current = clamped;
    setGeom(clamped);
    return clamped;
  }, [setGeom]);

  const persistGeom = useCallback(() => {
    localStorage.setItem(TWEAK_PANEL_GEOM_KEY, JSON.stringify(geomRef.current));
  }, []);

  useEffect(() => {
    const onMove = (e) => {
      if (dragRef.current) {
        const d = dragRef.current;
        syncGeom({
          ...geomRef.current,
          x: d.originX + (e.clientX - d.startX),
          y: d.originY + (e.clientY - d.startY),
        });
      }
      if (resizeRef.current) {
        const r = resizeRef.current;
        syncGeom({
          ...geomRef.current,
          width: r.originW + (e.clientX - r.startX),
          height: r.originH + (e.clientY - r.startY),
        });
      }
    };
    const onUp = () => {
      if (!dragRef.current && !resizeRef.current) return;
      dragRef.current = null;
      resizeRef.current = null;
      document.body.style.userSelect = "";
      document.body.style.cursor = "";
      persistGeom();
    };
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
    window.addEventListener("pointercancel", onUp);
    return () => {
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
      window.removeEventListener("pointercancel", onUp);
    };
  }, [syncGeom, persistGeom]);

  const startDrag = useCallback((e) => {
    if (e.button !== 0) return;
    if (e.target.closest("button, a, input, select, textarea, .proto-drip, .proto-anchor")) return;
    e.preventDefault();
    dragRef.current = {
      startX: e.clientX,
      startY: e.clientY,
      originX: geomRef.current.x,
      originY: geomRef.current.y,
    };
    document.body.style.userSelect = "none";
    document.body.style.cursor = "grabbing";
  }, []);

  const startResize = useCallback((e) => {
    if (e.button !== 0) return;
    e.preventDefault();
    e.stopPropagation();
    resizeRef.current = {
      startX: e.clientX,
      startY: e.clientY,
      originW: geomRef.current.width,
      originH: geomRef.current.height,
    };
    document.body.style.userSelect = "none";
    document.body.style.cursor = "nwse-resize";
  }, []);

  const bindGeom = useCallback((geom) => {
    geomRef.current = geom;
  }, []);

  return { startDrag, startResize, bindGeom, syncGeom };
}

function TweakSection({ title, children }) {

}

                <TweakBtn ghost onClick={resetPlanDemo}>重置路径02</TweakBtn>
              </div>
              {plan.status !== "none" || modal ? (
                <div className="tweak-status">
                  plan={plan.status}{modal ? ` · modal=${modal}` : ""}
                </div>
              ) : null}
            </TweakSection>

            <TweakSection title="样式预览">
              <TweakField label="强调色">
                <div className="tweak-accent-row">
                  {TWEAK_ACCENT_SWATCHES.map(([c, name]) => (
                    <button
                      key={c}
                      type="button"
                      className={`tweak-accent-swatch${tweaks.accent === c ? " is-selected" : ""}`}
                      style={{ background: c }}
                      title={name}
                      aria-label={name}
                      onClick={() => update({ accent: c })}
                    />
                  ))}
                </div>
              </TweakField>
              <div className="tweak-inline-row tweak-style-row">
                <div className="tweak-field__label">深色模式</div>
                <button
                  type="button"
                  className={`tweak-toggle${tweaks.darkMode ? " is-on" : ""}`}
                  onClick={() => update({ darkMode: !tweaks.darkMode })}
                  aria-pressed={tweaks.darkMode}
                  aria-label="切换深色模式预览"
                >
                  <div className="tweak-toggle__knob" />
                </button>
              </div>
            </TweakSection>
          </div>
          <div className="tweak-panel__footer">
            <TweakBtn ghost onClick={resetDemoStates}>重置全部演示态</TweakBtn>
          </div>
          <div
            className="tweak-panel__resize"
            onPointerDown={startTweakPanelResize}
            aria-hidden="true"
            title="拖拽调整大小"
          />
        </div>
        ) : (
          <DripAnchor
            side="top"
            drip={
              <NoteDrip
                inline
                title="Tweaks 调试面板"
                body={"⚠️ 交付专用 · 生产剔除\n\n页内无入口 · 仅面板可触发（含面板透明度、拖拽缩放、强调色、Dark Mode）"}
                prd={["§2.3.2 Tweaks 调试面板"]}
                docs={["prd"]}
              />
            }
          >
            <button
              type="button"
              className="tweak-gear"
              onClick={() => setPanelOpen(true)}
              title="Tweaks（原型调试 · 生产移除）"
              aria-expanded={false}
            >
              ⚙
            </button>
          </DripAnchor>
        )}
      </div>

      {pathToast && (
        <div className="auth-toast" role="status">{pathToast}</div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <DripProvider>
    <AuthProvider>
      <Path02PlanProvider>
        <App />
        <DripToolbar />
      </Path02PlanProvider>
    </AuthProvider>
  </DripProvider>
);
</script>
</body>
</html>
