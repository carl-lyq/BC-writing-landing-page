<head>

<title>躺着学 · 雅思写作</title>

<!-- Local preview package: runtime scripts are vendored under ./vendor. -->

<style>
/* ============================================================
   IELTS Writing Landing — Warm Editorial System
   ============================================================ */

:root {
  --paper: #f4f7fb;
  --paper-2: #e7eef7;
  --paper-3: #d5e0ef;
  --ink: #0b1f3a;
  --ink-2: #1e3a63;
  --ink-3: #4f6a8f;
  --ink-4: #8aa0bd;
  --rule: #c6d4e6;
  --rule-soft: #dde6f2;

  --accent: #1e5fd6;
  --accent-ink: #153f99;
  --accent-wash: #d8e5fb;
  --sage: #2b6cb0;
  --sage-wash: #d3e2f2;
  --cream: #e8f0fb;

  --radius: 16px;

  --font-display: "OPPO Sans 4.0", "Noto Sans SC", "Source Han Sans SC", "Source Han Sans CN", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  --font-body: "OPPO Sans 4.0", "Noto Sans SC", "Source Han Sans SC", "Source Han Sans CN", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  --font-score: "Noto Serif SC", "Source Han Serif SC", "Source Han Serif CN", "Songti SC", "STSong", "SimSun", serif;
  --font-label: "JetBrains Mono", "SFMono-Regular", "Cascadia Mono", Menlo, Consolas, "Noto Sans SC", "Source Han Sans SC", ui-monospace, monospace;
  --serif: var(--font-display);
  --sans: var(--font-body);
  --mono: var(--font-label);

  --gutter: clamp(16px, 2vw, 32px);
  --page-max: 1440px;
  --nav-height: 65px;
  --flow-axis-top: 88px;
  --flow-axis-width: 213px;
  --flow-axis-gap: 12px;
  --flow-axis-slot: 0px;
  --space-xs: 6px;
  --space-sm: 10px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;

  --motion-fast: 120ms;
  --motion-standard: 180ms;
  --motion-state: 260ms;
  --motion-enter: 560ms;
  --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
  --ease-out-quint: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);

  /* Typography roles */
  --text-micro: 0.625rem;
  --text-tiny: 0.6875rem;
  --text-caption: 0.75rem;
  --text-meta: 0.8125rem;
  --text-ui: 0.875rem;
  --text-body: 1rem;
  --text-lead: 1.0625rem;
  --text-subtitle: 1.125rem;
  --text-title: 1.5rem;
  --text-card-title: 1.375rem;
  --text-headline: clamp(2rem, 2.7vw, 2.5rem);
  --text-section: clamp(2.25rem, 3.6vw, 3.25rem);
  --text-section-tight: clamp(2.25rem, 3.2vw, 3rem);
  --text-section-mobile: clamp(1.875rem, 8vw, 2.25rem);
  --text-hero-card: clamp(1.5rem, 2.8vw, 2.25rem);
  --text-hero-mobile: clamp(1.1875rem, 5.2vw, 1.375rem);
  --text-hero-primary: clamp(2.75rem, 3.6vw, 3.25rem);
  --text-hero-secondary: clamp(1.75rem, 2.4vw, 2rem);
  --text-score: clamp(2.25rem, 3vw, 2.5rem);
  --text-meta-xs: var(--text-caption);
  --text-meta-sm: var(--text-meta);
  --text-meta-md: var(--text-ui);
  --text-meta-lg: 0.9375rem;
  --text-section-num: 0.9375rem;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 100%;
  line-height: 1.55;
  scroll-behavior: smooth;
  font-kerning: normal;
  font-optical-sizing: auto;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: clip;
}

img { max-width: 100%; display: block; }
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
a { color: inherit; text-decoration: none; }
button:focus-visible,
a:focus-visible,
select:focus-visible,
input:focus-visible {
  outline: 3px solid color-mix(in srgb, var(--accent) 68%, white);
  outline-offset: 3px;
}

.page {
  max-width: var(--page-max);
  margin: 0 auto;
  padding: 0 var(--gutter);
  width: 100%;
  min-width: 0;
}

body {
  background-image: none;
}

/* Nav */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0;
  border-bottom: 1px solid var(--rule);
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  width: 100%;
  background: var(--paper);
  z-index: 1000;
}
.nav-spacer {
  height: var(--nav-height);
}
.nav__brand {
  display: inline-flex;
  align-items: center;
  flex: 0 0 auto;
  gap: 12px;
  min-width: 0;
}
.nav__brand-logo {
  display: block;
  object-fit: contain;
  flex: 0 0 auto;
}
.nav__brand-logo--txx {
  width: 89px;
  height: 34px;
  margin-right: 10px;
}
.nav__brand-divider {
  width: 1px;
  height: 24px;
  flex: 0 0 auto;
  border-radius: 9999px;
  background: #c6d4e6;
}
.nav__brand-logo--bc {
  height: 34px;
  width: auto;
}
.nav__links {
  display: flex;
  gap: 28px;
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 500;
  line-height: 20px;
  letter-spacing: 0;
  color: #1e3a63;
}
.nav__links a:hover { color: var(--accent); }
.nav__cta {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex: 0 0 auto;
  gap: 0;
  padding: 9px 16px;
  min-height: 38px;
  background: #0b1f3a;
  color: #f4f7fb;
  font-family: "Noto Sans SC", "Source Han Sans SC", "Source Han Sans CN", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 14px;
  font-weight: 500;
  line-height: 20px;
  letter-spacing: 0;
  white-space: nowrap;
  border-radius: 16px;
  box-shadow: none;
  transition: background 160ms ease, color 160ms ease;
}
.nav__cta:hover { background: #0b1f3a; color: #f4f7fb; }
.nav__end {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  flex: 0 0 auto;
}

/* Left flow axis — page journey tracker (desktop) */
#hero, #pain, #paths, #proof,
[id^="path-"] {
  scroll-margin-top: calc(var(--nav-height) + 24px);
}
.flow-axis {
  position: fixed;
  left: 32px;
  top: var(--flow-axis-top);
  z-index: 40;
  display: none;
  flex-direction: column;
  align-items: flex-start;
  gap: 10px;
  font-family: var(--sans);
  pointer-events: none;
  width: var(--flow-axis-width);
}
.flow-axis__inner {
  pointer-events: auto;
  display: flex;
  align-items: stretch;
  gap: 14px;
  padding: 18px;
  border-radius: 16px;
  background: #f8fbff;
  border: 0;
  box-shadow: inset 0 0 0 1px var(--rule), 0 4px 8px rgba(18, 49, 89, 0.08);
  max-width: none;
}
.flow-axis__track {
  position: relative;
  display: grid;
  grid-template-columns: 18px 145px;
  column-gap: 14px;
}
.flow-axis__rail {
  position: absolute;
  left: 6px;
  top: 11px;
  width: 4px;
  height: 337px;
  background: #e3edf9;
  border-radius: 999px;
  pointer-events: none;
}
.flow-axis__progress {
  position: absolute;
  left: 6px;
  top: 11px;
  width: 4px;
  background: var(--accent);
  border-radius: 999px;
  transition: height 0.35s ease;
  max-height: 337px;
  pointer-events: none;
}
.flow-axis__line {
  position: relative;
  grid-column: 1;
  grid-row: 1 / span 5;
  width: 18px;
  min-height: 348px;
}
.flow-axis__items {
  grid-column: 2;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 24px;
  width: 145px;
}
.flow-axis__step {
  position: relative;
  display: flex;
  align-items: center;
  padding: 0;
  text-align: left;
  border: none;
  background: none;
  cursor: pointer;
  border-radius: 6px;
  transition: color 160ms ease;
  min-width: 0;
}
.flow-axis__step:hover {
  color: var(--accent);
}
.flow-axis__dot {
  position: absolute;
  left: -32px;
  top: 0;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 4px solid #e3edf9;
  background: #fff;
  transition: background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  z-index: 1;
}
.flow-axis__step.is-active .flow-axis__dot,
.flow-axis__step.is-active-parent .flow-axis__dot {
  width: 16px;
  height: 16px;
  border-color: var(--accent);
  background: var(--accent);
  box-shadow: 0 0 0 4px #f0f6ff;
}
.flow-axis__step.is-done .flow-axis__dot {
  border-color: var(--accent);
  background: var(--accent);
}
.flow-axis__label {
  font-size: var(--text-body);
  font-weight: 500;
  color: var(--ink-3);
  line-height: 1.2;
  transition: color 0.2s ease;
}
.flow-axis__step.is-active .flow-axis__label,
.flow-axis__step.is-active-parent .flow-axis__label {
  color: var(--ink);
}
.flow-axis__subs {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin: 0;
  padding: 0;
}
.flow-axis__sub-step {
  display: flex;
  align-items: flex-start;
  gap: 0;
  padding: 0;
  text-align: left;
  border: none;
  background: none;
  cursor: pointer;
  border-radius: 4px;
  width: 100%;
  transition: color 160ms ease;
}
.flow-axis__sub-step:hover { color: var(--accent); }
.flow-axis__sub-dot {
  display: none;
}
.flow-axis__sub-step.is-active .flow-axis__sub-dot {
  background: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-wash);
}
.flow-axis__sub-step.is-done .flow-axis__sub-dot {
  background: var(--accent);
}
.flow-axis__sub-label {
  font-size: var(--text-ui);
  font-weight: 400;
  color: var(--ink-3);
  line-height: 1.15;
  transition: color 0.2s ease;
}
.flow-axis__sub-step.is-active .flow-axis__sub-label {
  color: var(--ink);
  font-weight: 400;
}
.flow-axis__sub-step.is-done .flow-axis__sub-label {
  color: var(--ink-3);
}
@media (min-width: 1820px) {
  :root {
    --flow-axis-slot: calc(var(--flow-axis-width) + var(--flow-axis-gap));
  }
  .flow-axis {
    display: flex;
  }
}
@media (max-width: 1819px) {
  .flow-axis { display: none !important; }
}

/* Site footer — aligned with igopx.cn main site */
.site-footer {
  position: relative;
  width: 100%;
  margin-top: 0;
}
.site-footer__bar {
  position: relative;
  width: 100%;
  aspect-ratio: 1440 / 167.41;
  min-height: 167px;
  background-image: url("./assets/homepage-footer-contact.png");
  background-size: 100% 100%;
  background-repeat: no-repeat;
  background-position: center bottom;
}
.site-footer__links {
  position: absolute;
  left: clamp(16px, 5.5vw, 88px);
  top: clamp(14px, 2.6vw, 36px);
  display: flex;
  flex-direction: column;
  gap: clamp(4px, 0.5vw, 8px);
  z-index: 1;
  opacity: 0;
}
.site-footer__link-item {
  color: #fff;
  font-size: clamp(var(--text-tiny), 0.95vw, var(--text-ui));
  line-height: 1.45;
}
.site-footer__name {
  font-size: clamp(var(--text-caption), 1.05vw, var(--text-meta-lg));
  font-weight: 800;
}
.site-footer__label {
  opacity: 0.92;
}
.site-footer__link-item a {
  color: #fff;
  text-decoration: none;
}
.site-footer__link-item a:hover {
  color: #2d91ff;
}
@media (max-width: 767px) {
  .site-footer__bar {
    aspect-ratio: auto;
    min-height: 200px;
    background-size: cover;
    background-position: center;
  }
  .site-footer__links {
    max-width: 52%;
  }
}

/* Eyebrow */
.eyebrow {
  font-family: var(--mono);
  font-size: var(--text-meta-md);
  letter-spacing: 0.04em;
  color: var(--ink-3);
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.eyebrow::before {
  content: "";
  width: 18px; height: 1px;
  background: var(--accent);
  display: inline-block;
}
.eyebrow--plain::before { display: none; }

/* Section */
.section {
  padding: clamp(64px, 7vw, 96px) 0;
  border-top: 1px solid var(--rule);
  position: relative;
}
.section__head {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 48px;
  margin-bottom: 48px;
  align-items: end;
}
.section__head--stack {
  display: flex;
  flex-direction: column;
  gap: 0;
  align-items: flex-start;
  max-width: 720px;
}
.section__head--center {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  margin-bottom: 48px;
  gap: 0;
}
.section__label {
  font-family: var(--serif);
  font-size: var(--text-section);
  font-weight: 600;
  letter-spacing: 0;
  line-height: 1.08;
  color: var(--ink);
  text-wrap: balance;
  overflow-wrap: anywhere;
  margin-bottom: 14px;
}
.section__head--center .section__label {
  margin-bottom: 16px;
}
.section-title-stack {
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.section-title-stack .section__label,
.section-title-stack .section__title {
  margin: 0;
}
.section__num {
  font-family: var(--mono);
  font-size: var(--text-section-num);
  color: var(--ink-2);
  letter-spacing: 0.1em;
  font-weight: 500;
}
.section__title {
  font-family: var(--serif);
  font-size: var(--text-section);
  line-height: 1.08;
  letter-spacing: 0;
  font-weight: 600;
  text-wrap: balance;
  overflow-wrap: anywhere;
}
.section__head--stack .section__title,
.section__head--center .section__title {
  font-size: var(--text-section);
  font-weight: 600;
  color: var(--ink);
}
.section__title em {
  font-style: italic;
  color: var(--accent);
  font-weight: 500;
}
.section__sub {
  color: var(--ink-2);
  font-size: var(--text-lead);
  line-height: 1.7;
  max-width: 62ch;
  text-wrap: pretty;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px 22px;
  min-height: 44px;
  font-size: var(--text-ui);
  font-weight: 500;
  border-radius: 16px;
  transition: background 180ms ease, border-color 180ms ease, color 180ms ease, transform 180ms ease;
  line-height: 1;
}
.btn--primary {
  background: var(--accent);
  color: var(--paper);
}
.btn--primary:hover { background: var(--accent-ink); transform: translateY(-1px); }
.btn--ink {
  background: var(--ink);
  color: var(--paper);
}
.btn--ink:hover { background: var(--accent); }
.btn--ghost {
  background: transparent;
  color: var(--ink);
  border: 1px solid var(--rule);
}
.btn--ghost:hover { border-color: var(--ink); }

.path-back-select {
  width: 144px;
  justify-content: center;
  gap: 4px;
  font-size: var(--text-ui);
  font-weight: 500;
  padding: 14px 22px;
  white-space: nowrap;
}
.btn__arrow { transition: transform 180ms ease; }
.btn:hover .btn__arrow { transform: translateX(3px); }
.btn__arrow-up {
  flex-shrink: 0;
}
.path-back-select__text {
  display: inline;
}

.rule { height: 1px; background: var(--rule); }
.rule--dotted {
  height: 1px;
  background-image: linear-gradient(to right, var(--ink-4) 0, var(--ink-4) 4px, transparent 4px);
  background-size: 8px 1px;
  background-repeat: repeat-x;
}

/* Pain mode A/B toggle */
.pain-mode-block {
  display: flex;
  flex-direction: column;
  gap: 24px;
  margin-bottom: 32px;
}
.pain-mode {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: var(--space-lg);
  flex-wrap: nowrap;
  width: 100%;
}
.pain-mode__tabs {
  display: flex;
  flex-wrap: nowrap;
  gap: 12px;
  align-items: stretch;
  flex-shrink: 0;
}
.pain-mode__btn {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 24px;
  min-height: 44px;
  font-family: var(--sans);
  font-size: var(--text-ui);
  letter-spacing: 0;
  border-radius: 12px;
  transition: background 180ms ease, border-color 180ms ease, color 180ms ease;
  line-height: 1.35;
  white-space: nowrap;
  font-weight: 500;
}
.pain-mode__btn.is-selected {
  background: var(--accent);
  color: #fff;
  border: 1px solid var(--accent);
  box-shadow: none;
}
.pain-mode__btn.is-unselected {
  background: transparent;
  color: var(--accent);
  border: 1px solid var(--accent);
}
.pain-mode__btn.is-unselected:hover {
  background: var(--accent-wash);
  color: var(--accent);
}
.pain-mode__badge {
  position: absolute;
  top: -12px;
  left: 85px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: var(--text-caption);
  line-height: 1.5;
  letter-spacing: 0.1em;
  padding: 2px 8px;
  border-radius: 999px;
  background: var(--accent);
  color: #fff;
  font-weight: 500;
  white-space: nowrap;
  border: 0.5px solid #fff;
}
.pain-mode__btn.is-selected .pain-mode__badge {
  display: none;
}
.pain-mode__hint {
  display: flex;
  align-items: center;
  min-height: 44px;
  margin: 0;
  color: var(--ink-2);
  font-size: var(--text-ui);
  line-height: 1.55;
  text-wrap: pretty;
}
.pain-mode__hint strong { font-weight: 600; color: var(--accent-ink); }
.pain-mode__line {
  width: 100%;
  height: 1px;
  background: var(--rule);
}

/* Pain point cards — route match */
.pain-card {
  text-align: left;
  padding: 28px 26px 32px;
  transition: background 220ms ease, color 220ms ease, box-shadow 220ms ease;
  position: relative;
  min-height: 212px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 16px;
  border-radius: 0;
  border: none;
  color: #0b1f3a;
  cursor: pointer;
}

#pain.section {
  border-top: none;
  border-bottom: 1px solid var(--rule);
}
#pain .section__head--stack {
  align-items: center;
  text-align: center;
  max-width: none;
  gap: 24px;
  margin-bottom: 32px;
}
#pain .section__head--stack .section__sub {
  margin-top: 0 !important;
  max-width: 720px;
}
.pain-head__title {
  margin: 0;
  text-align: center;
}
.pain-head__sub {
  font-size: var(--text-subtitle);
  line-height: 1.65;
  color: var(--ink-2);
}
.pain-head__emph {
  color: var(--accent);
  font-weight: 700;
}
@media (max-width: 767px) {
  .pain-head__sub {
    font-size: var(--text-body);
    line-height: 1.6;
  }
}
.pain-card--selected {
  background: #1e5fd6;
  color: #fff;
  box-shadow: none;
}
.pain-card__head {
  display: flex;
  align-items: center;
  margin-bottom: 16px;
  font-family: var(--sans);
  font-size: var(--text-caption);
  font-weight: 400;
  line-height: 1.35;
  letter-spacing: 0;
  color: #4f6a8f;
  transition: color 220ms ease;
}
.pain-card--selected .pain-card__head {
  color: #fff;
}
.pain-card--selected .pain-card__title {
  color: #fff;
}
.pain-card__foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  width: 100%;
}
.pain-card__match {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1 1 auto;
  min-width: 0;
}
.pain-card__foot .btn.pain-card__goto {
  flex: 0 0 auto;
  align-self: center;
  gap: 6px;
  padding: 0 20px;
  min-height: 40px;
  height: auto;
  border-radius: 9999px;
  font-family: var(--sans);
  font-size: var(--text-caption);
  font-weight: 400;
  line-height: 1.35;
  white-space: nowrap;
}
.pain-card--selected .pain-card__goto:hover {
  background: #fff;
  color: var(--ink);
}
.pain-card__route {
  font-family: var(--sans);

.wechat-consult-modal__scan {

  font-family: var(--mono);
  font-size: var(--text-caption);
  letter-spacing: 0.08em;
  color: var(--ink-3);
}

/* Proof grid */
.proof-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  align-items: start;
  min-height: 338px;
  border: 1px solid var(--rule);
  border-radius: 16px;
  overflow: hidden;
}
#proof.section {
  border-top: none;
}
.proof-intro-head {
  gap: 18px;
}
.proof-intro-head .proof-head-anchor.proto-anchor--block {
  width: 100%;
  justify-content: center;
}
.proof-intro-head .proof-head__title {
  max-width: none !important;
  margin: 0;
  font-weight: 600;
  letter-spacing: 0;
  text-align: center;
  white-space: normal;
}
.proof-head__title {
  font-size: 3rem;
  line-height: 1.12;
}
.proof-head__sub {
  width: min(720px, 100%);
  max-width: 720px !important;
  margin: 0 !important;
  font-size: var(--text-subtitle);
  line-height: 1.65;
  color: var(--ink-2);
  text-align: center !important;
}
.proof-card {
  padding: 31px 28px;
  border-right: 1px solid var(--rule);
  display: flex;
  flex-direction: column;
  gap: 20px;
  min-height: 366px;
}
.proof-card:last-child { border-right: none; }
.proof-scores {
  display: flex;
  align-items: flex-end;
  gap: 12px;
  font-family: var(--font-score);
  flex-wrap: wrap;
}
.proof-scores__cycle {
  margin-left: auto;
  align-self: center;
  font-family: var(--sans);
  font-size: var(--text-micro);
  color: var(--ink-2);
  white-space: nowrap;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 0;
  letter-spacing: 0.1em;
  line-height: 1.55;
}
.proof-scores__cycle strong {
  font-family: var(--font-score);
  font-size: 1.75rem;
  line-height: 1.2;
  font-weight: 600;
  letter-spacing: 0;
  color: var(--ink);
}
.proof-card-v2 {
  display: flex;
  flex-direction: column;
  gap: 20px;
  position: relative;
  min-height: 338px;
  padding: 31px 28px;
  font-family: var(--sans);
}
.proof-card-v2::after {
  content: "";
  position: absolute;
  top: 0;
  right: 0;
  bottom: 0;
  width: 1px;
  background: var(--rule);
}
.proof-card-v2:last-child::after { display: none; }
.proof-card-v2 .v2-score-strip {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 24px;
  color: var(--ink-3);
  font-feature-settings: "tnum" 1;
}
.proof-card-v2 .v2-score-strip > div {
  min-width: 58px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.proof-card-v2 .v2-score-strip > div:nth-child(2) {
  min-width: 61px;
}
.proof-card-v2 .v2-score-strip > div:nth-child(3) {
  min-width: 64px;
}
.proof-card-v2 .v2-kicker {
  font-family: var(--sans);
  font-size: 13px;
  line-height: 20px;
  font-weight: 400;
  letter-spacing: 0;
  color: var(--ink-3);
  white-space: nowrap;
}
.proof-card-v2 .v2-kicker--accent {
  color: var(--accent);
}
.proof-card-v2 .v2-before,
.proof-card-v2 .v2-after,
.proof-card-v2 .v2-weeks {
  font-family: var(--font-score);
  font-size: var(--text-score);
  line-height: 1.12;
  letter-spacing: 0;
  text-align: center;
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum" 1;
}
.proof-card-v2 .v2-before {
  color: var(--ink-4);
  text-decoration: line-through;
  text-decoration-color: currentColor;
  font-weight: 400;
}
.proof-card-v2 .v2-after {
  color: var(--ink);
  font-weight: 700;
}
.proof-card-v2 .v2-weeks {
  display: inline-flex;
  align-items: baseline;
  color: var(--ink-4);
  font-weight: 400;
}
.proof-card-v2 .v2-weeks__unit {
  font-family: var(--sans);
  font-size: 0.68em;
  font-weight: 400;
  margin-left: 1px;
}
.proof-card-v2 .v2-divider {
  height: 1px;
  flex: 0 0 1px;
  background: var(--rule-soft);
}
.proof-card-v2 .v2-quote {
  display: flex;
  align-items: center;
  min-height: 82px;
  margin: 0;
  color: var(--ink-2);
  font-family: var(--sans);
  font-size: 18px;
  line-height: 26px;
  font-weight: 400;
  letter-spacing: 0;
  text-wrap: pretty;
}
.proof-card-v2 .v2-person {
  display: flex;
  align-items: center;
  gap: 12px;
  padding-top: 22px;
  border-top: 1px dashed var(--rule);
}
.proof-card-v2 .v2-person__info {
  flex: 1;
  min-width: 0;
}
.proof-card-v2 .v2-path-btn {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  max-width: 46%;
  padding: 8px 14px 8px 10px;
  border: 1.5px solid var(--accent);
  border-radius: 999px;
  background: var(--accent-wash);
  color: var(--accent-ink);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.35;
  font-weight: 600;
  text-align: center;
  text-decoration: none;
  white-space: nowrap;
  box-shadow: 0 2px 10px rgba(30, 95, 214, 0.16);
  transition: background 180ms ease, border-color 180ms ease, color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
}
.proof-card-v2 .v2-path-btn__icon {
  display: inline-flex;
  flex-shrink: 0;
  color: #1fc16b;
}
.proof-card-v2 .v2-path-btn:hover {
  border-color: var(--accent-ink);
  background: var(--accent);
  color: var(--paper);
  box-shadow: 0 4px 14px rgba(30, 95, 214, 0.28);
  transform: translateY(-1px);
}
.proof-card-v2 .v2-path-btn:hover .v2-path-btn__icon {
  color: #4ade80;
}
.proof-card-v2 .v2-person img {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  object-fit: cover;
}
.proof-card-v2 .v2-name {
  color: var(--ink);
  font-size: 13.8px;
  line-height: 21.7px;
  font-weight: 600;
}
.proof-card-v2 .v2-role {
  color: var(--ink-3);
  font-size: 10px;
  line-height: 16px;
  font-weight: 400;
  letter-spacing: 0;
}
@media (max-width: 1023px) {
  .proof-head__title {
    font-size: var(--text-section);
    line-height: 1.08;
  }
  .proof-head__sub {
    font-size: var(--text-body);
    line-height: 1.6;
  }
  .proof-grid { grid-template-columns: repeat(2, 1fr); }
  .proof-card:nth-child(2) { border-right: none; }
  .proof-card:nth-child(3) {
    grid-column: 1 / -1;
    border-right: none;
    border-top: 1px solid var(--rule);
  }
  .proof-card-v2:nth-child(2) { border-right: none; }
  .proof-card-v2:nth-child(3) {
    grid-column: 1 / -1;
    border-right: none;
    border-top: 1px solid var(--rule);
  }
}
@media (max-width: 767px) {
  .proof-head__title {
    width: 100%;
    max-width: 100%;
    font-size: var(--text-section-mobile);
    line-height: 1.12;
  }
  .proof-grid { grid-template-columns: 1fr; min-height: auto; border-radius: 12px; }
  .proof-card {
    border-right: none;
    border-bottom: 1px solid var(--rule);
    min-height: auto;
    padding: 24px 20px;
  }
  .proof-card:last-child { border-bottom: none; }
  .proof-card:nth-child(3) { grid-column: auto; border-top: none; }
  .proof-card-v2 {
    min-height: auto;
    border-bottom: 1px solid var(--rule);
    padding: 24px 20px;
  }
  .proof-card-v2::after { display: none; }
  .proof-card-v2:last-child { border-bottom: none; }
  .proof-card-v2:nth-child(3) { grid-column: auto; border-top: none; }
  .proof-scores__cycle { margin-left: 0; width: 100%; }
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    scroll-behavior: auto !important;
    transition-duration: 0.001ms !important;
  }
}


@media (max-width: 767px) {
  .auth-modal-backdrop { padding: 12px; align-items: flex-end; }
  .auth-modal {
    border-bottom-left-radius: 0;
    border-bottom-right-radius: 0;
    max-height: 92vh;
  }
  .auth-modal__actions { grid-template-columns: 1fr; }
}

/* ── Prototype drip annotations (dev handoff only) ── */
.proto-wrap { position: relative; }
.proto-anchor {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  position: relative;
  vertical-align: middle;
  max-width: 100%;
}
.proto-anchor--block { display: flex; width: 100%; max-width: 100%; }
.proto-anchor--start { flex-direction: row-reverse; }
.proto-anchor--end { flex-direction: row; }
.proto-anchor--top { flex-direction: column-reverse; align-items: flex-start; }
.proto-anchor--bottom { flex-direction: column; align-items: flex-start; }
.proto-anchor__drips {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}
.proto-anchor__drips--row { flex-direction: row; gap: 6px; flex-wrap: wrap; }
.proto-drip--inline,
.proto-anchor .proto-drip {
  position: relative;
  top: auto;
  right: auto;
  bottom: auto;
  left: auto;
  flex-shrink: 0;
}
.proto-drip {
  position: absolute;
  z-index: 40;
  width: 26px;
  height: 26px;
  padding: 0;
  border: 2px solid #fff;
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  box-shadow: 0 2px 10px rgba(11, 31, 58, 0.22);
  cursor: pointer;
  transition: transform 160ms ease, box-shadow 160ms ease;
}
.proto-drip:hover { transform: rotate(-45deg) scale(1.08); box-shadow: 0 4px 16px rgba(11, 31, 58, 0.28); }
.proto-drip__icon {
  display: block;
  transform: rotate(45deg);
  font-size: var(--text-caption);
  line-height: 1.85;
  text-align: center;
  font-weight: 700;
  color: #fff;
  user-select: none;
}
.proto-drip--note { background: linear-gradient(135deg, #3b82f6, #1e5fd6); }
.proto-drip--todo { background: linear-gradient(135deg, #f59e0b, #c9580c); }
.proto-drip--tl { top: 10px; left: 10px; }
.proto-drip--tr { top: 10px; right: 10px; }
.proto-drip--bl { bottom: 10px; left: 10px; }
.proto-drip--br { bottom: 10px; right: 10px; }

.proto-toolbar {
  position: fixed;
  left: 0;
  top: 38vh;
  transform: translateY(-50%);
  z-index: 2000;
  display: flex;
  flex-direction: row;
  align-items: stretch;
  font-family: var(--sans);
  filter: drop-shadow(0 8px 28px rgba(11, 31, 58, 0.12));
}
.proto-toolbar__tab {
  flex-shrink: 0;
  width: 34px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 12px 0;
  background: rgba(244, 247, 251, 0.96);
  border: 1px solid var(--rule);
  border-left: none;
  border-radius: 0 12px 12px 0;
  backdrop-filter: blur(8px);
  color: var(--ink-3);
  cursor: pointer;
  transition: background 140ms ease, color 140ms ease;
}
.proto-toolbar__tab:hover { background: var(--paper-2); color: var(--ink); }
.proto-toolbar__tab-icon {
  font-size: var(--text-ui);
  line-height: 1;
  font-weight: 600;
}
.proto-toolbar__tab-text {
  writing-mode: vertical-rl;
  font-family: var(--mono);
  font-size: var(--text-meta-xs);
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.proto-toolbar__panel {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 10px;
  min-width: 132px;
  background: rgba(244, 247, 251, 0.96);
  border: 1px solid var(--rule);
  border-left: none;
  border-radius: 0 14px 14px 0;
  backdrop-filter: blur(8px);
  overflow: hidden;
  transition: min-width 0.28s ease, width 0.28s ease, opacity 0.22s ease, padding 0.28s ease;
}
.proto-toolbar.is-collapsed .proto-toolbar__panel {
  min-width: 0;
  width: 0;
  padding-left: 0;
  padding-right: 0;
  opacity: 0;
  pointer-events: none;
  border-color: transparent;
}
.proto-toolbar.is-expanded .proto-toolbar__tab {
  border-radius: 0;
  border-right: none;
}
.proto-toolbar__label {
  font-family: var(--mono);
  font-size: var(--text-micro);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
  padding: 0 2px 4px;
  border-bottom: 1px solid var(--rule-soft);
  margin-bottom: 2px;
}
.proto-toolbar__btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 10px;
  font-size: var(--text-caption);
  font-weight: 500;
  border: 1px solid var(--rule);
  background: var(--paper);
  color: var(--ink-2);
  transition: background 140ms var(--ease-out-quart), border-color 140ms var(--ease-out-quart), color 140ms var(--ease-out-quart), transform 140ms var(--ease-out-quart);
  text-align: left;
}
.proto-toolbar__btn:hover { border-color: var(--ink-3); }
.proto-toolbar__btn.is-on { color: var(--ink); font-weight: 600; }
.proto-toolbar__btn.is-on--note { background: var(--accent-wash); border-color: var(--accent); }
.proto-toolbar__btn.is-on--todo { background: #fef3e2; border-color: #c9580c; }
.proto-toolbar__dot {
  width: 10px; height: 10px;
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  flex-shrink: 0;
}
.proto-toolbar__dot--note { background: #1e5fd6; }
.proto-toolbar__dot--todo { background: #c9580c; }

.proto-modal-backdrop {
  position: fixed;
  inset: 0;
  z-index: 3000;
  background: rgba(11, 31, 58, 0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.proto-modal {
  width: min(480px, 100%);
  max-height: min(80vh, 640px);
  overflow: auto;
  background: var(--paper);
  border-radius: 16px;
  border: 1px solid var(--rule);
  box-shadow: 0 24px 60px rgba(11, 31, 58, 0.2);
}
.proto-modal__head {
  padding: 18px 20px;
  border-bottom: 1px solid var(--rule);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.proto-modal__kind {
  font-family: var(--mono);
  font-size: var(--text-meta-sm);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.proto-modal__kind--note { color: var(--accent); }
.proto-modal__kind--todo { color: #c9580c; }
.proto-modal__title { font-family: var(--serif); font-size: 1.25rem; font-weight: 600; line-height: 1.25; }
.proto-modal__close {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--paper-2);
  color: var(--ink-3);
  font-size: var(--text-subtitle);
  line-height: 1;
  flex-shrink: 0;
}
.proto-modal__body { padding: 18px 20px; display: flex; flex-direction: column; gap: 16px; }
.proto-modal__text { font-size: var(--text-ui); color: var(--ink-2); line-height: 1.6; white-space: pre-wrap; }
.proto-modal__section-title {
  font-family: var(--mono);
  font-size: var(--text-meta-sm);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 8px;
}
.proto-modal__tags { display: flex; flex-wrap: wrap; gap: 6px; }
.proto-modal__tag {
  font-family: var(--mono);
  font-size: var(--text-meta-sm);
  padding: 4px 10px;
  border-radius: 8px;
  background: var(--paper-2);
  color: var(--ink-2);
  border: 1px solid var(--rule-soft);
}
.proto-modal__links { display: flex; flex-direction: column; gap: 6px; }
.proto-modal__link {
  font-size: var(--text-meta);
  color: var(--accent);
  text-decoration: underline;
  text-underline-offset: 3px;
}
.proto-modal__meta { font-size: var(--text-caption); color: var(--ink-3); line-height: 1.5; }

/* Auth / SVIP modals (product UI — formal build reuses main site components) */
.auth-modal-backdrop {
  position: fixed;
  inset: 0;
  z-index: 3100;
  background: rgba(11, 31, 58, 0.42);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.auth-modal {
  width: min(440px, 100%);
  max-height: min(88vh, 720px);
  overflow: auto;
  background: var(--paper);
  border-radius: 16px;
  border: 1px solid var(--rule);
  box-shadow: 0 24px 60px rgba(11, 31, 58, 0.22);
}
.auth-modal__head {
  padding: 20px 22px 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.auth-modal__title {
  font-family: var(--serif);
  font-size: var(--text-card-title);
  font-weight: 600;
  line-height: 1.2;
}
.auth-modal__close {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--paper-2);
  color: var(--ink-3);
  font-size: var(--text-subtitle);
  line-height: 1;
  flex-shrink: 0;
}
.auth-modal__close:hover { background: var(--rule-soft); color: var(--ink); }
.auth-modal__body { padding: 18px 22px 22px; display: flex; flex-direction: column; gap: 18px; }
.auth-modal__promo {
  padding: 16px 18px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--accent-wash) 0%, #eef4ff 100%);
  border: 1px solid rgba(30, 95, 214, 0.22);
  font-size: var(--text-meta-lg);
  line-height: 1.55;
  color: var(--ink);
  font-weight: 500;
  text-align: center;
}
.auth-modal__promo strong { color: var(--accent-ink); font-weight: 800; }
.auth-modal__svip-link {
  display: inline;
  padding: 0;
  border: none;
  background: none;
  color: var(--accent);
  font-weight: 800;
  font-size: inherit;
  font-family: inherit;
  text-decoration: underline;
  text-underline-offset: 3px;
  cursor: pointer;
}
.auth-modal__svip-link:hover { color: var(--accent-ink); }
.auth-modal__promo-wrap {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.auth-modal__bubble {
  position: relative;
  padding: 12px 14px 12px 16px;
  border-radius: 12px;
  background: var(--paper-2);
  border: 1px dashed rgba(30, 95, 214, 0.35);
  font-size: var(--text-caption);
  line-height: 1.55;
  color: var(--ink-2);
}
.auth-modal__bubble::before {
  content: "";
  position: absolute;
  top: -7px;
  left: 28px;
  width: 12px;
  height: 12px;
  background: var(--paper-2);
  border-left: 1px dashed rgba(30, 95, 214, 0.35);
  border-top: 1px dashed rgba(30, 95, 214, 0.35);
  transform: rotate(45deg);
}
.auth-modal__bubble-title {
  font-family: var(--mono);
  font-size: var(--text-meta-sm);
  letter-spacing: 0.06em;
  color: var(--accent-ink);
  font-weight: 600;
  margin-bottom: 6px;
}
.auth-modal__bubble ul {
  margin: 0;
  padding-left: 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.auth-modal__bubble strong { color: var(--ink); font-weight: 600; }
.auth-modal__actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.auth-modal__hint {
  font-size: var(--text-caption);
  color: var(--ink-3);
  text-align: center;
  line-height: 1.5;
}
.auth-toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 3200;
  max-width: min(520px, calc(100vw - 32px));
  padding: 12px 18px;
  background: var(--ink);
  color: var(--paper);
  border-radius: 12px;
  font-size: var(--text-ui);
  line-height: 1.45;
  box-shadow: 0 12px 40px rgba(11, 31, 58, 0.28);
  animation: toast-in 280ms var(--ease-out-quint) both;
}
.svip-modal__figure {
  margin: 0;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--rule-soft);
  background: var(--paper-2);
}
.svip-modal__image {
  display: block;
  width: 100%;
  max-width: 100%;
  height: auto;
  border-radius: 12px;
}

.plan-modal-backdrop {
  background: rgba(51, 51, 51, 0.24);
}
.plan-modal-backdrop--status {
  align-items: flex-start;
  justify-content: center;
  padding-top: 342px;
}
/* Path 02 · AI 学习方案弹窗 */
.plan-modal {
  width: min(440px, 100%);
  background: #fff;
  border: none;
  border-radius: 20px;

/* Motion layer — click feedback, state transitions, and one hero entrance */
button,
a[href],
.plan-upload-slot {
  -webkit-tap-highlight-color: transparent;
}

:where(button, a[href], .plan-upload-slot):focus-visible {
  transition: outline-color var(--motion-fast) var(--ease-out-quart), outline-offset var(--motion-fast) var(--ease-out-quart);
}

.motion-ripple-host,
[data-motion-ripple-host="true"] {
  --ripple-color: color-mix(in srgb, var(--accent) 24%, transparent);
  --ripple-duration: 820ms;
  --ease-ripple: cubic-bezier(0.16, 0, 0.16, 1);
  position: relative;
  isolation: isolate;
}

.motion-ripple-layer {
  position: absolute;
  inset: 0;
  z-index: 12;
  border-radius: inherit;
  pointer-events: none;
  overflow: hidden;
  contain: layout paint style;
}

.motion-ripple-layer > .motion-ripple {
  position: absolute;
  left: var(--ripple-x, 50%);
  top: var(--ripple-y, 50%);
  width: var(--ripple-size, 120px);
  height: var(--ripple-size, 120px);
  border-radius: 999px;
  pointer-events: none;
  background: var(--ripple-color);
  opacity: 0;
  transform: translate(-50%, -50%) scale(0);
  animation: material-ripple var(--ripple-duration) var(--ease-ripple) both;
  will-change: transform, opacity;
}

.btn--ink,
.btn--primary,
.nav__cta,
.pain-mode__btn.is-selected,
.pain-card--selected,
.hero-player__play,
.plan-modal .btn--ink {
  --ripple-color: rgba(255, 255, 255, 0.34);
}

.hero-player__play.motion-ripple-host,
.hero-player__play[data-motion-ripple-host="true"] {
  position: absolute;
}

button.is-pressing:not(.hero-player__play):not(.proto-drip),
button[data-motion-pressing="true"]:not(.hero-player__play):not(.proto-drip),
a.is-pressing,
a[data-motion-pressing="true"],
.plan-upload-slot.is-pressing,
.plan-upload-slot[data-motion-pressing="true"] {
  transform: none;
}

.hero-player__play.is-pressing,
.hero-player__play[data-motion-pressing="true"] {
  transform: translate(-50%, -50%) scale(0.94);
}

.proto-drip.is-pressing,
.proto-drip[data-motion-pressing="true"] {
  transform: rotate(-45deg) scale(0.94);
}

.btn,
.nav__cta,
.pain-mode__btn,
.pain-card,
.quiz-option,
.playlist-item,
.path-index__item,
.path-card__wechat,
.plan-upload-slot,
.plan-upload-slot__remove,
.plan-upload-file__retry,
.auth-modal__close,
.proto-modal__close,
.proto-toolbar__tab,
.proto-toolbar__btn,
.flow-axis__step,
.flow-axis__sub-step {
  transition-timing-function: var(--ease-out-quart);
}

.btn,
.nav__cta,
.pain-mode__btn,
.pain-card,
.quiz-option,
.playlist-item,
.path-index__item,
.path-card__wechat,
.plan-upload-slot {
  transition-property: background, border-color, color, box-shadow, opacity, transform;
  transition-duration: var(--motion-standard);
  transition-timing-function: var(--ease-out-quart);
}

.btn:hover,
.nav__cta:hover,
.pain-mode__btn:hover,
.quiz-option:hover,
.path-index__item:hover,
.path-card__wechat:hover,
.plan-upload-slot:hover {
  transform: translateY(-1px);
}
.nav__cta:hover {

.btn:disabled,
.btn:disabled:hover,
button:disabled,

.nav__links a {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 4px 8px;
  border-radius: 4px;
  white-space: nowrap;

.nav__links a::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: 2px;
  height: 2px;
  border-radius: 999px;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: left center;
  opacity: 0;
  transition: transform var(--motion-state) var(--ease-out-quint), opacity var(--motion-standard) var(--ease-out-quart);
}

.nav__links a.is-active {

}

  transform: scaleX(1);
  opacity: 1;

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, createContext, useContext, useCallback } = React;

const CLICK_FEEDBACK_SELECTOR = [
  "button:not(:disabled)",
  "a[href]",
  ".plan-upload-slot",
].join(",");

function prefersReducedMotion() {
  return window.matchMedia?.("(prefers-reduced-motion: reduce)")?.matches ?? false;
}

function scrollBehavior() {
  return prefersReducedMotion() ? "auto" : "smooth";
}

function useClickMotionFeedback() {
  useEffect(() => {
    if (prefersReducedMotion()) return;

    const removeRipples = (target) => {
      Array.from(target.children).forEach((child) => {
        if (child.classList?.contains("motion-ripple-layer")) child.remove();
      });
    };

    const hasOwnRipple = (target) => (
      Array.from(target.children).some((child) => child.classList?.contains("motion-ripple-layer"))
    );

    const clearTarget = (target) => {
      window.clearTimeout(target.__motionPressTimer);
      window.clearTimeout(target.__motionHostTimer);
      removeRipples(target);
      target.classList.remove("is-pressing", "motion-ripple-host");
      delete target.dataset.motionPressing;
      delete target.dataset.motionRippleHost;
    };

    const primeTarget = (target, clientX, clientY) => {
      if (!target || target.closest("[aria-disabled='true']")) return;
      const rect = target.getBoundingClientRect();
      const rawX = Number.isFinite(clientX) ? clientX - rect.left : rect.width / 2;
      const rawY = Number.isFinite(clientY) ? clientY - rect.top : rect.height / 2;
      const x = Math.max(0, Math.min(rect.width, rawX));
      const y = Math.max(0, Math.min(rect.height, rawY));
      const farX = Math.max(x, rect.width - x);
      const farY = Math.max(y, rect.height - y);
      const rippleSize = Math.ceil(Math.hypot(farX, farY) * 2);

      removeRipples(target);
      target.classList.add("motion-ripple-host", "is-pressing");
      target.dataset.motionRippleHost = "true";
      target.dataset.motionPressing = "true";

      const layer = document.createElement("span");
      layer.className = "motion-ripple-layer";
      layer.setAttribute("aria-hidden", "true");

      const ripple = document.createElement("span");
      ripple.className = "motion-ripple";
      ripple.style.setProperty("--ripple-x", `${x}px`);
      ripple.style.setProperty("--ripple-y", `${y}px`);
      ripple.style.setProperty("--ripple-size", `${Math.max(32, rippleSize)}px`);
      layer.appendChild(ripple);
      target.appendChild(layer);

      ripple.addEventListener("animationend", () => {
        layer.remove();
        if (!hasOwnRipple(target)) {
          target.classList.remove("motion-ripple-host");
          delete target.dataset.motionRippleHost;
        }
      }, { once: true });

      window.clearTimeout(target.__motionPressTimer);
      window.clearTimeout(target.__motionHostTimer);
      target.__motionPressTimer = window.setTimeout(() => {
        target.classList.remove("is-pressing");
        delete target.dataset.motionPressing;
      }, 140);
      target.__motionHostTimer = window.setTimeout(() => {
        target.classList.remove("motion-ripple-host");
        delete target.dataset.motionRippleHost;
        removeRipples(target);
      }, 940);
    };

    const onPointerDown = (event) => {
      if (event.button !== undefined && event.button !== 0) return;
      if (!(event.target instanceof Element)) return;
      const target = event.target.closest(CLICK_FEEDBACK_SELECTOR);
      if (!target) return;
      primeTarget(target, event.clientX, event.clientY);
    };

    const onPointerEnd = (event) => {
      if (!(event.target instanceof Element)) return;
      const target = event.target.closest(CLICK_FEEDBACK_SELECTOR);
      if (target) {
        window.clearTimeout(target.__motionPressTimer);
        target.classList.remove("is-pressing");
        delete target.dataset.motionPressing;
      }
    };

    const onKeyDown = (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      if (event.repeat) return;
      if (!(document.activeElement instanceof Element)) return;
      const target = document.activeElement.closest(CLICK_FEEDBACK_SELECTOR);
      if (!target) return;
      const rect = target.getBoundingClientRect();
      primeTarget(target, rect.left + rect.width / 2, rect.top + rect.height / 2);
    };

    const onKeyUp = () => {
      if (document.activeElement instanceof Element) {
        const target = document.activeElement.closest(CLICK_FEEDBACK_SELECTOR);
        if (target) {
          target.classList.remove("is-pressing");
          delete target.dataset.motionPressing;
        }
      }
    };

    document.addEventListener("pointerdown", onPointerDown, { passive: true });
    document.addEventListener("pointerup", onPointerEnd, { passive: true });
    document.addEventListener("pointercancel", onPointerEnd, { passive: true });
    document.addEventListener("keydown", onKeyDown);
    document.addEventListener("keyup", onKeyUp);

    return () => {
      document.removeEventListener("pointerdown", onPointerDown);
      document.removeEventListener("pointerup", onPointerEnd);
      document.removeEventListener("pointercancel", onPointerEnd);
      document.removeEventListener("keydown", onKeyDown);
      document.removeEventListener("keyup", onKeyUp);
      document.querySelectorAll(".motion-ripple-host, .is-pressing, [data-motion-ripple-host='true'], [data-motion-pressing='true']").forEach(clearTarget);
    };
  }, []);
}

const DripContext = createContext(null);

function DripProvider({ children }) {
  const [showNotes, setShowNotes] = useState(false);
  const [showTodos, setShowTodos] = useState(false);
  const [active, setActive] = useState(null);

  const close = useCallback(() => setActive(null), []);

  useEffect(() => {
    if (!active) return;
    const onKey = (e) => { if (e.key === "Escape") close(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [active, close]);

  return (
    <DripContext.Provider value={{ showNotes, setShowNotes, showTodos, setShowTodos, active, setActive, close }}>
      {children}
      <DripModal />
    </DripContext.Provider>
  );
}

function useDrip() {
  return useContext(DripContext);
}

function DripAnchor({ side = "end", gap = 6, row = false, block = false, className = "", style, children, drip }) {
  if (!drip) return children;
  const cls = [
    "proto-anchor",
    `proto-anchor--${side}`,
    block ? "proto-anchor--block" : "",
    className,
  ].filter(Boolean).join(" ");
  const dripsCls = row ? "proto-anchor__drips proto-anchor__drips--row" : "proto-anchor__drips";
  return (
    <span className={cls} style={{ gap, ...style }}>
      {children}
      <span className={dripsCls}>{drip}</span>
    </span>
  );
}

function NoteDrip({ pos = "tr", style, inline, title, body, prd = [], docs = [], links = [] }) {
  const { showNotes, setActive } = useDrip();
  if (!showNotes) return null;
  const isInline = inline || style;
  return (
    <button
      type="button"
      className={`proto-drip proto-drip--note${isInline ? " proto-drip--inline" : ` proto-drip--${pos}`}`}
      style={style}
      title={title}
      aria-label={`备注：${title}`}
      onClick={(e) => {
        e.stopPropagation();
        setActive({ kind: "note", title, body, prd, docs, links });
      }}
    >
      <span className="proto-drip__icon">i</span>

function TodoDrip({ pos = "br", style, inline, todoId }) {
  const { showTodos, setActive } = useDrip();
  const todo = PAGE_TODOS[todoId];
  if (!showTodos || !todo) return null;
  const isInline = inline || style;
  return (
    <button
      type="button"
      className={`proto-drip proto-drip--todo${isInline ? " proto-drip--inline" : ` proto-drip--${pos}`}`}
      style={style}
      title={`${todoId} ${todo.title}`}
      aria-label={`待办：${todoId}`}
      onClick={(e) => {
        e.stopPropagation();
        setActive({
          kind: "todo",
          todoId,
          title: `${todoId} · ${todo.title}`,
          body: todo.detail,
          prd: todo.prd || [],
          docs: ["todo", ...(todo.docs || [])],
          meta: { owner: todo.owner, status: todo.status, blocker: todo.blocker },
        });
      }}
    >
      <span className="proto-drip__icon">!</span>
    </button>
  );
}

function DripModal() {
  const { active, close } = useDrip();
  if (!active) return null;

  const docKeys = active.docs || [];
  const prdSections = active.prd || [];

  return (
    <div className="proto-modal-backdrop" onClick={close}>
      <div className="proto-modal" onClick={(e) => e.stopPropagation()} role="dialog" aria-modal="true">
        <div className="proto-modal__head">
          <div>
            <div className={`proto-modal__kind proto-modal__kind--${active.kind}`}>
              {active.kind === "note" ? "备注 · PRD / 逻辑说明" : "待办 · TODO"}

            <div className="proto-modal__title">{active.title}</div>
          </div>
          <button type="button" className="proto-modal__close" onClick={close} aria-label="关闭">×</button>
        </div>
        <div className="proto-modal__body">
          {active.body && <div className="proto-modal__text">{active.body}</div>}
          {active.meta && (
            <div className="proto-modal__meta">

          )}
          {prdSections.length > 0 && (
            <div>
              <div className="proto-modal__section-title">PRD 章节</div>
              <div className="proto-modal__tags">
                {prdSections.map((s) => <span key={s} className="proto-modal__tag">{s}</span>)}
              </div>
            </div>
          )}
          {docKeys.length > 0 && (
            <div>
              <div className="proto-modal__section-title">相关文档</div>

                {docKeys.map((k) => {

function MediaPlaceholder({ label, aspect = "16/9", tone = "warm", caption, badge, className = "", fill = false, imageSrc }) {
  const toneBg = {
    warm: "linear-gradient(135deg, #cfe0f5 0%, #7aa7d9 100%)",
    sage: "linear-gradient(135deg, #b8c8df 0%, #5f88bb 100%)",
    ink: "linear-gradient(135deg, #0b2863 0%, #021f3a 100%)",
    cream: "linear-gradient(135deg, #e8eef7 0%, #b8cded 100%)",
    accent: "linear-gradient(135deg, #6b9cea 0%, #1e5fd6 100%)",
  }[tone];

  const stripeTone = tone === "ink" ? "rgba(255,255,255,0.06)" : "rgba(255,255,255,0.18)";
  const textColor = tone === "ink" || tone === "accent" ? "#f4f7fb" : "#0b1f3a";

  return (
    <div
      className={className}
      style={{
      ...(fill
        ? { position: "absolute", inset: 0, width: "100%", height: "100%" }
        : { aspectRatio: aspect, width: "100%", position: "relative", borderRadius: 16 }),
      background: toneBg,
      overflow: "hidden",
    }}>
      {imageSrc && (
        <img
          className="media-ph__image"
          src={imageSrc}
          alt=""
          aria-hidden="true"
          loading="lazy"
        />
      )}
      <div className="media-ph__stripe" style={{
        position: "absolute",
        inset: 0,
        backgroundImage: `repeating-linear-gradient(45deg, transparent 0 14px, ${stripeTone} 14px 15px)`,
      }} />
      {badge && (
        <div className="media-ph__badge" style={{
          position: "absolute", top: 14, left: 14,
          background: "#0b1f3a", color: "#f4f7fb",
          padding: "4px 10px", fontFamily: "var(--mono)", fontSize: "var(--text-meta-sm)",
          letterSpacing: "0.12em", textTransform: "uppercase",
          borderRadius: 8,
        }}>{badge}</div>

      {label && (
        <div className="media-ph__label" style={{
          position: "absolute", inset: 0,
          display: "flex", alignItems: "center", justifyContent: "center",

        <div className="media-ph__caption" style={{
          position: "absolute", bottom: 14, left: 14, right: 14,
          fontFamily: "var(--serif)", fontSize: 14,
          color: textColor, opacity: 0.9,

      )}
    </div>
  );
}

function PainPointsB({ onMatch }) {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState([]); // array of { qIdx, hook, label, multi? }
  const [multiSelected, setMultiSelected] = useState([]); // for current multi-select step
  const done = step >= QUIZ.length;

  const resultIdx = useMemo(() => {
    if (answers.length === 0) return 0;
    const counts = {};
    answers.forEach(a => { counts[a.hook] = (counts[a.hook] || 0) + 1; });
    const best = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
    return Number(best[0]);
  }, [answers]);

  const result = PAIN_POINTS.find(p => p.hookIdx === resultIdx) || PAIN_POINTS[0];

  useEffect(() => { if (done && onMatch) onMatch(result); }, [done]);

  function pickSingle(a) {
    setAnswers(prev => [...prev, { qIdx: step, hook: a.hook, label: a.label }]);
    setStep(s => s + 1);
  }

  function toggleMulti(a) {
    setMultiSelected(prev =>
      prev.find(x => x.k === a.k) ? prev.filter(x => x.k !== a.k) : [...prev, a]
    );
  }

  function confirmMulti() {
    if (multiSelected.length === 0) return;
    // Use most-common hook among selections
    const counts = {};
    multiSelected.forEach(a => { counts[a.hook] = (counts[a.hook] || 0) + 1; });
    const bestHook = Number(Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0]);
    const labelStr = multiSelected.map(x => x.label).join("、");
    setAnswers(prev => [...prev, { qIdx: step, hook: bestHook, label: labelStr }]);
    setMultiSelected([]);
    setStep(s => s + 1);
  }

  function reset() {
    setAnswers([]); setStep(0); setMultiSelected([]);
  }

  const q = QUIZ[step];

  // Build preview rows: answered + pending
  const previewRows = QUIZ.map((qItem, i) => {
    const ans = answers.find(a => a.qIdx === i);
    const isCurrent = i === step && !done;
    return { qItem, ans, isCurrent };
  });

  return (
    <div className="quiz-layout">
      {/* Left: quiz */}
      <div className="quiz-panel quiz-panel--left">
        {/* Progress */}
        <div className="quiz-progress">
          {QUIZ.map((_, i) => (
            <div
              key={i}
              className={`quiz-progress__bar${done || i <= step ? " is-active" : ""}`}
            />
          ))}
        </div>

        {done ? (
          <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center" }}>
            <div className="eyebrow" style={{ marginBottom: 16 }}>诊断完成</div>
            <div className="quiz-done-title" style={{ marginBottom: 16 }}>
              你最适合 <em style={{ color: "var(--accent)", fontStyle: "italic" }}>「{result.match}」</em>
            </div>
            <p style={{ fontSize: 15, color: "var(--ink-2)", marginBottom: 28, maxWidth: "48ch" }}>
              {result.detail}
            </p>
            <div className="quiz-done-actions" style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
              <DripAnchor
                side="end"
                drip={
                  <NoteDrip
                    inline
                    title="问卷结果 · 查看专属路径"
                    body={"平滑滚动至 #path-{hookIdx}，与模式 A「查看路径」同逻辑；问卷完成时已设路径高亮"}
                    prd={["§2.2 功能 3", "§2.2 功能 5"]}
                    docs={["prd"]}
                  />
                }
              >
                <a
                  className="btn btn--ink"
                  href={`#path-${result.hookIdx}`}
                  onClick={(e) => {
                    e.preventDefault();
                    scrollToPath(result.hookIdx);
                  }}
                >
                  查看专属路径 <Arrow />
                </a>
              </DripAnchor>
              <button className="btn btn--ghost" onClick={reset}>重新测试</button>
            </div>
          </div>
        ) : (
          <>
            <div className="quiz-step-meta">
              第 {step + 1} 题 / 共 {QUIZ.length} 题
              {q.type === "multi" && (
                <span className="quiz-step-meta__tag">多选</span>
              )}
            </div>
            <div key={`quiz-q-${step}`} className="quiz-q-title">
              {q.q}
            </div>
            {q.hint && (
              <div className="quiz-hint">
                {q.hint}
              </div>
            )}

            <div className="quiz-options">
              {q.a.map((a, i) => {
                const isChecked = q.type === "multi" && multiSelected.find(x => x.k === a.k);
                return (
                  <button
                    key={a.k}
                    type="button"
                    className={`quiz-option${isChecked ? " is-checked" : ""}`}
                    onClick={() => q.type === "multi" ? toggleMulti(a) : pickSingle(a)}
                  >
                    {q.type === "multi" ? (
                      <span className="quiz-option__check">
                        {isChecked && <Check size={12} />}
                      </span>
                    ) : (
                      <span className="quiz-option__key">
                        {String.fromCharCode(65 + i)}
                      </span>
                    )}
                    <span className="quiz-option__label">{a.label}</span>
                    {q.type === "single" && <Arrow />}
                  </button>
                );
              })}
            </div>

            {q.type === "multi" && (
              <button
                onClick={confirmMulti}
                disabled={multiSelected.length === 0}
                className="btn btn--ink quiz-confirm"
              >
                确认选择 ({multiSelected.length}) <Arrow />
              </button>
            )}
          </>
        )}
      </div>

      {/* Right: diagnosis preview */}
      <div className="quiz-panel quiz-panel--right">
        <div className="quiz-panel--right-inner">
          <div className="quiz-diag-block">
            <div className="eyebrow quiz-diag-title">写作诊断表</div>
            <div className="quiz-diag-list">
              {previewRows.map(({ qItem, ans, isCurrent }, i) => (
                <div
                  key={i}
                  className={`quiz-diag-row${isCurrent ? " is-current" : ""}${ans ? " has-answer" : ""}`}
                >
                  <span className="quiz-diag-row__label">
                    第 {i + 1} 题
                  </span>
                  <span className="quiz-diag-row__value">
                    {ans ? ans.label : (isCurrent ? "作答中" : "待填写")}
                  </span>
                </div>
              ))}
            </div>
          </div>

          <div className="quiz-live-preview-wrap">
            <MediaPlaceholder className="quiz-live-preview" aspect="4/3" tone="cream" label={done ? "你的结果" : "预览"} />
            <div className="quiz-live-caption">根据回答实时更新</div>
          </div>
        </div>
      </div>
    </div>
  );
}

function AuthProvider({ children }) {
  const [isLoggedIn, setIsLoggedIn] = useState(() => {
    try { return localStorage.getItem(AUTH_STORAGE_KEY) === "1"; } catch { return false; }
  });
  const [loginOpen, setLoginOpen] = useState(false);
  const [svipOpen, setSvipOpen] = useState(false);
  const [pendingPathIndex, setPendingPathIndex] = useState(null);

  const openLogin = useCallback((pathIndex = null) => {
    setPendingPathIndex(pathIndex);
    setLoginOpen(true);
  }, []);

  const closeLogin = useCallback(() => {
    setLoginOpen(false);
    setPendingPathIndex(null);
  }, []);

  const openSvip = useCallback(() => setSvipOpen(true), []);
  const closeSvip = useCallback(() => setSvipOpen(false), []);

  const dispatchPathSuccess = useCallback((pathIndex) => {
    if (pathIndex === PATH02_INDEX) {
      window.dispatchEvent(new CustomEvent("path02-plan-request"));
      return;
    }
    if (PATH_CTA_TARGETS[pathIndex]?.type === "url") {
      navigatePathCta(pathIndex);
      return;
    }
    window.dispatchEvent(new CustomEvent("path-cta-success", {
      detail: { index: pathIndex, label: PATHS[pathIndex]?.cta },
    }));
  }, []);

  const completeAuth = useCallback((mode) => {
    try { localStorage.setItem(AUTH_STORAGE_KEY, "1"); } catch { /* ignore */ }
    setIsLoggedIn(true);
    setLoginOpen(false);
    const idx = pendingPathIndex;
    setPendingPathIndex(null);
    if (idx != null) dispatchPathSuccess(idx);
  }, [pendingPathIndex, dispatchPathSuccess]);

  const logout = useCallback(() => {
    try { localStorage.removeItem(AUTH_STORAGE_KEY); } catch { /* ignore */ }
    setIsLoggedIn(false);
    window.dispatchEvent(new CustomEvent("bc-landing-auth-logout"));
  }, []);

  const setLoggedInDemo = useCallback((value) => {
    if (value) {
      try { localStorage.setItem(AUTH_STORAGE_KEY, "1"); } catch { /* ignore */ }
      setIsLoggedIn(true);
    } else {
      logout();
    }
  }, [logout]);

  const requireAuthForPath = useCallback((pathIndex) => {
    if (isLoggedIn) {
      dispatchPathSuccess(pathIndex);
      return true;
    }
    openLogin(pathIndex);
    return false;
  }, [isLoggedIn, openLogin, dispatchPathSuccess]);

  const value = useMemo(() => ({
    isLoggedIn,
    loginOpen,
    svipOpen,
    pendingPathIndex,
    openLogin,
    closeLogin,
    openSvip,
    closeSvip,
    completeAuth,
    logout,
    setLoggedInDemo,
    requireAuthForPath,
  }), [isLoggedIn, loginOpen, svipOpen, pendingPathIndex, openLogin, closeLogin, openSvip, closeSvip, completeAuth, logout, setLoggedInDemo, requireAuthForPath]);

  return (
    <AuthContext.Provider value={value}>
      {children}
      <LoginRegisterModal />
      <SvipIntroModal />
    </AuthContext.Provider>
  );
}

const PLAN_STORAGE_KEY = "bc-landing-demo-path02-plan";
const PLAN_MAX_BYTES = 5 * 1024 * 1024;
const PLAN_DEMO_GEN_MS = 12000;

const Path02PlanContext = createContext(null);

function usePath02Plan() {
  const ctx = useContext(Path02PlanContext);
  if (!ctx) throw new Error("usePath02Plan must be used within Path02PlanProvider");
  return ctx;
}

function formatFileSize(bytes) {
  if (bytes < 1024) return `${bytes} B`;
  if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
  return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
}

function loadStoredPlan() {
  try {
    const raw = localStorage.getItem(PLAN_STORAGE_KEY);
    if (!raw) return { status: "none" };
    const data = JSON.parse(raw);
    if (data?.status === "generating") {
      const fileNames = data.fileNames || [];
      const elapsed = Date.now() - (data.startedAt || 0);
      if (elapsed >= PLAN_DEMO_GEN_MS) {
        return {
          ...data,
          status: "ready",
          fileNames,
          preview: data.preview || buildDemoPlanPreview(fileNames),
          readyAt: data.startedAt + PLAN_DEMO_GEN_MS,
        };
      }
      return data;
    }
    if (data?.status === "ready") {
      const fileNames = data.fileNames || [];
      const preview = data.preview || (fileNames.length ? buildDemoPlanPreview(fileNames) : null);
      return preview ? { ...data, fileNames, preview } : { status: "none" };
    }
    if (data?.status === "none") return { status: "none" };
    return { status: "none" };
  } catch {
    return { status: "none" };
  }
}

function saveStoredPlan(plan) {
  try {
    if (plan.status === "none") localStorage.removeItem(PLAN_STORAGE_KEY);
    else localStorage.setItem(PLAN_STORAGE_KEY, JSON.stringify(plan));
  } catch { /* ignore */ }
}

function hasGeneratedPlan(plan) {
  return plan?.status === "ready" && Boolean(plan.preview);
}

function isPdfFile(file) {

function createDemoPdfBlob(preview) {
  const lines = [
    preview.title,
    "",
    ...preview.sections.flatMap((s) => {
      const block = [s.heading, s.body || "", ...(s.items || [])].filter(Boolean);
      return [...block, ""];
    }),
  ];
  const escaped = lines.map((l) => l.replace(/[()\\]/g, "\\$&")).slice(0, 40);
  let y = 750;
  const textOps = escaped.map((line) => {
    const op = `BT /F1 11 Tf 48 ${y} Td (${line.slice(0, 80)}) Tj ET`;
    y -= 16;
    return op;
  }).join("\n");
  const stream = textOps + "\n";
  const pdf = `%PDF-1.4
1 0 obj<</Type/Catalog/Pages 2 0 R>>endobj
2 0 obj<</Type/Pages/Kids[3 0 R]/Count 1>>endobj
3 0 obj<</Type/Page/MediaBox[0 0 612 792]/Parent 2 0 R/Contents 4 0 R/Resources<</Font<</F1 5 0 R>>>>>>endobj
4 0 obj<</Length ${stream.length}>>stream
${stream}
endstream endobj
5 0 obj<</Type/Font/Subtype/Type1/BaseFont/Helvetica>>endobj
xref
0 6
0000000000 65535 f 
0000000010 00000 n 
0000000053 00000 n 
0000000100 00000 n 
0000000240 00000 n 
0000000500 00000 n 
trailer<</Size 6/Root 1 0 R>>
startxref
580
%%EOF`;
  return new Blob([pdf], { type: "application/pdf" });
}

function PlanResultPreview({ preview }) {
  const previewRef = useRef(null);
  const [fade, setFade] = useState({ top: false, bottom: false });

  useEffect(() => {
    const el = previewRef.current;
    if (!el) return;

    let frame = 0;
    const update = () => {
      const maxScroll = Math.max(0, el.scrollHeight - el.clientHeight);
      const next = {
        top: el.scrollTop > 1,
        bottom: el.scrollTop < maxScroll - 1,
      };
      setFade(prev => (
        prev.top === next.top && prev.bottom === next.bottom ? prev : next
      ));
    };
    const requestUpdate = () => {
      if (frame) cancelAnimationFrame(frame);
      frame = requestAnimationFrame(update);
    };

    update();
    el.addEventListener("scroll", requestUpdate, { passive: true });
    window.addEventListener("resize", requestUpdate);
    return () => {
      if (frame) cancelAnimationFrame(frame);
      el.removeEventListener("scroll", requestUpdate);
      window.removeEventListener("resize", requestUpdate);
    };
  }, [preview]);

  return (
    <div className={`plan-result-shell${fade.top ? " has-top-fade" : ""}${fade.bottom ? " has-bottom-fade" : ""}`}>
      <div className="plan-result-preview" ref={previewRef}>
        <h4>{preview.title}</h4>
        {preview.sections.map((s, i) => (
          <section key={i}>
            <h4>{s.heading}</h4>

            )}

        ))}

      <div className="plan-result-fade plan-result-fade--bottom" aria-hidden="true" />
    </div>
  );
}

function Path02PlanProvider({ children }) {
  const [plan, setPlan] = useState(loadStoredPlan);
  const [modal, setModal] = useState(null);
  const [files, setFiles] = useState([null, null]);
  const [fileErrors, setFileErrors] = useState(["", ""]);
  const [uploadItems, setUploadItems] = useState([]);
  const [genProgress, setGenProgress] = useState(0);
  const [planToast, setPlanToast] = useState("");
  const genStartedInSessionRef = useRef(false);
  const timerRef = useRef(null);
  const progressRef = useRef(null);
  const uploadTimersRef = useRef({});

  const persistPlan = useCallback((next) => {
    setPlan(next);
    saveStoredPlan(next);
  }, []);

  const showToast = useCallback((msg) => {
    setPlanToast(msg);
    setTimeout(() => setPlanToast(""), 3200);
  }, []);

  const closeModal = useCallback(() => setModal(null), []);

  const clearUploadTimers = useCallback(() => {
    Object.values(uploadTimersRef.current).forEach((timer) => clearTimeout(timer));
    uploadTimersRef.current = {};
  }, []);

  const syncUploadFiles = useCallback((items) => {
    const successFiles = items.filter((item) => item.status === "success").map((item) => item.file).slice(0, 2);
    const errors = items.filter((item) => item.status === "error").map((item) => item.error).slice(0, 2);
    setFiles([successFiles[0] || null, successFiles[1] || null]);
    setFileErrors([errors[0] || "", errors[1] || ""]);
  }, []);

  const openUpload = useCallback(() => {
    clearUploadTimers();
    setFiles([null, null]);
    setFileErrors(["", ""]);
    setUploadItems([]);
    setModal("upload");
  }, [clearUploadTimers]);

  const viewPlan = useCallback(() => {
    if (hasGeneratedPlan(plan)) setModal("result");
  }, [plan]);

  const handlePlanRequest = useCallback(() => {
    if (plan.status === "generating") {
      showToast("方案生成中，请稍候");
      return;
    }
    if (hasGeneratedPlan(plan)) {
      setModal("overwrite");
      return;
    }
    openUpload();
  }, [plan, showToast, openUpload]);

  const confirmOverwrite = useCallback(() => {
    openUpload();
  }, [openUpload]);

  const validateFile = useCallback((file) => {
    if (!isPdfFile(file)) return "请上传 PDF 文件";
    if (file.size > PLAN_MAX_BYTES) return "文件超过 5MB";
    return "";
  }, []);

  const setFileAt = useCallback((index, file) => {
    const err = validateFile(file);
    setFiles((prev) => {
      const next = [...prev];
      next[index] = err ? null : file;
      return next;
    });
    setFileErrors((prev) => {
      const next = [...prev];
      next[index] = err;
      return next;
    });
  }, [validateFile]);

  const completeUploadItem = useCallback((id) => {
    delete uploadTimersRef.current[id];
    setUploadItems((prev) => {
      const next = prev.map((item) => (
        item.id === id && item.status === "uploading"
          ? { ...item, status: "success", progress: 100, loaded: item.file.size, error: "" }
          : item
      ));
      syncUploadFiles(next);
      return next;
    });
  }, [syncUploadFiles]);

  const setUploadFiles = useCallback((fileList) => {
    const incoming = Array.from(fileList || []);
    if (!incoming.length) return;

    const createdAt = Date.now();
    const newItems = incoming.map((file, index) => {
        const err = validateFile(file);
        return {
          id: `${createdAt}-${index}-${file.name}-${file.size}`,
          file,
          status: err ? "error" : "uploading",
          progress: err ? 0 : 10,
          loaded: err ? 0 : 0,
          error: err,
        };
      });

    setUploadItems((prev) => {
      const slotsLeft = Math.max(0, 2 - prev.length);
      if (!slotsLeft) {
        setFileErrors(["最多上传 2 份 PDF", ""]);
        return prev;
      }
      const next = [...prev, ...newItems.slice(0, slotsLeft)];
      syncUploadFiles(next);
      return next;
    });

    newItems.slice(0, Math.max(0, 2 - uploadItems.length)).forEach((item) => {
      if (item.status !== "uploading") return;
      uploadTimersRef.current[item.id] = setTimeout(() => completeUploadItem(item.id), 700);
    });
  }, [completeUploadItem, syncUploadFiles, uploadItems.length, validateFile]);

  const clearUploadItem = useCallback((id) => {
    if (uploadTimersRef.current[id]) {
      clearTimeout(uploadTimersRef.current[id]);
      delete uploadTimersRef.current[id];
    }
    setUploadItems((prev) => {
      const next = prev.filter((item) => item.id !== id);
      syncUploadFiles(next);
      return next;
    });
  }, [syncUploadFiles]);

  const clearFileAt = useCallback((index) => {
    const target = uploadItems[index];
    if (target) clearUploadItem(target.id);
  }, [clearUploadItem, uploadItems]);

  const retryUploadItem = useCallback((id) => {
    let shouldComplete = false;
    setUploadItems((prev) => {
      const next = prev.map((item) => (
        item.id === id
          ? (() => {
              const err = validateFile(item.file);
              if (err) return { ...item, status: "error", progress: 0, loaded: 0, error: err };
              shouldComplete = true;
              return { ...item, status: "uploading", progress: 10, loaded: 0, error: "" };
            })()
          : item
      ));
      syncUploadFiles(next);
      return next;
    });
    if (uploadTimersRef.current[id]) clearTimeout(uploadTimersRef.current[id]);
    if (shouldComplete) {
      uploadTimersRef.current[id] = setTimeout(() => completeUploadItem(id), 700);
    }
  }, [completeUploadItem, syncUploadFiles, validateFile]);

  const finishGeneration = useCallback((fileNames) => {
    const preview = buildDemoPlanPreview(fileNames);
    const readyPlan = {
      status: "ready",
      fileNames,
      preview,
      readyAt: Date.now(),
    };
    persistPlan(readyPlan);
    setGenProgress(100);
    if (genStartedInSessionRef.current) {
      setModal("result");
    }
  }, [persistPlan]);

  const startGeneration = useCallback((fileNames) => {
    genStartedInSessionRef.current = true;
    persistPlan({ status: "generating", fileNames, startedAt: Date.now() });
    setGenProgress(0);
    setModal("generating");
  }, [persistPlan]);

  const submitUpload = useCallback(() => {
    const picked = uploadItems.filter((item) => item.status === "success").map((item) => item.file);
    if (!picked.length) return;
    startGeneration(picked.map((file) => file.name));
  }, [startGeneration, uploadItems]);

  useEffect(() => {
    const onRequest = () => handlePlanRequest();
    window.addEventListener("path02-plan-request", onRequest);
    return () => window.removeEventListener("path02-plan-request", onRequest);
  }, [handlePlanRequest]);

  useEffect(() => {
    const onAuthChange = () => setModal(null);
    window.addEventListener("bc-landing-auth-logout", onAuthChange);
    return () => window.removeEventListener("bc-landing-auth-logout", onAuthChange);
  }, []);

  useEffect(() => {
    if (plan.status !== "generating" || !plan.startedAt) return undefined;

    const fileNames = plan.fileNames || [];
    const remaining = Math.max(0, PLAN_DEMO_GEN_MS - (Date.now() - plan.startedAt));

    const updateProgress = () => {
      const elapsed = Date.now() - plan.startedAt;
      setGenProgress(Math.min(99, Math.round((elapsed / PLAN_DEMO_GEN_MS) * 100)));
    };

    updateProgress();
    progressRef.current = setInterval(updateProgress, 200);

    timerRef.current = setTimeout(() => {
      if (progressRef.current) clearInterval(progressRef.current);
      finishGeneration(fileNames);
    }, remaining);

    return () => {
      if (timerRef.current) clearTimeout(timerRef.current);
      if (progressRef.current) clearInterval(progressRef.current);
    };
  }, [plan.status, plan.startedAt, plan.fileNames, finishGeneration]);

  const resetPlanDemo = useCallback(() => {
    if (timerRef.current) clearTimeout(timerRef.current);
    if (progressRef.current) clearInterval(progressRef.current);
    clearUploadTimers();
    genStartedInSessionRef.current = false;
    persistPlan({ status: "none" });
    setModal(null);
    setFiles([null, null]);
    setFileErrors(["", ""]);
    setUploadItems([]);
    setGenProgress(0);
  }, [clearUploadTimers, persistPlan]);

  const simulateReadyPlan = useCallback(() => {
    genStartedInSessionRef.current = false;
    const preview = buildDemoPlanPreview(["demo-report.pdf"]);
    persistPlan({
      status: "ready",
      fileNames: ["demo-report.pdf"],
      preview,
      readyAt: Date.now(),
    });
  }, [persistPlan]);

  const value = useMemo(() => ({
    plan,
    modal,
    files,
    fileErrors,
    uploadItems,
    genProgress,
    planToast,
    closeModal,
    openUpload,
    viewPlan,
    confirmOverwrite,
    submitUpload,
    setFileAt,
    setUploadFiles,
    clearUploadItem,
    clearFileAt,
    retryUploadItem,
    handlePlanRequest,
    resetPlanDemo,
    simulateReadyPlan,
  }), [
    plan, modal, files, fileErrors, uploadItems, genProgress, planToast,
    closeModal, openUpload, viewPlan, confirmOverwrite, submitUpload,
    setFileAt, setUploadFiles, clearUploadItem, clearFileAt, retryUploadItem, handlePlanRequest, resetPlanDemo, simulateReadyPlan,
  ]);

  return (
    <Path02PlanContext.Provider value={value}>
      {children}
      <Path02PlanUI />
      <Path02GeneratingBar />
    </Path02PlanContext.Provider>
  );
}
