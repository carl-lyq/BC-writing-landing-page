  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [panelOpen, setPanelOpen] = useState(false);
  const [matchHookIdx, setMatchHookIdx] = useState(TWEAK_DEFAULTS.highlightPath);
  const [pathToast, setPathToast] = useState("");

  useEffect(() => {
    const onPathCta = (e) => {
      const idx = e.detail?.index;
      if (idx === PATH02_INDEX) return;
      const label = (e.detail?.label || "").replace(/\s*→\s*$/, "");
      setPathToast(`登录成功，即将跳转至：${label}`);
    };
    window.addEventListener("path-cta-success", onPathCta);
    return () => window.removeEventListener("path-cta-success", onPathCta);
  }, []);

  useEffect(() => {
    if (!pathToast) return;
    const t = setTimeout(() => setPathToast(""), 3500);
    return () => clearTimeout(t);
  }, [pathToast]);

  useEffect(() => {
    const onTweak = (e) => {
      setTweaks(prev => ({ ...prev, ...e.detail }));
    };
    window.addEventListener("tweak-set", onTweak);
    return () => window.removeEventListener("tweak-set", onTweak);
  }, []);

  useEffect(() => {
    document.documentElement.style.setProperty("--accent", tweaks.accent);
  }, [tweaks.accent]);

  useEffect(() => {
    if (tweaks.darkMode) {
      document.documentElement.style.setProperty("--paper", "#17130c");
      document.documentElement.style.setProperty("--paper-2", "#221c12");
      document.documentElement.style.setProperty("--paper-3", "#2c2519");
      document.documentElement.style.setProperty("--ink", "#f5eadb");
      document.documentElement.style.setProperty("--ink-2", "#d5c8b3");
      document.documentElement.style.setProperty("--ink-3", "#9a8c74");
      document.documentElement.style.setProperty("--ink-4", "#6f6451");
      document.documentElement.style.setProperty("--rule", "#3b3222");
      document.documentElement.style.setProperty("--rule-soft", "#2c2519");
    } else {
      ["--paper","--paper-2","--paper-3","--ink","--ink-2","--ink-3","--ink-4","--rule","--rule-soft"].forEach(v =>
        document.documentElement.style.removeProperty(v)
      );
    }
  }, [tweaks.darkMode]);

  function update(edits) {
    setTweaks(prev => ({ ...prev, ...edits }));
  }

  function onMatch(p) {
    if (p) setMatchHookIdx(p.hookIdx);
  }

  const hi = matchHookIdx >= 0 ? matchHookIdx : (tweaks.highlightPath >= 0 ? tweaks.highlightPath : -1);

  return (
    <>
      <FlowAxis />
      {/* NAV */}
      <nav className="nav" style={{ position: "relative" }}>
        <div className="page nav__bar" style={{ width: "100%" }}>
          <DripAnchor
            side="end"
            drip={<TodoDrip inline todoId="T-008" />}
          >
            <div className="nav__brand">
              <img src="https://www.figma.com/api/mcp/asset/45db55a0-f228-4b59-8adc-5a74294d43a0" alt="躺着学" />
            </div>
          </DripAnchor>
          <div className="nav__links">
            <a href="#hero">公开课</a>
            <a href="#pain">我的提分需求</a>
            <a href="#paths">学习路径</a>
            <a href="#proof">学员故事</a>
            <NoteDrip
              inline
              title="导航 · IA"
              body={"【Sticky 导航】4 个锚点：\n#hero 公开课 · #pain 我的提分需求\n#paths 学习路径 · #proof 学员故事\n\n【左侧流程轴 · Desktop ≥1280px】\n4 主步 + 学习路径下 6 条子项；滚动追踪 + 点击跳转\n<1280px 隐藏，依赖顶部锚点"}
              prd={["§2.1 页面 IA"]}
              docs={["prd"]}
            />
          </div>
          <DripAnchor
            side="end"
            drip={
              <>
                <NoteDrip
                  inline
                  title="登录 / 注册"
                  body={"【触发】导航按钮 或 任一路径 CTA（未登录）\n\n【弹窗】\n· 注册权益横幅：7 天 SVIP（￥99）\n· 「SVIP」可点开会员介绍弹窗\n· 路径 CTA 触发时显示「登录后继续：{CTA 文案}」\n\n【成功后】\n· 路径 02 → AI 方案弹窗\n· 其余 → deep link\n\n【规则】本页新注册自动送 7 天 SVIP；须携带来源标识\nDemo：点击登录/注册即模拟鉴权"}
                  prd={["§2.2 功能 5", "§2.2 路径 CTA 登录拦截"]}
                  docs={["prd", "todo"]}
                />
                <TodoDrip inline todoId="T-006" />
              </>
            }
          >
            <button type="button" className="nav__cta" onClick={() => openLogin()}>
              {isLoggedIn ? "已登录" : "登录/注册"}
            </button>
          </DripAnchor>
        </div>
      </nav>

      <main className="page">
        <Hero />
        <PainPointsSection pattern={tweaks.painPattern} onMatch={onMatch} />
      </main>

      <div className="page">
        <ConversionPaths highlightIdx={hi} />
        <Proof />
      </div>

      <Footer />

      {/* Tweaks toggle button — 原型调试，生产环境移除 */}
      <div
        style={{
          position: "fixed", right: 20, bottom: panelOpen ? 420 : 20,
          zIndex: 1001,
          transition: "bottom 200ms ease",
        }}
      >
        <DripAnchor
          side="top"
          drip={
            <NoteDrip
              inline
              title="Tweaks 调试面板"
              body={"⚠️ Demo 专用 · 正式版必须移除\n\n【功能】\n· 切换痛点模式 A/B\n· 切换强调色 / 深色模式\n· 手动指定高亮路径\n· 路径 02：模拟方案已就绪 / 重置\n\n【注意】A/B 切换应保留在「问题匹配」正文内，不依赖本面板"}
              prd={["§2.3 辅助功能", "§8.1 MVP"]}
              docs={["prd"]}
            />
          }
        >
          <button
            onClick={() => setPanelOpen(v => !v)}
            style={{
              width: 44, height: 44, borderRadius: "50%",
              background: "var(--ink)", color: "var(--paper)",
              display: "flex", alignItems: "center", justifyContent: "center",
              boxShadow: "0 4px 20px rgba(0,0,0,0.2)",
              fontFamily: "var(--mono)", fontSize: "var(--text-meta-sm)",
            }}
            title="Tweaks（原型调试 · 生产移除）"
          >
            ⚙
          </button>
        </DripAnchor>
      </div>

      {/* TWEAKS PANEL */}
      {panelOpen && (
        <div style={{
          position: "fixed", right: 20, bottom: 20,
          width: 320,
          background: "var(--paper)",
          border: "1px solid var(--ink)",
          boxShadow: "0 20px 50px rgba(0,0,0,0.18)",
          fontFamily: "var(--sans)",
          zIndex: 1000,
          borderRadius: 12,
          overflow: "hidden",
        }}>
          <div style={{
            padding: "14px 18px",
            background: "var(--ink)", color: "var(--paper)",
            display: "flex", justifyContent: "space-between", alignItems: "center",
          }}>
            <div style={{ fontFamily: "var(--mono)", fontSize: "var(--text-meta-md)", letterSpacing: "0.16em", textTransform: "uppercase" }}>
              调试面板
            </div>
            <button onClick={() => setPanelOpen(false)} style={{ color: "var(--paper)", fontSize: 18, lineHeight: 1 }}>×</button>
          </div>
          <div style={{ padding: 18, display: "flex", flexDirection: "column", gap: 20 }}>
            <TweakField label="痛点模式">
              <div style={{ display: "flex", gap: 0, border: "1px solid var(--rule)", borderRadius: 8, overflow: "hidden" }}>
                {["A", "B"].map(k => (
                  <button key={k}
                    onClick={() => update({ painPattern: k })}
                    style={{
                      flex: 1, padding: "8px 0",
                      fontFamily: "var(--mono)", fontSize: "var(--text-meta-md)", letterSpacing: "0.1em",
                      background: tweaks.painPattern === k ? "var(--ink)" : "transparent",
                      color: tweaks.painPattern === k ? "var(--paper)" : "var(--ink)",
                      borderRight: k === "A" ? "1px solid var(--rule)" : "none",
                    }}>
                    {k === "A" ? "A · 选卡" : "B · 问卷"}
                  </button>
                ))}
              </div>
            </TweakField>

            <TweakField label="强调色">
              <div style={{ display: "flex", gap: 8 }}>
                {[["#1e5fd6","蓝色"],["#143f99","深蓝"],["#2b6cb0","钢蓝"],["#0a3d62","藏青"],["#c9580c","赤陶"]].map(([c, name]) => (
                  <button key={c}
                    onClick={() => update({ accent: c })}
                    title={name}
                    style={{
                      width: 32, height: 32,
                      background: c,
                      border: tweaks.accent === c ? "2px solid var(--ink)" : "1px solid var(--rule)",
                      cursor: "pointer",
                      borderRadius: 6,
                    }}
                  />
                ))}
              </div>
            </TweakField>

            <TweakField label="高亮路径">
              <select
                value={tweaks.highlightPath}
                onChange={e => { const v = Number(e.target.value); update({ highlightPath: v }); setMatchHookIdx(v); }}
                style={{ width: "100%", padding: "8px 10px", fontFamily: "var(--sans)", fontSize: 13, border: "1px solid var(--rule)", background: "var(--paper)", color: "var(--ink)", borderRadius: 8 }}>
                <option value={-1}>无</option>
                <option value={0}>01 · 课程学习</option>
                <option value={1}>02 · 专属提分方案</option>
                <option value={2}>03 · 互动 SVIP</option>
                <option value={3}>04 · AI 计划</option>
                <option value={4}>05 · 学习营</option>
                <option value={5}>06 · 人工精批</option>
              </select>
            </TweakField>

            <TweakField label="深色模式">
              <button
                onClick={() => update({ darkMode: !tweaks.darkMode })}
                style={{
                  width: 50, height: 26, padding: 2,
                  background: tweaks.darkMode ? "var(--accent)" : "var(--rule)",
                  borderRadius: 999,
                  position: "relative",
                  transition: "background 160ms ease",
                }}>
                <div style={{
                  width: 22, height: 22, borderRadius: "50%",
                  background: "var(--paper)",
                  transform: tweaks.darkMode ? "translateX(24px)" : "translateX(0)",
                  transition: "transform 180ms ease",
                }} />
              </button>
            </TweakField>

            <TweakField label="模拟已登录">
              <button
                type="button"
                onClick={() => setLoggedInDemo(!isLoggedIn)}
                style={{
                  width: "100%", padding: "8px 10px",
                  fontFamily: "var(--mono)", fontSize: "var(--text-meta-md)",
                  border: "1px solid var(--rule)", borderRadius: 8,
                  background: isLoggedIn ? "var(--accent-wash)" : "var(--paper)",
                  color: isLoggedIn ? "var(--accent-ink)" : "var(--ink)",
                }}
              >
                {isLoggedIn ? "已登录 · 点击退出" : "未登录 · 点击模拟登录"}
              </button>
            </TweakField>

            <TweakField label="路径02 方案 Demo">
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                <button
                  type="button"
                  onClick={simulateReadyPlan}
                  style={{
                    width: "100%", padding: "8px 10px",
                    fontFamily: "var(--mono)", fontSize: "var(--text-meta-md)",
                    border: "1px solid var(--rule)", borderRadius: 8,
                    background: plan.status === "ready" ? "var(--accent-wash)" : "var(--paper)",
                    color: "var(--ink)",
                  }}
                >
                  模拟方案已就绪
                </button>
                <button
                  type="button"
                  onClick={resetPlanDemo}
                  style={{
                    width: "100%", padding: "8px 10px",
                    fontFamily: "var(--mono)", fontSize: "var(--text-meta-md)",
                    border: "1px solid var(--rule)", borderRadius: 8,
                    background: "var(--paper)", color: "var(--ink-3)",
                  }}
                >
                  重置路径02 方案状态
                </button>
              </div>
            </TweakField>
          </div>
        </div>
      )}

      {pathToast && (
        <div className="auth-toast" role="status">{pathToast}</div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <DripProvider>
    <AuthProvider>
      <Path02PlanProvider>
        <App />
        <DripToolbar />
      </Path02PlanProvider>
    </AuthProvider>
  </DripProvider>
);
</script>
</body>
</html>
