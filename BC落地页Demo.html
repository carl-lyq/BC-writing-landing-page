<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>躺着学 · 雅思写作</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
/* ============================================================
   IELTS Writing Landing — Warm Editorial System
   ============================================================ */

:root {
  --paper: #f4f7fb;
  --paper-2: #e7eef7;
  --paper-3: #d5e0ef;
  --ink: #0b1f3a;
  --ink-2: #1e3a63;
  --ink-3: #4f6a8f;
  --ink-4: #8aa0bd;
  --rule: #c6d4e6;
  --rule-soft: #dde6f2;

  --accent: #1e5fd6;
  --accent-ink: #143f99;
  --accent-wash: #d8e5fb;
  --sage: #2b6cb0;
  --sage-wash: #d3e2f2;
  --cream: #e8f0fb;

  --radius: 16px;

  --serif: "Noto Serif SC", "Source Han Serif SC", "Songti SC", Georgia, serif;
  --sans: "Noto Sans SC", "PingFang SC", -apple-system, "Helvetica Neue", sans-serif;
  --mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, monospace;

  --gutter: clamp(16px, 2vw, 32px);
  --page-max: 1440px;
  --flow-axis-width: 168px;
  --flow-axis-gap: 12px;
  --flow-axis-slot: 0px;

  /* Meta / label typography (readability) */
  --text-meta-xs: 12px;
  --text-meta-sm: 13px;
  --text-meta-md: 14px;
  --text-meta-lg: 15px;
  --text-section-num: 15px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: clip;
}

img { max-width: 100%; display: block; }
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
a { color: inherit; text-decoration: none; }

.page {
  max-width: var(--page-max);
  margin: 0 auto;
  padding: 0 var(--gutter);
  width: 100%;
  min-width: 0;
}

body {
  background-image:
    radial-gradient(ellipse at 20% 10%, rgba(30, 95, 214, 0.05), transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(43, 108, 176, 0.05), transparent 50%);
  background-attachment: fixed;
}

/* Nav */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 0;
  border-bottom: 1px solid var(--rule);
  position: sticky;
  top: 0;
  background: rgba(244, 247, 251, 0.92);
  backdrop-filter: blur(10px);
  z-index: 50;
}
.nav__brand img {
  height: 34px;
  width: auto;
  display: block;
}
.nav__links {
  display: flex;
  align-items: center;
  gap: 28px;
  font-size: 15px;
  color: var(--ink-2);
}
.nav__links a:hover { color: var(--accent); }
.nav__cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 9px 16px;
  background: var(--ink);
  color: var(--paper);
  font-size: 14px;
  border-radius: 16px;
  transition: background 160ms ease;
}
.nav__cta:hover { background: var(--accent); }

/* Left flow axis — page journey tracker (desktop) */
#hero, #pain, #paths, #proof,
[id^="path-"] {
  scroll-margin-top: 88px;
}
.flow-axis {
  position: fixed;
  left: var(--gutter);
  top: 50%;
  transform: translateY(-50%);
  z-index: 40;
  display: none;
  flex-direction: column;
  align-items: flex-start;
  gap: 10px;
  font-family: var(--sans);
  pointer-events: none;
  width: var(--flow-axis-width);
}
.flow-axis__inner {
  pointer-events: auto;
  display: flex;
  flex-direction: column;
  gap: 0;
  padding: 12px 12px 12px 10px;
  border-radius: 14px;
  background: rgba(244, 247, 251, 0.94);
  border: 1px solid var(--rule);
  backdrop-filter: blur(8px);
  box-shadow: 0 8px 28px rgba(11, 31, 58, 0.08);
  max-width: 168px;
}
.flow-axis__track {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.flow-axis__rail {
  position: absolute;
  left: 7px;
  top: 10px;
  bottom: 10px;
  width: 2px;
  background: var(--rule);
  border-radius: 1px;
  pointer-events: none;
}
.flow-axis__progress {
  position: absolute;
  left: 7px;
  top: 10px;
  width: 2px;
  background: var(--accent);
  border-radius: 1px;
  transition: height 0.35s ease;
  max-height: calc(100% - 20px);
  pointer-events: none;
}
.flow-axis__step {
  position: relative;
  display: grid;
  grid-template-columns: 16px 1fr;
  column-gap: 10px;
  align-items: center;
  padding: 8px 4px 8px 0;
  text-align: left;
  border: none;
  background: none;
  cursor: pointer;
  border-radius: 8px;
  transition: background 140ms ease;
  min-width: 120px;
}
.flow-axis__step:hover {
  background: var(--paper-2);
}
.flow-axis__dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 2px solid var(--rule);
  background: var(--paper);
  justify-self: center;
  transition: all 0.25s ease;
  z-index: 1;
}
.flow-axis__step.is-active .flow-axis__dot,
.flow-axis__step.is-active-parent .flow-axis__dot {
  width: 12px;
  height: 12px;
  border-color: var(--accent);
  background: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-wash);
}
.flow-axis__step.is-done .flow-axis__dot {
  border-color: var(--accent);
  background: var(--accent);
}
.flow-axis__label {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-3);
  line-height: 1.25;
  transition: color 0.2s ease;
}
.flow-axis__step.is-active .flow-axis__label,
.flow-axis__step.is-active-parent .flow-axis__label {
  color: var(--ink);
}
.flow-axis__subs {
  display: flex;
  flex-direction: column;
  margin: 0 0 6px 26px;
  padding-left: 10px;
  border-left: 1px solid var(--rule-soft);
}
.flow-axis__sub-step {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 5px 4px 5px 0;
  text-align: left;
  border: none;
  background: none;
  cursor: pointer;
  border-radius: 6px;
  width: 100%;
  transition: background 140ms ease;
}
.flow-axis__sub-step:hover { background: var(--paper-2); }
.flow-axis__sub-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--rule);
  flex-shrink: 0;
  margin-top: 5px;
  transition: background 0.2s ease;
}
.flow-axis__sub-step.is-active .flow-axis__sub-dot {
  background: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-wash);
}
.flow-axis__sub-step.is-done .flow-axis__sub-dot {
  background: var(--accent);
}
.flow-axis__sub-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-4);
  line-height: 1.3;
  transition: color 0.2s ease;
}
.flow-axis__sub-step.is-active .flow-axis__sub-label {
  color: var(--accent-ink);
  font-weight: 600;
}
.flow-axis__sub-step.is-done .flow-axis__sub-label {
  color: var(--ink-3);
}
@media (min-width: 1280px) {
  :root {
    --flow-axis-slot: calc(var(--flow-axis-width) + var(--flow-axis-gap));
  }
  .flow-axis { display: flex; }
  .page {
    padding-left: calc(var(--gutter) + var(--flow-axis-slot));
  }
  .proto-toolbar { display: none; }
}
@media (min-width: 1820px) {
  .flow-axis {
    left: calc((100vw - var(--page-max)) / 2 - var(--flow-axis-width) - var(--flow-axis-gap));
  }
  .page {
    padding-left: var(--gutter);
  }
}
@media (max-width: 1279px) {
  .flow-axis { display: none !important; }
}

/* Site footer — aligned with igopx.cn main site */
.site-footer {
  position: relative;
  width: 100%;
  margin-top: 0;
}
.site-footer__bar {
  position: relative;
  width: 100%;
  aspect-ratio: 4320 / 502;
  min-height: 140px;
  background-image: url(https://s-cdn.igopx.cn/prod/upload/202603231652/bg.png);
  background-size: 100% 100%;
  background-repeat: no-repeat;
  background-position: center bottom;
}
.site-footer__links {
  position: absolute;
  left: clamp(16px, 5.5vw, 88px);
  top: clamp(14px, 2.6vw, 36px);
  display: flex;
  flex-direction: column;
  gap: clamp(4px, 0.5vw, 8px);
  z-index: 1;
}
.site-footer__link-item {
  color: #fff;
  font-size: clamp(11px, 0.95vw, 14px);
  line-height: 1.45;
}
.site-footer__name {
  font-size: clamp(12px, 1.05vw, 15px);
  font-weight: 800;
}
.site-footer__label {
  opacity: 0.92;
}
.site-footer__link-item a {
  color: #fff;
  text-decoration: none;
}
.site-footer__link-item a:hover {
  color: #2d91ff;
}
@media (max-width: 767px) {
  .site-footer__bar {
    aspect-ratio: auto;
    min-height: 200px;
    background-size: cover;
    background-position: center;
  }
  .site-footer__links {
    max-width: 52%;
  }
}

/* Eyebrow */
.eyebrow {
  font-family: var(--mono);
  font-size: var(--text-meta-md);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-3);
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.eyebrow::before {
  content: "";
  width: 18px; height: 1px;
  background: var(--accent);
  display: inline-block;
}
.eyebrow--plain::before { display: none; }

/* Section */
.section {
  padding: 88px 0;
  border-top: 1px solid var(--rule);
  position: relative;
}
.section__head {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 48px;
  margin-bottom: 48px;
  align-items: end;
}
.section__head--stack {
  display: flex;
  flex-direction: column;
  gap: 0;
  align-items: flex-start;
  max-width: 720px;
}
.section__head--center {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  margin-bottom: 48px;
  gap: 0;
}
.section__label {
  font-family: var(--serif);
  font-size: clamp(32px, 4.2vw, 48px);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.08;
  color: var(--ink);
  text-wrap: balance;
  margin-bottom: 14px;
}
.section__head--center .section__label {
  margin-bottom: 16px;
}
.section__num {
  font-family: var(--mono);
  font-size: var(--text-section-num);
  color: var(--ink-2);
  letter-spacing: 0.1em;
  font-weight: 500;
}
.section__title {
  font-family: var(--serif);
  font-size: clamp(28px, 3.2vw, 44px);
  line-height: 1.08;
  letter-spacing: -0.02em;
  font-weight: 700;
  text-wrap: balance;
}
.section__head--stack .section__title,
.section__head--center .section__title {
  font-size: clamp(24px, 2.6vw, 36px);
  font-weight: 600;
  color: var(--ink);
}
.section__title em {
  font-style: italic;
  color: var(--accent);
  font-weight: 500;
}
.section__sub {
  color: var(--ink-2);
  font-size: 17px;
  max-width: 52ch;
  text-wrap: pretty;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 22px;
  font-size: 14px;
  font-weight: 500;
  border-radius: 16px;
  transition: all 180ms ease;
  line-height: 1;
}
.btn--primary {
  background: var(--accent);
  color: var(--paper);
}
.btn--primary:hover { background: var(--accent-ink); transform: translateY(-1px); }
.btn--ink {
  background: var(--ink);
  color: var(--paper);
}
.btn--ink:hover { background: var(--accent); }
.btn--ghost {
  background: transparent;
  color: var(--ink);
  border: 1px solid var(--rule);
}
.btn--ghost:hover { border-color: var(--ink); }

.path-back-select {
  position: absolute;
  top: 32px;
  right: 0;
  z-index: 2;
  font-size: 13px;
  padding: 8px 14px;
  white-space: nowrap;
}
.btn__arrow { transition: transform 180ms ease; }
.btn:hover .btn__arrow { transform: translateX(3px); }

.rule { height: 1px; background: var(--rule); }
.rule--dotted {
  height: 1px;
  background-image: linear-gradient(to right, var(--ink-4) 0, var(--ink-4) 4px, transparent 4px);
  background-size: 8px 1px;
  background-repeat: repeat-x;
}

/* Pain mode A/B toggle */
.pain-mode {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.pain-mode__tabs { display: flex; flex-wrap: wrap; gap: 12px; align-items: stretch; flex-shrink: 0; }
.pain-mode__btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px 22px;
  font-family: var(--mono);
  font-size: var(--text-meta-md);
  letter-spacing: 0.06em;
  border-radius: 16px;
  transition: all 180ms ease;
  line-height: 1.2;
  white-space: nowrap;
  font-weight: 500;
}
.pain-mode__btn--a.is-active {
  background: var(--accent);
  color: #fff;
  border: 2px solid var(--accent);
  box-shadow: 0 4px 14px rgba(30, 95, 214, 0.28);
}
.pain-mode__btn--a.is-idle {
  background: var(--paper);
  color: var(--ink-2);
  border: 1px solid var(--rule);
}
.pain-mode__btn--a.is-idle:hover {
  border-color: var(--ink-3);
  color: var(--ink);
}
.pain-mode__btn--b.is-active {
  background: var(--accent);
  color: #fff;
  border: 2px solid var(--accent);
  box-shadow: 0 4px 14px rgba(30, 95, 214, 0.28);
}
.pain-mode__btn--b.is-highlight {
  background: var(--accent-wash);
  color: var(--accent-ink);
  border: 2px solid var(--accent);
  font-weight: 600;
  box-shadow: 0 0 0 3px rgba(30, 95, 214, 0.12);
}
.pain-mode__btn--b.is-highlight:hover {
  background: #c8daf8;
  box-shadow: 0 0 0 4px rgba(30, 95, 214, 0.16);
}
.pain-mode__btn--b.is-idle {
  background: var(--paper);
  color: var(--ink-2);
  border: 1px solid var(--rule);
}
.pain-mode__badge {
  font-size: var(--text-meta-xs);
  letter-spacing: 0.04em;
  padding: 3px 8px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.22);
  color: inherit;
  font-weight: 600;
}
.pain-mode__btn--b.is-highlight .pain-mode__badge {
  background: var(--accent);
  color: #fff;
}
.pain-mode__hint {
  flex: 0 1 auto;
  width: fit-content;
  max-width: min(100%, 42ch);
  margin: 0;
  font-size: 15px;
  color: var(--accent-ink);
  line-height: 1.5;
  padding: 12px 16px;
  background: var(--accent-wash);
  border: 1px dashed var(--accent);
  border-radius: 12px;
}
.pain-mode__hint strong { font-weight: 600; color: var(--accent-ink); }

/* Pain point cards — route match */
.pain-card {
  text-align: left;
  padding: 28px 26px 32px;
  transition: background 220ms ease, color 220ms ease, box-shadow 220ms ease;
  position: relative;
  min-height: 200px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 18;
  border-radius: 0;
  border: none;
}
.pain-card--selected {
  box-shadow: inset 0 0 0 2px rgba(107, 156, 234, 0.45);
}
.pain-card__match {
  display: flex;
  align-items: center;
  gap: 12px;
  min-height: 36px;
}
.pain-card__check {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  flex-shrink: 0;
  animation: pain-card-check-in 0.45s cubic-bezier(0.34, 1.4, 0.64, 1) both;
}
.pain-card__route {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 500;
  line-height: 1.3;
  color: var(--ink-3);
  transition: font-size 0.35s ease, color 0.35s ease, font-weight 0.35s ease, transform 0.35s ease, opacity 0.35s ease;
}
.pain-card--selected .pain-card__route {
  font-size: clamp(20px, 2.2vw, 24px);
  font-weight: 700;
  color: #8ec0ff;
  letter-spacing: -0.01em;
  animation: pain-card-route-in 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
}
@keyframes pain-card-check-in {
  from { transform: scale(0) rotate(-40deg); opacity: 0; }
  to { transform: scale(1) rotate(0deg); opacity: 1; }
}
@keyframes pain-card-route-in {
  from { transform: translateY(8px); opacity: 0.4; }
  to { transform: translateY(0); opacity: 1; }
}

/* ── Responsive: Mobile <768 · Tablet 768–1023 · Desktop ≥1024 ── */
@media (max-width: 767px) {
  .proto-toolbar { display: none; }
  .section { padding: 56px 0; }
  #hero.section { padding-top: 20px; padding-bottom: 36px; }
  .section__head { margin-bottom: 32px; }
  .section__sub { font-size: 15px; }
  #hero, #pain, #paths, #proof { scroll-margin-top: 72px; }
}
@media (min-width: 768px) and (max-width: 1023px) {
  .section { padding: 72px 0; }
}

/* Nav */
.nav__bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  width: 100%;
}
@media (max-width: 767px) {
  .nav { padding: 16px 0; }
  .nav__bar { flex-wrap: wrap; }
  .nav__brand img { height: 28px; }
  .nav__links {
    order: 3;
    width: 100%;
    overflow-x: auto;
    gap: 14px;
    padding-bottom: 2px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    mask-image: linear-gradient(to right, #000 90%, transparent);
  }
  .nav__links::-webkit-scrollbar { display: none; }
  .nav__links a { white-space: nowrap; flex-shrink: 0; font-size: 14px; }
  .nav__cta { padding: 8px 14px; font-size: 13px; flex-shrink: 0; }
}
@media (min-width: 768px) and (max-width: 1023px) {
  .nav__links { gap: 18px; font-size: 14px; }
}

/* Hero */
#hero.section {
  padding-top: 20px;
  padding-bottom: 32px;
}
@media (min-width: 768px) {
  #hero.section { padding-top: 24px; padding-bottom: 36px; }
}
@media (min-width: 1024px) {
  #hero.section { padding-top: 20px; padding-bottom: 28px; }
}

.hero-tagline {
  position: relative;
  display: flex;
  align-items: stretch;
  margin-bottom: 14px;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid rgba(30, 95, 214, 0.2);
  background:
    linear-gradient(102deg, rgba(30, 95, 214, 0.1) 0%, rgba(238, 244, 255, 0.95) 42%, var(--paper) 100%);
  box-shadow:
    0 1px 0 rgba(255, 255, 255, 0.7) inset,
    0 10px 32px rgba(11, 31, 58, 0.07);
}
.hero-tagline::after {
  content: "";
  position: absolute;
  right: 12%;
  top: -24px;
  width: 140px;
  height: 140px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(30, 95, 214, 0.08) 0%, transparent 70%);
  pointer-events: none;
}
.hero-tagline__bar {
  width: 5px;
  flex-shrink: 0;
  background: linear-gradient(180deg, var(--accent) 0%, #143f99 100%);
}
.hero-tagline__inner {
  flex: 1;
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 22px;
  padding: 18px 22px;
  min-width: 0;
  position: relative;
  z-index: 1;
}
.hero-tagline__copy {
  flex: 1;
  min-width: 0;
}
.hero-tagline__lines {
  display: flex;
  flex-direction: column;
  gap: 0.32em;
  margin: 0;
}
.hero-tagline__line {
  font-family: var(--serif);
  font-size: clamp(19px, 2.35vw, 28px);
  font-weight: 600;
  line-height: 1.38;
  letter-spacing: -0.018em;
  color: var(--ink);
  margin: 0;
  text-wrap: pretty;
}
.hero-tagline__anchor {
  color: var(--accent-ink);
  font-weight: 800;
}
.hero-tagline__echo {
  color: var(--accent-ink);
  font-weight: 800;
  background: linear-gradient(transparent 58%, rgba(30, 95, 214, 0.14) 58%);
  box-decoration-break: clone;
}
.hero-tagline__facts {
  flex-shrink: 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  width: min(468px, 52%);
  min-width: 336px;
}
.hero-tagline__fact {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  gap: 4px;
  padding: 11px 14px;
  padding-right: 58px;
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.72);
  border: 1px solid rgba(30, 95, 214, 0.14);
  box-shadow: 0 2px 8px rgba(11, 31, 58, 0.04);
  min-height: 68px;
  overflow: hidden;
}
.hero-tagline__fact-content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-width: 100%;
}
.hero-tagline__fact-icon {
  position: absolute;
  right: 4px;
  top: 50%;
  transform: translateY(-50%);
  width: 46px;
  height: 46px;
  color: var(--accent);
  opacity: 0.13;
  pointer-events: none;
  z-index: 0;
}
.hero-tagline__fact-icon svg {
  width: 100%;
  height: 100%;
  display: block;
}
.hero-tagline__fact--accent .hero-tagline__fact-icon {
  opacity: 0.2;
  color: var(--accent-ink);
}
.hero-tagline__fact--accent {
  background: linear-gradient(135deg, rgba(30, 95, 214, 0.1) 0%, rgba(255, 255, 255, 0.88) 100%);
  border-color: rgba(30, 95, 214, 0.22);
}
.hero-tagline__fact-num {
  font-family: var(--serif);
  font-size: clamp(17px, 1.75vw, 20px);
  font-weight: 800;
  line-height: 1.15;
  color: var(--accent-ink);
  letter-spacing: -0.02em;
  white-space: nowrap;
}
.hero-tagline__fact-suf {
  font-size: 0.72em;
  font-weight: 700;
}
.hero-tagline__fact-label {
  font-size: clamp(11px, 1.2vw, 13px);
  line-height: 1.35;
  color: var(--ink-2);
}
.hero-tagline__fact-highlight {
  color: var(--accent-ink);
  font-weight: 800;
}
@media (max-width: 767px) {
  .hero-tagline { margin-bottom: 14px; border-radius: 12px; }
  .hero-tagline__inner {
    flex-direction: column;
    align-items: stretch;
    padding: 14px 16px;
    gap: 12px;
  }
  .hero-tagline__line { font-size: clamp(17px, 4.6vw, 21px); }
  .hero-tagline__facts {
    width: 100%;
    min-width: 0;
    grid-template-columns: 1fr 1fr;
  }
  .hero-tagline__fact { min-height: 60px; padding: 9px 12px; padding-right: 50px; }
  .hero-tagline__fact-icon { width: 40px; height: 40px; right: 2px; }
  .hero-tagline::after { display: none; }
}
@media (min-width: 768px) and (max-width: 1023px) {
  .hero-tagline__line { font-size: clamp(18px, 2.2vw, 24px); }
  .hero-tagline__facts {
    width: min(400px, 52%);
    min-width: 300px;
  }
}

.hero-showcase {
  display: grid;
  grid-template-columns: 1.62fr 1fr;
  gap: 28px;
  border: 1px solid var(--rule);
  border-radius: 16px;
  background: var(--paper);
  padding: 24px;
  align-items: start;
}
.hero-main { display: flex; flex-direction: column; gap: 16px; min-width: 0; }
.hero-player {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
}
.hero-player__media {
  border-radius: 12px;
}
.hero-player__play {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 76px;
  height: 76px;
  border-radius: 50%;
  background: rgba(244, 247, 251, 0.94);
  color: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
}
.hero-player__play-wrap {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
}
.hero-player__play-wrap .hero-player__play {
  position: static;
  transform: none;
}
.hero-player__bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 12px 14px;
  background: linear-gradient(to top, rgba(0, 0, 0, 0.55), transparent);
  display: flex;
  align-items: center;
  gap: 12px;
  color: #f4f7fb;
  border-radius: 0 0 12px 12px;
}
.hero-player__progress {
  flex: 1;
  height: 2px;
  background: rgba(255, 255, 255, 0.25);
  position: relative;
}
.hero-player__progress-fill {
  width: 34%;
  height: 100%;
  background: var(--accent);
}
.hero-player__time {
  font-family: var(--mono);
  font-size: var(--text-meta-md);
  white-space: nowrap;
}
.hero-main__info {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding-top: 2px;
}
.hero-main__title {
  font-family: var(--serif);
  font-size: 24px;
  line-height: 1.3;
  font-weight: 700;
  letter-spacing: -0.015em;
  margin: 0;
}
.hero-main__desc {
  font-size: 15px;
  color: var(--ink-2);
  line-height: 1.5;
  margin: 0;
}
.hero-main__meta {
  font-family: var(--mono);
  font-size: var(--text-meta-md);
  color: var(--ink-2);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.hero-main__meta-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.hero-main__meta-row .hero-main__meta {
  flex: 1;
  min-width: 0;
}
.hero-main__meta-row .proto-drip {
  position: relative;
  top: auto;
  right: auto;
  bottom: auto;
  left: auto;
  flex-shrink: 0;
}
.hero-playlist {
  display: flex;
  flex-direction: column;
  border-left: 1px solid var(--rule);
  padding-left: 24px;
  min-width: 0;
  min-height: 0;
}
.hero-playlist__head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 18px;
  flex-shrink: 0;
}
.hero-playlist__head-title {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 700;
  margin: 0;
}
.hero-playlist__head-meta {
  font-family: var(--mono);
  font-size: var(--text-meta-md);
  color: var(--ink-2);
}
.hero-playlist__scroll {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
  min-height: 0;
}
.playlist-item__title {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 600;
  line-height: 1.35;
  margin-bottom: 4px;
}
.playlist-item__teacher {
  font-family: var(--mono);
  font-size: var(--text-meta-md);
  color: var(--ink-2);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
@media (min-width: 1024px) {
  #hero.section {
    /* 预留：导航 + 标语 + 内边距 + 标题信息区 */
    --hero-player-h: clamp(280px, min(42vh, calc(100svh - 360px)), 380px);
  }
  .hero-showcase {
    gap: 20px;
    padding: 16px 18px;
  }
  .hero-main { gap: 10px; }
  .hero-player {
    width: min(100%, calc(var(--hero-player-h) * 16 / 9));
    max-height: var(--hero-player-h);
  }
  .hero-player__play {
    width: 64px;
    height: 64px;
  }
  .hero-player__play svg { width: 20px; height: 20px; }
  .hero-player__bar { padding: 8px 12px; }
  .hero-main__title {
    font-size: 17px;
    line-height: 1.28;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .hero-main__desc {
    font-size: 13px;
    line-height: 1.45;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .hero-main__meta { font-size: 11px; }
  .hero-main__info { gap: 4px; }
  .hero-playlist {
    padding-left: 18px;
    max-height: calc(var(--hero-player-h) + 92px);
  }
  .hero-playlist__head { margin-bottom: 10px; }
  .hero-playlist__head-title { font-size: 16px; }
  .hero-playlist__scroll {
    overflow-y: auto;
    scrollbar-width: thin;
    padding-right: 2px;
  }
  .playlist-item {
    grid-template-columns: 22px 64px 1fr;
    gap: 8px;
    padding: 7px 6px;
  }
  .playlist-item__title {
    font-size: 13px;
    margin-bottom: 2px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .playlist-item__teacher { font-size: 10px; }
  .playlist-item__thumb .media-ph-thumb {
    aspect-ratio: 16 / 9 !important;
    border-radius: 6px;
  }
  .hero-tagline__inner { padding: 14px 20px; }
  .hero-tagline { margin-bottom: 12px; }
}
@media (min-width: 1280px) {
  #hero.section {
    --hero-player-h: clamp(300px, min(44vh, calc(100svh - 348px)), 400px);
  }
  .hero-main__title { font-size: 18px; }
}
.playlist-item {
  display: grid;
  grid-template-columns: 28px 96px 1fr;
  gap: 14px;
  padding: 14px 10px;
  text-align: left;
  align-items: start;
  border-left: 2px solid transparent;
  border-radius: 8px;
  transition: background 160ms ease, border-color 160ms ease;
}
.playlist-item.is-active {
  background: var(--paper-2);
  border-left-color: var(--accent);
}
.playlist-item:not(.is-active):hover { background: var(--paper-2); }
@media (max-width: 1023px) {
  .hero-showcase {
    grid-template-columns: 1fr;
    padding: 20px;
    gap: 0;
  }
  .hero-playlist {
    border-left: none;
    border-top: 1px solid var(--rule);
    padding-left: 0;
    padding-top: 24px;
    margin-top: 24px;
  }
}
@media (max-width: 767px) {
  .hero-showcase { padding: 16px; border-radius: 12px; }
  .hero-main__title { font-size: 20px !important; }
  .playlist-item {
    grid-template-columns: 24px 72px 1fr;
    gap: 10px;
    padding: 12px 6px;
  }
}
@media (max-width: 479px) {
  .playlist-item { grid-template-columns: 24px 1fr; }
  .playlist-item__thumb { display: none; }
}

/* Pain mode + cards */
.pain-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--rule);
  border-radius: 16px;
  overflow: hidden;
}
.pain-grid .pain-card { background: var(--paper); }
.pain-grid .pain-card:not(.pain-card--selected):hover { background: var(--paper-2); }
.pain-card__title {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 600;
  line-height: 1.25;
  letter-spacing: -0.01em;
  text-wrap: balance;
}
@media (max-width: 767px) {
  .pain-mode {
    flex-direction: column;
    align-items: stretch;
    gap: 12px;
  }
  .pain-mode__tabs { width: 100%; }
  .pain-mode__btn { flex: 1; min-width: 0; padding: 12px 14px; white-space: normal; }
  .pain-mode__hint { max-width: 100%; width: 100%; }
  .pain-card { padding: 22px 20px 26px; min-height: auto; }
  .pain-card__title { font-size: 18px; }
}
@media (max-width: 1023px) {
  .pain-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 767px) {
  .pain-grid { grid-template-columns: 1fr; border-radius: 12px; }
}

/* Match result bar */
.match-result {
  margin-top: 28px;
  padding: 24px 28px;
  border-radius: 16px;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 28px;
  align-items: center;
  min-height: 88px;
}
.match-result__text {
  font-family: var(--serif);
  font-size: 20px;
  text-wrap: pretty;
}
@media (max-width: 1023px) {
  .match-result {
    grid-template-columns: 1fr;
    gap: 16px;
    padding: 20px;
  }
  .match-result .btn { justify-self: start; }
}
@media (max-width: 767px) {
  .match-result { padding: 18px 16px; }
  .match-result__text { font-size: 17px; }
}

/* Quiz layout */
.quiz-layout {
  border: 1px solid var(--rule);
  border-radius: 16px;
  overflow: hidden;
  background: var(--paper);
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  min-height: 520px;
}
.quiz-panel {
  padding: 40px 44px;
  display: flex;
  flex-direction: column;
}
.quiz-panel--left { border-right: 1px solid var(--rule); }
.quiz-panel--right {
  position: relative;
  background: var(--paper-2);
  min-height: 360px;
}
.quiz-panel--right-inner {
  position: absolute;
  inset: 0;
  padding: 40px 44px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  justify-content: space-between;
}
.quiz-q-title {
  font-family: var(--serif);
  font-size: 32px;
  font-weight: 700;
  line-height: 1.15;
  letter-spacing: -0.018em;
  text-wrap: balance;
}
.quiz-done-title {
  font-family: var(--serif);
  font-size: 36px;
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -0.02em;
}
@media (max-width: 1023px) {
  .quiz-layout {
    grid-template-columns: 1fr;
    min-height: auto;
  }
  .quiz-panel { padding: 28px 24px; }
  .quiz-panel--left { border-right: none; border-bottom: 1px solid var(--rule); }
  .quiz-panel--right { min-height: 320px; }
  .quiz-panel--right-inner {
    position: relative;
    inset: unset;
    min-height: 320px;
    padding: 28px 24px;
  }
  .quiz-q-title { font-size: 26px; }
  .quiz-done-title { font-size: 30px; }
}
@media (max-width: 767px) {
  .quiz-layout { border-radius: 12px; }
  .quiz-done-actions { flex-direction: column; }
  .quiz-done-actions .btn { width: 100%; justify-content: center; }
  .section__head--center { margin-bottom: 32px; }
  .quiz-panel { padding: 22px 18px; }
  .quiz-panel--right { min-height: 280px; }
  .quiz-panel--right-inner { padding: 22px 18px; min-height: 280px; }
  .quiz-q-title { font-size: 22px; }
  .quiz-done-title { font-size: 26px; }
}

/* Path index */
.path-index {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  border: 1px solid var(--rule);
  border-radius: 16px;
  overflow: hidden;
}
.path-index__item {
  padding: 20px 18px;
  border-right: 1px solid var(--rule);
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: background 180ms ease, color 180ms ease;
}
.path-index__item:last-child { border-right: none; }
.path-index__item.is-highlight {
  background: var(--ink);
  color: var(--paper);
}
.path-index__item:not(.is-highlight):hover { background: var(--paper-2); }
.path-index__num {
  font-family: var(--mono);
  font-size: var(--text-meta-md);
  letter-spacing: 0.1em;
  font-weight: 500;
}
.path-index__item.is-highlight .path-index__num { color: var(--accent); }
.path-index__item:not(.is-highlight) .path-index__num { color: var(--ink-2); }
.path-index__label {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 700;
  line-height: 1.35;
}
.path-index__item.is-highlight .path-index__label { color: var(--paper); }
.path-index__item:not(.is-highlight) .path-index__label { color: var(--ink); }
@media (max-width: 1023px) {
  .path-index {
    grid-template-columns: repeat(3, 1fr);
    border-radius: 12px;
  }
  .path-index__item:nth-child(3) { border-right: none; }
  .path-index__item:nth-child(n+4) { border-top: 1px solid var(--rule); }
  .path-index__item:nth-child(6) { border-right: none; }
}
@media (max-width: 767px) {
  .path-index {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .path-index::-webkit-scrollbar { display: none; }
  .path-index__item {
    flex: 0 0 min(72vw, 220px);
    scroll-snap-align: start;
    border-top: none !important;
    padding: 16px 14px;
  }
}

/* Path detail cards */
.path-card.section { padding: 96px 0; }
.path-card__grid {
  display: grid;
  gap: 48px;
  align-items: stretch;
}
.path-card--media-left .path-card__grid { grid-template-columns: 2fr 1fr; }
.path-card--media-right .path-card__grid { grid-template-columns: 1fr 2fr; }
.path-card--media-left .path-card__media { order: 1; }
.path-card--media-left .path-card__content { order: 2; }
.path-card--media-right .path-card__media { order: 2; }
.path-card--media-right .path-card__content { order: 1; padding-left: 8px; }
.path-card__content {
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-width: 0;
}
.path-card__title {
  font-family: var(--serif);
  font-size: clamp(28px, 3vw, 44px);
  font-weight: 700;
  line-height: 1.08;
  letter-spacing: -0.02em;
  margin-bottom: 18px;
  text-wrap: balance;
}
@media (max-width: 1023px) {
  .path-card.section { padding: 72px 0; }
  .path-card__grid {
    grid-template-columns: 1fr !important;
    gap: 32px;
  }
  .path-card__media { order: 1 !important; }
  .path-card__content { order: 2 !important; padding-left: 0 !important; }
}
@media (max-width: 767px) {
  .path-card.section { padding: 48px 0; }
  .path-card {
    display: flex;
    flex-direction: column;
  }
  .path-back-select {
    position: static;
    align-self: flex-end;
    margin-bottom: 20px;
    order: -1;
  }
  .path-card__title { font-size: clamp(24px, 6vw, 32px); }
  .path-card .btn--ink { width: 100%; justify-content: center; align-self: stretch; }
}

/* Path WeChat consult — compact inline chip */
.path-card__wechat {
  margin-top: 20px;
  padding: 8px 12px 8px 8px;
  border: 1px solid var(--rule);
  border-radius: 12px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  align-self: flex-start;
  max-width: 100%;
  background: var(--paper);
  transition: border-color 160ms ease, background 160ms ease;
}
.path-card__wechat:hover {
  border-color: var(--ink-3);
  background: var(--paper-2);
}
.path-card__wechat-qr {
  width: 44px;
  height: 44px;
  border-radius: 8px;
  flex-shrink: 0;
  overflow: hidden;
  background:
    linear-gradient(90deg, var(--ink) 33%, transparent 33%) 0 0 / 3px 3px,
    linear-gradient(var(--ink) 33%, transparent 33%) 0 0 / 3px 3px;
  background-color: var(--paper);
  border: 1px solid var(--rule-soft);
  position: relative;
}
.path-card__wechat-qr img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.path-card__wechat-qr img[src=""],
.path-card__wechat-qr img:not([src]) {
  display: none;
}
.path-card__wechat-body {
  min-width: 0;
  padding-right: 2px;
}
.path-card__wechat-kicker {
  font-family: var(--mono);
  font-size: var(--text-meta-xs);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-3);
  line-height: 1.2;
  margin-bottom: 2px;
}
.path-card__wechat-text {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.3;
  white-space: nowrap;
}
@media (max-width: 767px) {
  .path-card__wechat {
    width: auto;
    max-width: 100%;
  }
  .path-card__wechat-text {
    white-space: normal;
  }
}

/* Proof grid */
.proof-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border: 1px solid var(--rule);
  border-radius: 16px;
  overflow: hidden;
}
.proof-card {
  padding: 32px 28px;
  border-right: 1px solid var(--rule);
  display: flex;
  flex-direction: column;
  gap: 20px;
  min-height: 340px;
}
.proof-card:last-child { border-right: none; }
.proof-scores {
  display: flex;
  align-items: flex-end;
  gap: 12px;
  font-family: var(--serif);
  flex-wrap: wrap;
}
.proof-scores__cycle {
  margin-left: auto;
  align-self: center;
  font-family: var(--sans);
  font-size: 14px;
  color: var(--ink-2);
  white-space: nowrap;
}

const DripContext = createContext(null);

function DripProvider({ children }) {
  const [showNotes, setShowNotes] = useState(true);
  const [showTodos, setShowTodos] = useState(true);
  const [active, setActive] = useState(null);

  const close = useCallback(() => setActive(null), []);

  useEffect(() => {
    if (!active) return;
    const onKey = (e) => { if (e.key === "Escape") close(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [active, close]);

  return (
    <DripContext.Provider value={{ showNotes, setShowNotes, showTodos, setShowTodos, active, setActive, close }}>
      {children}
      <DripModal />
    </DripContext.Provider>
  );
}

function useDrip() {
  return useContext(DripContext);
}

function DripAnchor({ side = "end", gap = 6, row = false, block = false, className = "", style, children, drip }) {
  if (!drip) return children;
  const cls = [
    "proto-anchor",
    `proto-anchor--${side}`,
    block ? "proto-anchor--block" : "",
    className,
  ].filter(Boolean).join(" ");
  const dripsCls = row ? "proto-anchor__drips proto-anchor__drips--row" : "proto-anchor__drips";
  return (
    <span className={cls} style={{ gap, ...style }}>
      {children}
      <span className={dripsCls}>{drip}</span>
    </span>
  );
}

function NoteDrip({ pos = "tr", style, inline, title, body, prd = [], docs = [], links = [] }) {
  const { showNotes, setActive } = useDrip();
  if (!showNotes) return null;
  const isInline = inline || style;
  return (
    <button
      type="button"
      className={`proto-drip proto-drip--note${isInline ? " proto-drip--inline" : ` proto-drip--${pos}`}`}
      style={style}
      title={title}
      aria-label={`备注：${title}`}
      onClick={(e) => {
        e.stopPropagation();
        setActive({ kind: "note", title, body, prd, docs, links });
      }}
    >
      <span className="proto-drip__icon">i</span>
    </button>
  );
}

function TodoDrip({ pos = "br", style, inline, todoId }) {
  const { showTodos, setActive } = useDrip();
  const todo = PAGE_TODOS[todoId];
  if (!showTodos || !todo) return null;
  const isInline = inline || style;
  return (
    <button
      type="button"
      className={`proto-drip proto-drip--todo${isInline ? " proto-drip--inline" : ` proto-drip--${pos}`}`}
      style={style}
      title={`${todoId} ${todo.title}`}
      aria-label={`待办：${todoId}`}
      onClick={(e) => {
        e.stopPropagation();
        setActive({
          kind: "todo",
          todoId,
          title: `${todoId} · ${todo.title}`,
          body: todo.detail,
          prd: todo.prd || [],
          docs: ["todo", ...(todo.docs || [])],
          meta: { owner: todo.owner, status: todo.status, blocker: todo.blocker },
        });
      }}
    >
      <span className="proto-drip__icon">!</span>
    </button>
  );
}

function DripModal() {
  const { active, close } = useDrip();
  if (!active) return null;

  const docKeys = active.docs || [];
  const prdSections = active.prd || [];

  return (
    <div className="proto-modal-backdrop" onClick={close}>
      <div className="proto-modal" onClick={(e) => e.stopPropagation()} role="dialog" aria-modal="true">
        <div className="proto-modal__head">
          <div>
            <div className={`proto-modal__kind proto-modal__kind--${active.kind}`}>
              {active.kind === "note" ? "备注 · PRD / 逻辑说明" : "待办 · TODO"}
            </div>
            <div className="proto-modal__title">{active.title}</div>
          </div>
          <button type="button" className="proto-modal__close" onClick={close} aria-label="关闭">×</button>
        </div>
        <div className="proto-modal__body">
          {active.body && <div className="proto-modal__text">{active.body}</div>}
          {active.meta && (
            <div className="proto-modal__meta">
              负责人：{active.meta.owner}<br />
              状态：{active.meta.status}<br />
              阻塞：{active.meta.blocker}
            </div>
          )}
          {prdSections.length > 0 && (
            <div>
              <div className="proto-modal__section-title">PRD 章节</div>
              <div className="proto-modal__tags">
                {prdSections.map((s) => <span key={s} className="proto-modal__tag">{s}</span>)}
              </div>
            </div>
          )}
          {docKeys.length > 0 && (
            <div>
              <div className="proto-modal__section-title">相关文档</div>
              <div className="proto-modal__links">
                {docKeys.map((k) => {
                  const d = DOC_LINKS[k];
                  return d ? (
                    <a key={k} className="proto-modal__link" href={d.href} target="_blank" rel="noopener noreferrer">{d.label}</a>
                  ) : null;
                })}
              </div>
            </div>
          )}
          {(active.links || []).length > 0 && (
            <div>
              <div className="proto-modal__section-title">相关链接</div>
              <div className="proto-modal__links">
                {active.links.map((l) => (
                  <a key={l.href} className="proto-modal__link" href={l.href} target="_blank" rel="noopener noreferrer">{l.label}</a>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function DripToolbar() {
  const { showNotes, setShowNotes, showTodos, setShowTodos } = useDrip();
  const [expanded, setExpanded] = useState(false);

  return (
    <div className={`proto-toolbar ${expanded ? "is-expanded" : "is-collapsed"}`}>
      <button
        type="button"
        className="proto-toolbar__tab"
        onClick={() => setExpanded((v) => !v)}
        aria-expanded={expanded}
        aria-label={expanded ? "收起标注面板" : "展开标注面板"}
        title={expanded ? "收起" : "原型标注"}
      >

        {!expanded && <span className="proto-toolbar__tab-text">标注</span>}

      <div className="proto-toolbar__panel">
        <div className="proto-toolbar__label">原型标注</div>
        <button
          type="button"
          className={`proto-toolbar__btn ${showNotes ? "is-on is-on--note" : ""}`}

function MediaPlaceholder({ label, aspect = "16/9", tone = "warm", caption, badge, className = "", fill = false }) {
  const toneBg = {
    warm: "linear-gradient(135deg, #cfe0f5 0%, #7aa7d9 100%)",
    sage: "linear-gradient(135deg, #b9c8e1 0%, #5f7aa3 100%)",
    ink: "linear-gradient(135deg, #1e3a63 0%, #0b1f3a 100%)",
    cream: "linear-gradient(135deg, #e8f0fb 0%, #b8cde8 100%)",
    accent: "linear-gradient(135deg, #6b9cea 0%, #1e5fd6 100%)",
  }[tone];

  const stripeTone = tone === "ink" ? "rgba(255,255,255,0.06)" : "rgba(255,255,255,0.18)";
  const textColor = tone === "ink" || tone === "accent" ? "#f4f7fb" : "#0b1f3a";

  return (
    <div
      className={className}
      style={{
      ...(fill
        ? { position: "absolute", inset: 0, width: "100%", height: "100%" }
        : { aspectRatio: aspect, width: "100%", position: "relative", borderRadius: 16 }),
      background: toneBg,
      overflow: "hidden",
    }}>
      <div style={{
        position: "absolute",
        inset: 0,
        backgroundImage: `repeating-linear-gradient(45deg, transparent 0 14px, ${stripeTone} 14px 15px)`,
      }} />
      {badge && (
        <div style={{
          position: "absolute", top: 14, left: 14,
          background: "#0b1f3a", color: "#f4f7fb",
          padding: "4px 10px", fontFamily: "var(--mono)", fontSize: "var(--text-meta-sm)",
          letterSpacing: "0.12em", textTransform: "uppercase",
          borderRadius: 8,
        }}>{badge}</div>
      )}
      {label && (
        <div style={{
          position: "absolute", inset: 0,
          display: "flex", alignItems: "center", justifyContent: "center",
          fontFamily: "var(--mono)", fontSize: "var(--text-meta-md)",
          letterSpacing: "0.18em", textTransform: "uppercase",
          color: textColor, opacity: 0.85,
        }}>
          [ {label} ]
        </div>
      )}
      {caption && (
        <div style={{
          position: "absolute", bottom: 14, left: 14, right: 14,
          fontFamily: "var(--serif)", fontSize: 14,
          color: textColor, opacity: 0.9,
        }}>{caption}</div>
      )}
    </div>
  );
}

function PainPointsB({ onMatch }) {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState([]); // array of { qIdx, hook, label, multi? }
  const [multiSelected, setMultiSelected] = useState([]); // for current multi-select step
  const done = step >= QUIZ.length;

  const resultIdx = useMemo(() => {
    if (answers.length === 0) return 0;
    const counts = {};
    answers.forEach(a => { counts[a.hook] = (counts[a.hook] || 0) + 1; });
    const best = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
    return Number(best[0]);
  }, [answers]);

  const result = PAIN_POINTS.find(p => p.hookIdx === resultIdx) || PAIN_POINTS[0];

  useEffect(() => { if (done && onMatch) onMatch(result); }, [done]);

  function pickSingle(a) {
    setAnswers(prev => [...prev, { qIdx: step, hook: a.hook, label: a.label }]);
    setStep(s => s + 1);
  }

  function toggleMulti(a) {
    setMultiSelected(prev =>
      prev.find(x => x.k === a.k) ? prev.filter(x => x.k !== a.k) : [...prev, a]
    );
  }

  function confirmMulti() {
    if (multiSelected.length === 0) return;
    // Use most-common hook among selections
    const counts = {};
    multiSelected.forEach(a => { counts[a.hook] = (counts[a.hook] || 0) + 1; });
    const bestHook = Number(Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0]);
    const labelStr = multiSelected.map(x => x.label).join("、");
    setAnswers(prev => [...prev, { qIdx: step, hook: bestHook, label: labelStr }]);
    setMultiSelected([]);
    setStep(s => s + 1);
  }

  function reset() {
    setAnswers([]); setStep(0); setMultiSelected([]);
  }

  const q = QUIZ[step];

  // Build preview rows: answered + pending
  const previewRows = QUIZ.map((qItem, i) => {
    const ans = answers.find(a => a.qIdx === i);
    const isCurrent = i === step && !done;
    return { qItem, ans, isCurrent };
  });

  return (
    <div className="quiz-layout">
      {/* Left: quiz */}
      <div className="quiz-panel quiz-panel--left">
        {/* Progress */}
        <div style={{ display: "flex", gap: 6, marginBottom: 40 }}>
          {QUIZ.map((_, i) => (
            <div key={i} style={{
              flex: 1, height: 3,
              background: i < step ? "var(--accent)" : i === step && !done ? "var(--ink)" : "var(--rule)",
              borderRadius: 2,
              transition: "background 200ms ease",
            }} />
          ))}
        </div>

        {done ? (
          <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center" }}>
            <div className="eyebrow" style={{ marginBottom: 16 }}>诊断完成</div>
            <div className="quiz-done-title" style={{ marginBottom: 16 }}>
              你最适合 <em style={{ color: "var(--accent)", fontStyle: "italic" }}>「{result.match}」</em>
            </div>
            <p style={{ fontSize: 15, color: "var(--ink-2)", marginBottom: 28, maxWidth: "48ch" }}>
              {result.detail}
            </p>
            <div className="quiz-done-actions" style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
              <a className="btn btn--ink" href={`#path-${result.hookIdx}`}>查看专属路径 <Arrow /></a>
              <button className="btn btn--ghost" onClick={reset}>重新测试</button>
            </div>
          </div>
        ) : (
          <>
            <div style={{ fontFamily: "var(--mono)", fontSize: "var(--text-meta-md)", letterSpacing: "0.12em", color: "var(--ink-3)", textTransform: "uppercase", marginBottom: 14 }}>
              第 {step + 1} 题 / 共 {QUIZ.length} 题
              {q.type === "multi" && (
                <span style={{ marginLeft: 12, color: "var(--accent)" }}>多选</span>
              )}
            </div>
            <div className="quiz-q-title" style={{ marginBottom: q.hint ? 8 : 32 }}>
              {q.q}
            </div>
            {q.hint && (
              <div style={{ fontFamily: "var(--mono)", fontSize: "var(--text-meta-md)", color: "var(--ink-3)", marginBottom: 24 }}>
                {q.hint}
              </div>
            )}

            <div style={{ display: "flex", flexDirection: "column", gap: 8, flex: 1 }}>
              {q.a.map((a, i) => {
                const isChecked = q.type === "multi" && multiSelected.find(x => x.k === a.k);
                return (
                  <button
                    key={a.k}
                    onClick={() => q.type === "multi" ? toggleMulti(a) : pickSingle(a)}
                    style={{
                      textAlign: "left",
                      padding: "14px 18px",
                      border: `1px solid ${isChecked ? "var(--accent)" : "var(--rule)"}`,
                      borderRadius: 12,
                      fontFamily: "var(--serif)", fontSize: 16,
                      transition: "all 160ms ease",
                      display: "flex", alignItems: "center", gap: 14,
                      background: isChecked ? "var(--accent-wash)" : "transparent",
                      color: isChecked ? "var(--accent-ink)" : "var(--ink)",
                    }}
                    onMouseEnter={e => {
                      if (!isChecked) {
                        e.currentTarget.style.background = "var(--ink)";
                        e.currentTarget.style.color = "var(--paper)";
                        e.currentTarget.style.borderColor = "var(--ink)";
                      }
                    }}
                    onMouseLeave={e => {
                      if (!isChecked) {
                        e.currentTarget.style.background = "transparent";
                        e.currentTarget.style.color = "var(--ink)";
                        e.currentTarget.style.borderColor = "var(--rule)";
                      }
                    }}
                  >
                    {q.type === "multi" ? (
                      <span style={{
                        width: 18, height: 18, borderRadius: 4,
                        border: `1.5px solid ${isChecked ? "var(--accent)" : "var(--rule)"}`,
                        background: isChecked ? "var(--accent)" : "transparent",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        flexShrink: 0,
                        transition: "all 160ms ease",
                      }}>
                        {isChecked && <Check size={12} />}
                      </span>
                    ) : (
                      <span style={{ fontFamily: "var(--mono)", fontSize: "var(--text-meta-md)", opacity: 0.6, minWidth: 16 }}>
                        {String.fromCharCode(65 + i)}
                      </span>
                    )}
                    <span style={{ flex: 1 }}>{a.label}</span>
                    {q.type === "single" && <Arrow />}
                  </button>
                );
              })}
            </div>

            {q.type === "multi" && (
              <button
                onClick={confirmMulti}
                disabled={multiSelected.length === 0}
                className="btn btn--ink"
                style={{
                  marginTop: 20, alignSelf: "flex-start",
                  opacity: multiSelected.length === 0 ? 0.4 : 1,
                  cursor: multiSelected.length === 0 ? "not-allowed" : "pointer",
                }}
              >
                确认选择 ({multiSelected.length}) <Arrow />
              </button>
            )}
          </>
        )}
      </div>

      {/* Right: diagnosis preview */}
      <div className="quiz-panel quiz-panel--right">
        <div className="quiz-panel--right-inner">
          <div>
            <div className="eyebrow" style={{ marginBottom: 20 }}>写作诊断表</div>
            <div style={{ fontFamily: "var(--mono)", fontSize: "var(--text-meta-md)", color: "var(--ink-2)", lineHeight: 1.8 }}>
              {previewRows.map(({ qItem, ans, isCurrent }, i) => (
                <div key={i} style={{
                  display: "flex", justifyContent: "space-between",
                  borderBottom: "1px dashed var(--rule)", padding: "6px 0",
                  gap: 12,
                }}>
                  <span style={{ color: isCurrent ? "var(--accent)" : "var(--ink-3)", whiteSpace: "nowrap" }}>
                    第 {i + 1} 题
                  </span>
                  <span style={{
                    color: ans ? "var(--ink)" : (isCurrent ? "var(--accent)" : "var(--ink-4)"),
                    textAlign: "right",
                    fontSize: "var(--text-meta-md)",
                    maxWidth: "20ch",
                    overflow: "hidden",
                    textOverflow: "ellipsis",
                    whiteSpace: "nowrap",
                  }}>
                    {ans ? ans.label : (isCurrent ? "▶ 作答中" : "———————")}
                  </span>
                </div>
              ))}
            </div>
          </div>

          <div style={{ position: "relative" }}>
            <MediaPlaceholder aspect="4/3" tone="cream" label={done ? "你的结果" : "预览"} />
            <Annotation top={-12} right={12}>根据回答实时更新</Annotation>
          </div>
        </div>
      </div>
    </div>
  );
}

function AuthProvider({ children }) {
  const [isLoggedIn, setIsLoggedIn] = useState(() => {
    try { return localStorage.getItem(AUTH_STORAGE_KEY) === "1"; } catch { return false; }
  });
  const [loginOpen, setLoginOpen] = useState(false);
  const [svipOpen, setSvipOpen] = useState(false);
  const [pendingPathIndex, setPendingPathIndex] = useState(null);

  const openLogin = useCallback((pathIndex = null) => {
    setPendingPathIndex(pathIndex);
    setLoginOpen(true);
  }, []);

  const closeLogin = useCallback(() => {
    setLoginOpen(false);
    setPendingPathIndex(null);
  }, []);

  const openSvip = useCallback(() => setSvipOpen(true), []);
  const closeSvip = useCallback(() => setSvipOpen(false), []);

  const dispatchPathSuccess = useCallback((pathIndex) => {
    if (pathIndex === PATH02_INDEX) {
      window.dispatchEvent(new CustomEvent("path02-plan-request"));
      return;
    }
    window.dispatchEvent(new CustomEvent("path-cta-success", {
      detail: { index: pathIndex, label: PATHS[pathIndex]?.cta },
    }));
  }, []);

  const completeAuth = useCallback((mode) => {
    try { localStorage.setItem(AUTH_STORAGE_KEY, "1"); } catch { /* ignore */ }
    setIsLoggedIn(true);
    setLoginOpen(false);
    const idx = pendingPathIndex;
    setPendingPathIndex(null);
    if (idx != null) dispatchPathSuccess(idx);
  }, [pendingPathIndex, dispatchPathSuccess]);

  const logout = useCallback(() => {
    try { localStorage.removeItem(AUTH_STORAGE_KEY); } catch { /* ignore */ }
    setIsLoggedIn(false);
    window.dispatchEvent(new CustomEvent("bc-landing-auth-logout"));
  }, []);

  const setLoggedInDemo = useCallback((value) => {
    if (value) {
      try { localStorage.setItem(AUTH_STORAGE_KEY, "1"); } catch { /* ignore */ }
      setIsLoggedIn(true);
    } else {
      logout();
    }
  }, [logout]);

  const requireAuthForPath = useCallback((pathIndex) => {
    if (isLoggedIn) {
      dispatchPathSuccess(pathIndex);
      return true;
    }
    openLogin(pathIndex);
    return false;
  }, [isLoggedIn, openLogin, dispatchPathSuccess]);

  const value = useMemo(() => ({
    isLoggedIn,
    loginOpen,
    svipOpen,
    pendingPathIndex,
    openLogin,
    closeLogin,
    openSvip,
    closeSvip,
    completeAuth,
    logout,
    setLoggedInDemo,
    requireAuthForPath,
  }), [isLoggedIn, loginOpen, svipOpen, pendingPathIndex, openLogin, closeLogin, openSvip, closeSvip, completeAuth, logout, setLoggedInDemo, requireAuthForPath]);

  return (
    <AuthContext.Provider value={value}>
      {children}
      <LoginRegisterModal />
      <SvipIntroModal />
    </AuthContext.Provider>
  );
}

const PLAN_STORAGE_KEY = "bc-landing-demo-path02-plan";
const PLAN_MAX_BYTES = 5 * 1024 * 1024;
const PLAN_DEMO_GEN_MS = 12000;

const Path02PlanContext = createContext(null);

function usePath02Plan() {
  const ctx = useContext(Path02PlanContext);
  if (!ctx) throw new Error("usePath02Plan must be used within Path02PlanProvider");
  return ctx;
}

function formatFileSize(bytes) {
  if (bytes < 1024) return `${bytes} B`;
  if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
  return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
}

function loadStoredPlan() {
  try {
    const raw = localStorage.getItem(PLAN_STORAGE_KEY);
    if (!raw) return { status: "none" };
    const data = JSON.parse(raw);
    if (data?.status === "generating") {
      const elapsed = Date.now() - (data.startedAt || 0);
      if (elapsed >= PLAN_DEMO_GEN_MS) return { ...data, status: "ready", readyAt: data.startedAt + PLAN_DEMO_GEN_MS };
      return data;
    }
    return data;
  } catch {
    return { status: "none" };
  }
}

function saveStoredPlan(plan) {
  try {
    if (plan.status === "none") localStorage.removeItem(PLAN_STORAGE_KEY);
    else localStorage.setItem(PLAN_STORAGE_KEY, JSON.stringify(plan));
  } catch { /* ignore */ }
}

function isPdfFile(file) {
  return file.type === "application/pdf" || /\.pdf$/i.test(file.name);
}

      },

function createDemoPdfBlob(preview) {
  const lines = [
    preview.title,
    "",
    ...preview.sections.flatMap((s) => {
      const block = [s.heading, s.body || "", ...(s.items || [])].filter(Boolean);
      return [...block, ""];
    }),
  ];
  const escaped = lines.map((l) => l.replace(/[()\\]/g, "\\$&")).slice(0, 40);
  let y = 750;
  const textOps = escaped.map((line) => {
    const op = `BT /F1 11 Tf 48 ${y} Td (${line.slice(0, 80)}) Tj ET`;
    y -= 16;
    return op;
  }).join("\n");
  const stream = textOps + "\n";
  const pdf = `%PDF-1.4
1 0 obj<</Type/Catalog/Pages 2 0 R>>endobj
2 0 obj<</Type/Pages/Kids[3 0 R]/Count 1>>endobj
3 0 obj<</Type/Page/MediaBox[0 0 612 792]/Parent 2 0 R/Contents 4 0 R/Resources<</Font<</F1 5 0 R>>>>>>endobj
4 0 obj<</Length ${stream.length}>>stream
${stream}
endstream endobj
5 0 obj<</Type/Font/Subtype/Type1/BaseFont/Helvetica>>endobj
xref
0 6
0000000000 65535 f 
0000000010 00000 n 
0000000053 00000 n 
0000000100 00000 n 
0000000240 00000 n 
0000000500 00000 n 
trailer<</Size 6/Root 1 0 R>>
startxref
580
%%EOF`;
  return new Blob([pdf], { type: "application/pdf" });
}

function Path02PlanProvider({ children }) {
  const [plan, setPlan] = useState(loadStoredPlan);
  const [modal, setModal] = useState(null);
  const [files, setFiles] = useState([null, null]);
  const [fileErrors, setFileErrors] = useState(["", ""]);
  const [genProgress, setGenProgress] = useState(0);
  const [planToast, setPlanToast] = useState("");
  const genStartedInSessionRef = useRef(false);
  const timerRef = useRef(null);
  const progressRef = useRef(null);

  const persistPlan = useCallback((next) => {
    setPlan(next);
    saveStoredPlan(next);
  }, []);

  const showToast = useCallback((msg) => {
    setPlanToast(msg);
    setTimeout(() => setPlanToast(""), 3200);
  }, []);

  const closeModal = useCallback(() => setModal(null), []);

  const openUpload = useCallback(() => {
    setFiles([null, null]);
    setFileErrors(["", ""]);
    setModal("upload");
  }, []);

  const viewPlan = useCallback(() => {
    if (plan.status === "ready") setModal("result");
  }, [plan.status]);

  const handlePlanRequest = useCallback(() => {
    if (plan.status === "generating") {
      showToast("方案生成中，请稍候");
      return;
    }
    if (plan.status === "ready") {
      setModal("overwrite");
      return;
    }
    openUpload();
  }, [plan.status, showToast, openUpload]);

  const confirmOverwrite = useCallback(() => {
    openUpload();
  }, [openUpload]);

  const validateFile = useCallback((file) => {
    if (!isPdfFile(file)) return "请上传 PDF 文件";
    if (file.size > PLAN_MAX_BYTES) return "文件超过 5MB";
    return "";
  }, []);

  const setFileAt = useCallback((index, file) => {
    const err = validateFile(file);
    setFiles((prev) => {
      const next = [...prev];
      next[index] = err ? null : file;
      return next;
    });
    setFileErrors((prev) => {
      const next = [...prev];
      next[index] = err;
      return next;
    });
  }, [validateFile]);

  const clearFileAt = useCallback((index) => {
    setFiles((prev) => {
      const next = [...prev];
      next[index] = null;
      return next;
    });
    setFileErrors((prev) => {
      const next = [...prev];
      next[index] = "";
      return next;
    });
  }, []);

  const finishGeneration = useCallback((fileNames) => {
    const preview = buildDemoPlanPreview(fileNames);
    const readyPlan = {
      status: "ready",
      fileNames,
      preview,
      readyAt: Date.now(),
    };
    persistPlan(readyPlan);
    setGenProgress(100);
    if (genStartedInSessionRef.current) {
      setModal("result");
    }
  }, [persistPlan]);

  const startGeneration = useCallback((fileNames) => {
    genStartedInSessionRef.current = true;
    persistPlan({ status: "generating", fileNames, startedAt: Date.now() });
    setGenProgress(0);
    setModal("generating");
  }, [persistPlan]);

  const submitUpload = useCallback(() => {
    const picked = files.filter(Boolean);
    if (!picked.length) return;
    const names = files.map((f) => f?.name || null);
    startGeneration(names.filter(Boolean));
  }, [files, startGeneration]);

  useEffect(() => {
    const onRequest = () => handlePlanRequest();
    window.addEventListener("path02-plan-request", onRequest);
    return () => window.removeEventListener("path02-plan-request", onRequest);
  }, [handlePlanRequest]);

  useEffect(() => {
    const onAuthChange = () => setModal(null);
    window.addEventListener("bc-landing-auth-logout", onAuthChange);
    return () => window.removeEventListener("bc-landing-auth-logout", onAuthChange);
  }, []);

  useEffect(() => {
    if (plan.status !== "generating" || !plan.startedAt) return undefined;

    const fileNames = plan.fileNames || [];
    const remaining = Math.max(0, PLAN_DEMO_GEN_MS - (Date.now() - plan.startedAt));

    const updateProgress = () => {
      const elapsed = Date.now() - plan.startedAt;
      setGenProgress(Math.min(99, Math.round((elapsed / PLAN_DEMO_GEN_MS) * 100)));
    };

    updateProgress();
    progressRef.current = setInterval(updateProgress, 200);

    timerRef.current = setTimeout(() => {
      if (progressRef.current) clearInterval(progressRef.current);
      finishGeneration(fileNames);
    }, remaining);

    return () => {
      if (timerRef.current) clearTimeout(timerRef.current);
      if (progressRef.current) clearInterval(progressRef.current);
    };
  }, [plan.status, plan.startedAt, plan.fileNames, finishGeneration]);

  const resetPlanDemo = useCallback(() => {
    if (timerRef.current) clearTimeout(timerRef.current);
    if (progressRef.current) clearInterval(progressRef.current);
    genStartedInSessionRef.current = false;
    persistPlan({ status: "none" });
    setModal(null);
    setFiles([null, null]);
    setFileErrors(["", ""]);
    setGenProgress(0);
  }, [persistPlan]);

  const simulateReadyPlan = useCallback(() => {
    genStartedInSessionRef.current = false;
    const preview = buildDemoPlanPreview(["demo-report.pdf"]);
    persistPlan({
      status: "ready",
      fileNames: ["demo-report.pdf"],
      preview,
      readyAt: Date.now(),
    });
  }, [persistPlan]);

  const value = useMemo(() => ({
    plan,
    modal,
    files,
    fileErrors,
    genProgress,
    planToast,
    closeModal,
    openUpload,
    viewPlan,
    confirmOverwrite,
    submitUpload,
    setFileAt,
    clearFileAt,
    handlePlanRequest,
    resetPlanDemo,
    simulateReadyPlan,
  }), [
    plan, modal, files, fileErrors, genProgress, planToast,
    closeModal, openUpload, viewPlan, confirmOverwrite, submitUpload,
    setFileAt, clearFileAt, handlePlanRequest, resetPlanDemo, simulateReadyPlan,
  ]);

  return (
    <Path02PlanContext.Provider value={value}>
      {children}
      <Path02PlanUI />
      <Path02GeneratingBar />
    </Path02PlanContext.Provider>
  );
}

const FLOW_MAIN_STEPS = [
  { id: "hero", label: "公开课" },
  { id: "pain", label: "问题匹配" },
  { id: "paths", label: "学习路径" },
  { id: "proof", label: "学员故事" },
];

function buildFlowTrackItems() {
  const items = [
    { id: "hero" },
    { id: "pain" },
    { id: "paths" },
    ...PATHS.map((_, i) => ({ id: `path-${i}` })),
    { id: "proof" },
  ];
  return items;
}

function getScrollAnchorOffset() {
  const nav = document.querySelector(".nav");
  return Math.ceil(nav?.getBoundingClientRect().height ?? 88) + 4;
}

function getFlowSection(id) {
  if (id === "paths") return document.getElementById("paths");
  return document.querySelector(`section#${CSS.escape(id)}`);
}

function getSectionDocTop(el) {
  return window.scrollY + el.getBoundingClientRect().top;
}

function scrollToSection(id) {
  const el = getFlowSection(id);
  if (!el) return;
  const top = getSectionDocTop(el) - getScrollAnchorOffset();
  window.scrollTo({ top: Math.max(0, top), behavior: "smooth" });
}

function FlowAxis() {
  const [activeId, setActiveId] = useState("hero");
  const trackItems = useMemo(() => buildFlowTrackItems(), []);

  useEffect(() => {
    const update = () => {
      const marker = window.scrollY + getScrollAnchorOffset() + 8;
      let current = trackItems[0].id;
      for (const item of trackItems) {
        const el = getFlowSection(item.id);
        if (el && getSectionDocTop(el) <= marker) current = item.id;
      }
      setActiveId(current);
    };
    update();
    window.addEventListener("scroll", update, { passive: true });
    window.addEventListener("resize", update);
    return () => {
      window.removeEventListener("scroll", update);
      window.removeEventListener("resize", update);
    };
  }, [trackItems]);

  const activeIndex = Math.max(0, trackItems.findIndex(s => s.id === activeId));
  const progressPct = trackItems.length <= 1
    ? 0
    : (activeIndex / (trackItems.length - 1)) * 100;

  const pathActiveIndex = activeId.startsWith("path-") ? Number(activeId.replace("path-", "")) : -1;

  function stepState(stepId) {
    if (stepId === "paths") {
      if (activeId === "paths") return "is-active";
      if (pathActiveIndex >= 0) return "is-active-parent";
      const pathsIndex = trackItems.findIndex(item => item.id === "paths");
      if (pathsIndex >= 0 && pathsIndex < activeIndex) return "is-done";
      return "";
    }
    if (activeId === stepId) return "is-active";
    const stepTrackIndex = trackItems.findIndex(item => item.id === stepId);
    if (stepTrackIndex >= 0 && stepTrackIndex < activeIndex) return "is-done";
    return "";
  }

  return (
    <nav className="flow-axis" aria-label="页面导航">
      <div className="flow-axis__inner">
        <div className="flow-axis__track">
          <div className="flow-axis__rail" aria-hidden="true" />
          <div className="flow-axis__progress" style={{ height: `${progressPct}%` }} aria-hidden="true" />
          {FLOW_MAIN_STEPS.map((step) => {
            const state = stepState(step.id);
            return (
              <React.Fragment key={step.id}>
                <button
                  type="button"
                  className={`flow-axis__step${state ? ` ${state}` : ""}`}
                  onClick={() => scrollToSection(step.id)}
                  aria-current={state === "is-active" ? "step" : undefined}
                >
                  <span className="flow-axis__dot" aria-hidden="true" />
                  <span className="flow-axis__label">{step.label}</span>
                </button>
                {step.id === "paths" && (
                  <div className="flow-axis__subs" aria-label="学习路径子项">
                    {PATHS.map((p, pi) => {
                      const subId = `path-${pi}`;
                      const subActive = activeId === subId;
                      const subDone = pathActiveIndex >= 0 && pi < pathActiveIndex;
                      return (
                        <button
                          key={subId}
                          type="button"
                          className={`flow-axis__sub-step${subActive ? " is-active" : ""}${subDone ? " is-done" : ""}`}
                          data-path-index={pi}
                          onClick={(e) => {
                            e.stopPropagation();
                            scrollToSection(subId);
                          }}
                          aria-current={subActive ? "step" : undefined}
                        >
                          <span className="flow-axis__sub-dot" aria-hidden="true" />
                          <span className="flow-axis__sub-label">{p.num} · {p.kicker}</span>
                        </button>
                      );
                    })}
                  </div>
                )}
              </React.Fragment>
            );
          })}
        </div>
      </div>
    </nav>
  );
}
